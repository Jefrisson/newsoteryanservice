const ACRONYMS = new Set(['id','ids','url','urls','uri','api','apis','sql','crm','erp','poc','pocs','vat','iban','swift','bic','ip','dns','http','https','json','xml','csv','pdf','sku','utc','gmt','am','pm','iso','b2b','b2c','seo','sla','kpi','kpis','roi','arr','mrr','ltv','cac','aml','kyc','pii','pci','ssn','ein','tin','isbn','imei','mac','os','db','ui','ux','cdn','cms','fcm','sms','mms','tcp','udp','smtp','imap','pop3','ftp','ssh','tls','ssl','jwt','sso','mfa','2fa','otp','qr','rgb','rgba','hex']);
function humanize(s){
 if (s == null || s === '') return '';
 const str = String(s);
 const parts = str
   .replace(/[._\-]+/g,' ')
   .replace(/([a-z\d])([A-Z])/g,'$1 $2')
   .replace(/([A-Z]+)([A-Z][a-z])/g,'$1 $2')
   .replace(/(\d+)([A-Za-z])/g,'$1 $2')
   .replace(/([A-Za-z])(\d+)/g,'$1 $2')
   .toLowerCase()
   .split(/\s+/).filter(Boolean);
 return parts.map(w => ACRONYMS.has(w) ? w.toUpperCase() : w[0].toUpperCase() + w.slice(1)).join(' ');
}
function formatNum(n){
 if (n === null || n === undefined || isNaN(n)) return '—';
 if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(2).replace(/\.?0+$/,'') + 'B';
 if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2).replace(/\.?0+$/,'') + 'M';
 if (Math.abs(n) >= 1e4) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K';
 if (Number.isInteger(n)) return n.toLocaleString('en-US');
 return n.toFixed(2);
}
function formatDate(t, short){
 if (!t) return '—';
 const d = new Date(t);
 if (isNaN(d)) return '—';
 if (short) return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
 return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function escapeHTML(s){ if (s == null) return ''; return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function escapeAttr(s){ return escapeHTML(s).replace(/`/g,'&#96;'); }
function cssId(s){ return String(s).replace(/[^a-zA-Z0-9]/g,'_'); }
function toast(type, title, msg){
 const wrap = document.getElementById('toastWrap');
 const t = document.createElement('div');
 t.className = `toast ${type}`;
 t.innerHTML = `<div class="toast-title">${escapeHTML(title)}</div><div class="toast-msg">${escapeHTML(msg)}</div>`;
 wrap.appendChild(t);
 setTimeout(() => { t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3500);
}

/* ============================================================
   FILE
   ============================================================ */
function setupFileInput(){
 const fi = document.getElementById('fileInput');
 fi.addEventListener('change', e => { const f = e.target.files[0]; if (f) loadFile(f); fi.value = ''; });
 document.getElementById('loadBtn').addEventListener('click', () => fi.click());
 document.getElementById('resetBtn').addEventListener('click', () => clearFilters());
 document.getElementById('exportBtn').addEventListener('click', exportCSV);
 const dz = document.getElementById('dropzone');
 let dragCount = 0;
 window.addEventListener('dragenter', e => { if (e.dataTransfer && e.dataTransfer.types.includes('Files')){ dragCount++; dz.classList.add('over'); } });
 window.addEventListener('dragover', e => { e.preventDefault(); });
 window.addEventListener('dragleave', e => { dragCount--; if (dragCount <= 0){ dragCount = 0; dz.classList.remove('over'); } });
 window.addEventListener('drop', e => { e.preventDefault(); dragCount = 0; dz.classList.remove('over'); const f = e.dataTransfer.files?.[0]; if (f) loadFile(f); });
}
function loadFile(f){
 if (!f.name.toLowerCase().endsWith('.json')){ toast('error','Wrong format','Please drop a .json file'); return; }
 const reader = new FileReader();
 reader.onload = e => {
   try { const j = JSON.parse(e.target.result); ingestJSON(j, f.name.replace(/\.json$/i,'')); toast('success','Loaded', `${f.name} · ${(f.size/1024).toFixed(1)} KB`); }
   catch(err){ toast('error','Parse error', err.message); }
 };
 reader.readAsText(f);
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
 Chart.defaults.font.family = "'Space Grotesk', system-ui, sans-serif";
 Chart.defaults.font.size = 11;
 Chart.defaults.color = '#9ba3ae';
 setupFileInput();
 document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
 document.getElementById('drawerBack').addEventListener('click', closeDrawer);
 document.getElementById('search').addEventListener('input', e => {
   APP.search = e.target.value; APP.page = 1; updateTopbar(); render();
 });
 document.addEventListener('keydown', e => {
   if (e.key === 'Escape'){ closeDrawer(); document.getElementById('addFilterPop')?.classList.remove('open'); }
   if ((e.ctrlKey || e.metaKey) && e.key === 'k'){ e.preventDefault(); document.getElementById('search').focus(); }
   if (document.getElementById('drawer').classList.contains('open')){
     if (e.key === 'ArrowLeft' && !e.target.matches('input,textarea')) navDrawer(-1);
     if (e.key === 'ArrowRight' && !e.target.matches('input,textarea')) navDrawer(1);
   }
 });
 buildSidebar();
 loadDefault();
}
document.addEventListener('DOMContentLoaded', init);
