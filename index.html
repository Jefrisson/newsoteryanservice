<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BreachShield · Data Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Open Sans',system-ui,-apple-system,sans-serif;background:#080a0d;color:#e2e8f0;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:rgba(220,85,42,.45)}
:root{
  --red:#950f18;--orange:#DC552A;--orange-soft:rgba(220,85,42,.12);
  --bg:#080a0d;--bg1:#0d1015;--bg2:#111318;--bg3:#161a22;--bg4:#1c212c;
  --border:rgba(255,255,255,.06);--border-strong:rgba(255,255,255,.1);
  --border-accent:rgba(220,85,42,.28);
  --text:#e8eaed;--text2:#9ba3ae;--text3:#5f6772;
  --green:#22c55e;--yellow:#f59e0b;--blue:#60a5fa;--purple:#a78bfa;--rose:#f87171;--pink:#f472b6;--cyan:#22d3ee;
}
button{font-family:inherit;border:0;background:transparent;cursor:pointer;color:inherit}
input,select{font-family:inherit;color:inherit}

/* APP LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:280px;height:100vh;position:fixed;left:0;top:0;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar-logo{padding:20px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:11px}
.logo-shield{width:38px;height:38px;flex-shrink:0;filter:drop-shadow(0 4px 12px rgba(220,85,42,.3));transition:transform .3s}
.logo-wrap:hover .logo-shield{transform:scale(1.08) rotate(-3deg)}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:var(--text);letter-spacing:.02em}
.logo-sub{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-top:4px}
.sidebar-scroll{flex:1;overflow-y:auto;padding:6px 0 14px}

.side-section{padding:14px 18px 8px}
.side-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.side-section-title{font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.side-section-action{font-size:10px;color:var(--orange);font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.06em}
.side-section-action:hover{text-decoration:underline}

/* DATASET PICKER */
.ds-pick{display:flex;flex-direction:column;gap:3px}
.ds-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;transition:all .15s;font-size:12.5px;color:var(--text2);font-family:'Space Grotesk',sans-serif;font-weight:500}
.ds-item:hover{background:rgba(255,255,255,.03);color:var(--text)}
.ds-item.active{background:rgba(220,85,42,.1);color:var(--text);box-shadow:inset 2px 0 0 var(--orange)}
.ds-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ds-count{font-size:10px;color:var(--text3);font-weight:600;background:rgba(255,255,255,.05);padding:1px 6px;border-radius:100px}
.ds-item.active .ds-count{background:rgba(220,85,42,.2);color:var(--orange)}

/* FIELD LIST */
.field-list{display:flex;flex-direction:column;gap:1px}
.field-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:12.5px}
.field-row:hover{background:rgba(255,255,255,.03);color:var(--text)}
.field-row.has-filter{background:rgba(220,85,42,.08)}
.type-pill{font-size:8.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:1px 6px;border-radius:4px;font-family:'Space Grotesk',sans-serif;flex-shrink:0;min-width:38px;text-align:center}
.t-num{background:rgba(96,165,250,.16);color:#60a5fa}
.t-cat{background:rgba(167,139,250,.16);color:#a78bfa}
.t-str{background:rgba(148,163,184,.13);color:#94a3b8}
.t-date{background:rgba(34,197,94,.16);color:#22c55e}
.t-bool{background:rgba(245,158,11,.16);color:#f59e0b}
.t-obj{background:rgba(220,85,42,.16);color:#fb923c}
.field-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Space Grotesk',sans-serif;font-weight:500}
.field-row.has-filter .field-name{color:var(--orange);font-weight:600}
.field-card{font-size:11px;color:var(--text3);font-weight:600;font-family:'Space Grotesk',sans-serif}

/* FILTER CHIPS */
.filter-chips{display:flex;flex-direction:column;gap:6px}
.chip{display:flex;align-items:flex-start;gap:6px;padding:7px 9px;background:rgba(220,85,42,.08);border:1px solid rgba(220,85,42,.2);border-radius:8px;font-size:11.5px}
.chip-content{flex:1;min-width:0}
.chip-field{font-size:10px;color:var(--orange);font-weight:700;font-family:'Space Grotesk',sans-serif;text-transform:uppercase;letter-spacing:.06em}
.chip-value{font-size:11.5px;color:var(--text);margin-top:1px;word-break:break-word;line-height:1.35}
.chip-x{color:var(--text3);cursor:pointer;flex-shrink:0;width:14px;height:14px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:all .15s}
.chip-x:hover{background:rgba(248,113,113,.15);color:#f87171}
.no-filters{font-size:11.5px;color:var(--text3);font-style:italic;padding:6px 2px}

.sidebar-footer{padding:12px 18px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.foot-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;font-size:12.5px;color:var(--text2);font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--bg2)}
.foot-btn:hover{border-color:var(--border-accent);color:var(--text);background:var(--bg3)}
.foot-btn svg{width:14px;height:14px;flex-shrink:0}

/* MAIN */
.main{margin-left:280px;flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0}
.topbar{height:62px;background:rgba(8,10,13,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:14px;position:sticky;top:0;z-index:50}
.menu-toggle{cursor:pointer;color:var(--text2);padding:6px;display:none;border-radius:6px}
.menu-toggle:hover{background:rgba(255,255,255,.05)}
.title-block{display:flex;flex-direction:column;line-height:1.25}
.title-block-name{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--text)}
.title-block-meta{font-size:11.5px;color:var(--text3);margin-top:2px;font-family:'Space Grotesk',sans-serif}
.title-block-meta strong{color:var(--orange)}

.view-tabs{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);padding:4px;border-radius:9px;margin-left:14px}
.view-tab{padding:7px 14px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--text3);font-family:'Space Grotesk',sans-serif;display:flex;align-items:center;gap:7px;transition:all .15s}
.view-tab:hover{color:var(--text2)}
.view-tab.active{background:var(--orange);color:white;box-shadow:0 4px 14px rgba(220,85,42,.3)}
.view-tab svg{width:13px;height:13px}

.search-wrap{flex:1;max-width:340px;position:relative;margin-left:auto}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px 9px 36px;color:var(--text);font-size:13px;outline:none;transition:all .2s}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(220,85,42,.1)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;width:14px;height:14px}
.kbd{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;padding:2px 6px;border:1px solid var(--border);border-radius:4px;pointer-events:none}

.btn-primary{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;background:var(--orange);color:white;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12.5px;cursor:pointer;transition:all .15s;border:0}
.btn-primary:hover{background:#e26538;box-shadow:0 6px 20px rgba(220,85,42,.4);transform:translateY(-1px)}
.btn-primary svg{width:13px;height:13px}
.btn-ghost{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;background:var(--bg2);color:var(--text2);border-radius:8px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12.5px;cursor:pointer;transition:all .15s;border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border-accent);color:var(--text);background:var(--bg3)}
.btn-ghost svg{width:13px;height:13px}

.live-pill{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:100px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);font-size:10.5px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;font-family:'Space Grotesk',sans-serif}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}

.content{flex:1;padding:22px;overflow-y:auto;min-width:0}

/* DROP ZONE */
.dropzone{position:fixed;inset:0;background:rgba(8,10,13,.92);backdrop-filter:blur(10px);z-index:500;display:none;align-items:center;justify-content:center;padding:40px}
.dropzone.over{display:flex}
.dz-inner{border:2px dashed var(--orange);border-radius:18px;padding:60px;text-align:center;background:rgba(220,85,42,.05);max-width:520px}
.dz-icon{width:60px;height:60px;margin:0 auto 14px;color:var(--orange)}
.dz-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px}
.dz-sub{font-size:13.5px;color:var(--text2)}

/* WELCOME / EMPTY */
.welcome{max-width:740px;margin:30px auto;text-align:center;padding:40px 24px}
.welcome-shield{width:80px;height:80px;margin:0 auto 22px;filter:drop-shadow(0 8px 30px rgba(220,85,42,.4))}
.welcome-eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-bottom:10px;font-family:'Space Grotesk',sans-serif}
.welcome-h{font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1.1;margin-bottom:14px}
.welcome-h em{color:var(--orange);font-style:normal}
.welcome-sub{font-size:15px;color:var(--text2);line-height:1.6;max-width:560px;margin:0 auto 28px}
.welcome-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.upload-zone{margin-top:36px;border:2px dashed var(--border-strong);border-radius:14px;padding:36px;cursor:pointer;transition:all .2s;background:var(--bg2)}
.upload-zone:hover{border-color:var(--orange);background:rgba(220,85,42,.04)}
.upload-zone svg{width:34px;height:34px;color:var(--orange);margin-bottom:10px}
.upload-zone-title{font-family:'Space Grotesk',sans-serif;font-size:14px;color:var(--text);font-weight:600}
.upload-zone-sub{font-size:12px;color:var(--text3);margin-top:4px}

/* OVERVIEW CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;animation:fadeSlideUp .45s ease both}
.kpi-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--kc,var(--orange))}
.kpi-icon{width:34px;height:34px;border-radius:9px;background:rgba(220,85,42,.12);color:var(--kc,var(--orange));display:flex;align-items:center;justify-content:center;margin-bottom:13px}
.kpi-icon svg{width:17px;height:17px}
.kpi-value{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--text);line-height:1;letter-spacing:-.02em}
.kpi-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:7px;font-weight:600}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:4px}

/* FIELD CARDS */
.fld-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.fld-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .22s;animation:fadeSlideUp .35s ease both;position:relative;overflow:hidden}
.fld-card:hover{border-color:var(--border-accent);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.35)}
.fld-card.active{border-color:var(--orange);box-shadow:0 0 0 1px var(--orange),0 12px 36px rgba(220,85,42,.18)}
.fld-card-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.fld-card-name{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--text);line-height:1.3;flex:1;word-break:break-word}
.fld-card-meta{font-size:11px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace}
.fld-stats{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;padding:10px 12px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;font-size:11.5px}
.fld-stat-item{display:flex;flex-direction:column}
.fld-stat-l{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-weight:700;font-family:'Space Grotesk',sans-serif}
.fld-stat-v{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--text);margin-top:2px}
.fld-chart{height:120px;position:relative}
.fld-top-list{display:flex;flex-direction:column;gap:5px}
.fld-top-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:5px 0;font-size:12px}
.fld-top-bar-wrap{position:relative;background:rgba(255,255,255,.04);border-radius:5px;height:22px;display:flex;align-items:center;padding:0 9px;overflow:hidden;cursor:pointer;transition:background .15s}
.fld-top-bar-wrap:hover{background:rgba(255,255,255,.08)}
.fld-top-bar{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,rgba(220,85,42,.4),rgba(149,15,24,.45));border-radius:5px}
.fld-top-bar.alt{background:linear-gradient(90deg,rgba(96,165,250,.4),rgba(59,130,246,.4))}
.fld-top-bar.cat{background:linear-gradient(90deg,rgba(167,139,250,.4),rgba(139,92,246,.4))}
.fld-top-name{position:relative;z-index:1;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}
.fld-top-count{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:11px;color:var(--text2)}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* TABLE */
.table-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.tt-info{font-size:13px;color:var(--text2)}
.tt-info strong{color:var(--text);font-family:'Space Grotesk',sans-serif;font-weight:700}
.tt-spacer{flex:1}
.col-toggle{position:relative}
.col-menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--bg2);border:1px solid var(--border-strong);border-radius:10px;padding:8px;min-width:220px;max-height:380px;overflow-y:auto;z-index:30;display:none;box-shadow:0 18px 50px rgba(0,0,0,.5)}
.col-menu.open{display:block}
.col-menu-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:6px 10px;font-family:'Space Grotesk',sans-serif}
.col-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--text2);transition:all .12s}
.col-row:hover{background:rgba(255,255,255,.03);color:var(--text)}
.col-row input{width:14px;height:14px;accent-color:var(--orange);flex-shrink:0}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-scroll{overflow:auto;max-height:calc(100vh - 230px)}
table{width:100%;border-collapse:collapse}
thead th{position:sticky;top:0;padding:11px 16px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;font-family:'Space Grotesk',sans-serif}
thead th:hover{color:var(--text2)}
thead th.sorted{color:var(--orange)}
thead th .arrow{margin-left:4px;font-size:9px}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(220,85,42,.04)}
td{padding:10px 16px;font-size:12.5px;color:var(--text2);vertical-align:top;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.cell-num{font-family:'JetBrains Mono',monospace;color:var(--text);text-align:right;font-weight:500}
td.cell-bool{font-family:'Space Grotesk',sans-serif;font-weight:600}
td.cell-bool.yes{color:var(--green)}
td.cell-bool.no{color:var(--rose)}
td.cell-date{font-family:'JetBrains Mono',monospace;color:var(--text2)}
td.cell-cat{font-family:'Space Grotesk',sans-serif}
td.cell-obj{font-family:'JetBrains Mono',monospace;color:var(--text3);font-size:11.5px}
td.cell-null{color:var(--text3);font-style:italic;font-size:11px}

.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--bg3);border-top:1px solid var(--border)}
.page-info{font-size:12px;color:var(--text3);font-family:'Space Grotesk',sans-serif}
.page-controls{display:flex;gap:6px;align-items:center}
.pg-btn{width:30px;height:30px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pg-btn:hover:not(:disabled){border-color:var(--border-accent);color:var(--text)}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-btn svg{width:14px;height:14px}
.page-cur{font-family:'Space Grotesk',sans-serif;font-size:12.5px;color:var(--text);padding:0 10px;font-weight:600}

/* BUILDER */
.builder-grid{display:grid;grid-template-columns:300px 1fr;gap:18px}
.builder-config{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;height:fit-content;position:sticky;top:84px}
.builder-canvas{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:22px;min-height:480px;display:flex;flex-direction:column}
.builder-canvas.empty{align-items:center;justify-content:center;color:var(--text3)}
.cfg-section{margin-bottom:18px}
.cfg-section:last-child{margin-bottom:0}
.cfg-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:7px;font-family:'Space Grotesk',sans-serif}
.cfg-select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12.5px;outline:none;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .15s}
.cfg-select:hover,.cfg-select:focus{border-color:var(--border-accent)}
.chart-types{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ctype{padding:11px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--text3);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:10px;font-weight:600;font-family:'Space Grotesk',sans-serif}
.ctype svg{width:18px;height:18px}
.ctype:hover{border-color:var(--border-strong);color:var(--text2)}
.ctype.active{border-color:var(--orange);background:rgba(220,85,42,.1);color:var(--orange)}
.canvas-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:14px;flex-wrap:wrap}
.canvas-head h3{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--text)}
.canvas-head p{font-size:12px;color:var(--text3);margin-top:3px}
.canvas-chart{flex:1;min-height:380px;position:relative}

/* RECORD MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border-strong);border-radius:16px;max-width:760px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(20px) scale(.96);transition:transform .3s cubic-bezier(.34,1.56,.64,1);position:relative;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-head{padding:22px 26px 18px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;border-bottom:1px solid var(--border)}
.modal-eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);margin-bottom:5px;font-family:'Space Grotesk',sans-serif}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--text);line-height:1.2}
.modal-close{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.05);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s;flex-shrink:0}
.modal-close:hover{background:rgba(248,113,113,.15);color:#f87171;transform:rotate(90deg)}
.modal-body{padding:20px 26px 24px}
.field-detail{display:grid;grid-template-columns:160px 1fr;gap:12px 16px;padding:9px 0;border-bottom:1px solid var(--border);align-items:start}
.field-detail:last-child{border-bottom:none}
.fd-label{font-size:11px;color:var(--text3);font-weight:600;font-family:'Space Grotesk',sans-serif;letter-spacing:.04em;padding-top:2px}
.fd-value{font-size:13px;color:var(--text);word-break:break-word;line-height:1.5}
.fd-value pre{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--bg3);padding:10px;border-radius:7px;overflow-x:auto;color:var(--text2);white-space:pre-wrap;max-height:240px;overflow-y:auto}

/* FILTER EDITOR */
.filter-edit{padding:10px 12px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;margin:6px 10px 0}
.fe-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.fe-row:last-child{margin-bottom:0}
.fe-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;outline:none}
.fe-input:focus{border-color:var(--orange)}
.fe-list{max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.fe-opt{display:flex;align-items:center;gap:7px;padding:5px 6px;font-size:12px;color:var(--text2);cursor:pointer;border-radius:5px;transition:background .12s}
.fe-opt:hover{background:rgba(255,255,255,.03);color:var(--text)}
.fe-opt input{width:13px;height:13px;accent-color:var(--orange)}
.fe-opt-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fe-opt-cnt{font-size:10.5px;color:var(--text3);font-family:'Space Grotesk',sans-serif;font-weight:600}
.fe-actions{display:flex;gap:6px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}
.fe-btn{flex:1;padding:6px 8px;border-radius:6px;font-size:11.5px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .15s}
.fe-btn:hover{border-color:var(--border-accent);color:var(--text)}
.fe-btn.primary{background:var(--orange);color:white;border-color:var(--orange)}
.fe-btn.primary:hover{background:#e26538}

/* CHIP CONTROL EDITOR INLINE - for ranges */
.range-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* TOAST */
.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:2000;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border-strong);border-radius:10px;padding:12px 16px;font-size:12.5px;color:var(--text);box-shadow:0 14px 40px rgba(0,0,0,.5);max-width:340px;animation:toastIn .3s ease both;pointer-events:all}
.toast.error{border-left:3px solid var(--rose)}
.toast.success{border-left:3px solid var(--green)}
.toast-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;margin-bottom:3px;letter-spacing:.04em}
.toast-msg{color:var(--text2);font-size:12px;line-height:1.4}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* RESPONSIVE */
@media (max-width:1100px){.builder-grid{grid-template-columns:1fr}.builder-config{position:static}}
@media (max-width:900px){.sidebar{transform:translateX(-100%);box-shadow:0 0 60px rgba(0,0,0,.5)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.menu-toggle{display:flex}.search-wrap{display:none}}
@media (max-width:600px){.content{padding:16px}.welcome-h{font-size:28px}}

.empty-state{padding:60px 20px;text-align:center;color:var(--text3);background:var(--bg2);border:1px dashed var(--border);border-radius:12px}
.empty-state svg{width:42px;height:42px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:13.5px}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-wrap">
        <svg class="logo-shield" viewBox="0 0 40 48" fill="none">
          <path d="M20 2L4 9v14c0 9.8 7 18.5 16 21 9-2.5 16-11.2 16-21V9L20 2z" fill="url(#sg)"/>
          <path d="M13 24.5l5 5 9-11" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="sg" x1="4" y1="2" x2="36" y2="46" gradientUnits="userSpaceOnUse"><stop stop-color="#DC552A"/><stop offset="1" stop-color="#950f18"/></linearGradient></defs>

    <div class="sidebar-footer">
      <button class="foot-btn" id="loadBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Load JSON file

      <div class="view-tabs" id="viewTabs">
        <button class="view-tab active" data-v="overview">${''}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Overview</button>
        <button class="view-tab" data-v="explore"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Explore</button>
        <button class="view-tab" data-v="builder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="3" y1="20" x2="21" y2="20"/></svg>Reports</button>
      </div>

        <input class="search-input" id="search" placeholder="Search across all fields..." autocomplete="off">
        <span class="kbd">⌘K</span>
      </div>
      <button class="btn-ghost" id="exportBtn" title="Export filtered data as CSV">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modal"></div></div>
<div class="dropzone" id="dropzone">
  <div class="dz-inner">
    <svg class="dz-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <div class="dz-title">Drop JSON file here</div>
    <div class="dz-sub">Auto-detects schema and builds the dashboard</div>
  </div>
</div>
<div class="toast-wrap" id="toastWrap"></div>
<input type="file" id="fileInput" accept=".json,application/json" style="display:none">

<script>
/* ============================================================
   BREACHSHIELD · Data Intelligence
   Generic JSON-driven BI: schema autodetection, filters, reports
   ============================================================ */

const APP = {
 raw: null,           // original parsed JSON
 datasets: {},        // {name: array}
 currentDS: null,     // current dataset name
 schema: {},          // detected schema for current dataset
 filters: {},         // {field: filter}
 search: '',
 view: 'overview',
 sort: {field:null, dir:'asc'},
 page: 1,
 pageSize: 50,
 visibleCols: null,   // null = all
 builder: {type:'bar', x:null, y:null, agg:'count', group:null},
 charts: {},
 expandedFilter: null
};

const palette = ['#DC552A','#950f18','#60a5fa','#22c55e','#f59e0b','#a78bfa','#f472b6','#22d3ee','#fb923c','#84cc16'];

/* ============================================================
   SCHEMA DETECTION
   ============================================================ */
function detectType(v){
 if (v === null || v === undefined) return 'null';
 if (typeof v === 'number') return Number.isFinite(v) ? 'number' : 'null';
 if (typeof v === 'boolean') return 'boolean';
 if (typeof v === 'string'){
   if (v === '') return 'null';
   // detect ISO date or YYYY-MM-DD
   if (/^\d{4}-\d{2}-\d{2}([T\s].*)?$/.test(v)){
     const d = new Date(v);
     if (!isNaN(d)) return 'date';
   }
   return 'string';
 }
 if (Array.isArray(v)) return 'array';
 if (typeof v === 'object') return 'object';
 return 'string';
}

function detectSchema(records){
 const fields = {};
 for (const rec of records){
   if (!rec || typeof rec !== 'object') continue;
   for (const key of Object.keys(rec)){
     if (!fields[key]) fields[key] = {types:{},nulls:0,filled:0,values:new Map(),sample:[],min:null,max:null,sum:0};
     const v = rec[key];
     const t = detectType(v);
     if (t === 'null'){ fields[key].nulls++; continue; }
     fields[key].filled++;
     fields[key].types[t] = (fields[key].types[t]||0) + 1;
     if (t === 'number'){
       if (fields[key].min===null||v<fields[key].min) fields[key].min = v;
       if (fields[key].max===null||v>fields[key].max) fields[key].max = v;
       fields[key].sum += v;
     }
     if (t === 'date'){
       const d = new Date(v).getTime();
       if (fields[key].min===null||d<fields[key].min) fields[key].min = d;
       if (fields[key].max===null||d>fields[key].max) fields[key].max = d;
     }
     // bucket of values for category detection
     if (t === 'string' || t === 'boolean' || t === 'number'){
       const k = String(v);
       fields[key].values.set(k, (fields[key].values.get(k)||0)+1);
     }
     if (fields[key].sample.length < 3) fields[key].sample.push(v);
   }
 }
 // resolve primary type
 for (const key of Object.keys(fields)){
   const f = fields[key];
   const sorted = Object.entries(f.types).sort((a,b)=>b[1]-a[1]);
   f.type = sorted[0]?.[0] || 'string';
   f.cardinality = f.values.size;
   if (f.type === 'string' && f.cardinality > 0 && f.cardinality <= Math.max(20, records.length * 0.15) && f.cardinality < records.length){
     f.type = 'category';
   }
   if (f.type === 'number'){
     f.avg = f.filled ? f.sum / f.filled : 0;
   }
 }
 return fields;
}

/* ============================================================
   DATA LOADING
   ============================================================ */
async function loadDefault(){
 // No auto-load. The app waits for the user to drop their own JSON.
 showWelcome();
}

function ingestJSON(j, sourceName){
 APP.raw = j;
 APP.datasets = {};
 // case 1: top-level array
 if (Array.isArray(j)){
   APP.datasets[sourceName || 'records'] = j.filter(x=>x && typeof x==='object' && !Array.isArray(x));
 }
 // case 2: object with arrays inside (CRM-style)
 else if (j && typeof j === 'object'){
   for (const key of Object.keys(j)){
     const v = j[key];
     if (Array.isArray(v) && v.length && v.every(x=>x && typeof x==='object' && !Array.isArray(x))){
       APP.datasets[key] = v;
     }
   }
   // if nothing found, fallback: wrap the object
   if (!Object.keys(APP.datasets).length){
     APP.datasets['record'] = [j];
   }
 } else {
   toast('error','Bad input','JSON must be an array or object');
   return;
 }

 const names = Object.keys(APP.datasets);
 if (!names.length){
   toast('error','No data','No tabular arrays detected in this JSON');
   showWelcome();
   return;
 }
 // pick the largest dataset by default
 names.sort((a,b)=>APP.datasets[b].length - APP.datasets[a].length);
 switchDataset(names[0]);
 buildSidebar();
}

function switchDataset(name){
 APP.currentDS = name;
 APP.schema = detectSchema(APP.datasets[name]);
 APP.filters = {};
 APP.search = '';
 APP.sort = {field:null, dir:'asc'};
 APP.page = 1;
 APP.visibleCols = null;
 APP.builder = {type:'bar', x:null, y:null, agg:'count', group:null};
 APP.expandedFilter = null;
 const search = document.getElementById('search');
 if (search) search.value = '';
 buildSidebar();
 updateTopbar();
 render();
}

/* ============================================================
   FILTERING
   ============================================================ */
function applyFilters(records){
 const filters = Object.values(APP.filters);
 const q = APP.search.trim().toLowerCase();
 return records.filter(rec => {
   if (q){
     const hay = Object.values(rec).map(v => v==null?'':String(v)).join(' ').toLowerCase();
     if (!hay.includes(q)) return false;
   }
   for (const f of filters){
     if (!testFilter(rec, f)) return false;
   }
   return true;
 });
}

function testFilter(rec, f){
 const v = rec[f.field];
 if (v === null || v === undefined || v === '') return false;
 if (f.op === 'in'){
   return f.values.includes(String(v));
 }
 if (f.op === 'between'){
   const n = Number(v);
   return n >= f.min && n <= f.max;
 }
 if (f.op === 'date_between'){
   const t = new Date(v).getTime();
   return t >= f.min && t <= f.max;
 }
 if (f.op === 'contains'){
   return String(v).toLowerCase().includes(String(f.text).toLowerCase());
 }
 if (f.op === 'bool'){
   return Boolean(v) === f.value;
 }
 return true;
}

function getFiltered(){
 if (!APP.currentDS) return [];
 return applyFilters(APP.datasets[APP.currentDS]);
}

/* ============================================================
   SIDEBAR
   ============================================================ */
function buildSidebar(){
 const root = document.getElementById('sidebarScroll');
 if (!APP.currentDS){
   root.innerHTML = `<div style="padding:30px 20px;text-align:center;color:var(--text3);font-size:13px;line-height:1.5">No dataset loaded.<br>Drop a JSON file or click <strong style="color:var(--orange)">Load JSON file</strong> below.</div>`;
   return;
 }
 const dsNames = Object.keys(APP.datasets);
 const filterCount = Object.keys(APP.filters).length;

 let html = '';
 if (dsNames.length > 1){
   html += `<div class="side-section">
     <div class="side-section-head"><div class="side-section-title">Datasets · ${dsNames.length}</div></div>
     <div class="ds-pick">
       ${dsNames.map(n=>`<div class="ds-item ${n===APP.currentDS?'active':''}" data-ds="${escapeAttr(n)}">
         <span class="ds-name">${escapeHTML(n)}</span>
         <span class="ds-count">${APP.datasets[n].length}</span>
       </div>`).join('')}
     </div>
   </div>`;
 }

 html += `<div class="side-section">
   <div class="side-section-head">
     <div class="side-section-title">Filters · ${filterCount}</div>
     ${filterCount?`<div class="side-section-action" onclick="clearFilters()">Clear</div>`:''}
   </div>
   <div class="filter-chips" id="filterChips">${renderChips()}</div>
 </div>`;

 const fields = Object.entries(APP.schema);
 html += `<div class="side-section">
   <div class="side-section-head">
     <div class="side-section-title">Fields · ${fields.length}</div>
   </div>
   <div class="field-list" id="fieldList">
     ${fields.map(([name,f])=>{
       const has = !!APP.filters[name];
       const expanded = APP.expandedFilter === name;
       return `<div class="field-row ${has?'has-filter':''}" data-field="${escapeAttr(name)}">
         <span class="type-pill t-${typeShort(f.type)}">${typeAbbr(f.type)}</span>
         <span class="field-name" title="${escapeAttr(name)}">${escapeHTML(name)}</span>
         <span class="field-card">${fieldStat(f)}</span>
       </div>${expanded?renderFilterEditor(name,f):''}`;
     }).join('')}
   </div>
 </div>`;

 root.innerHTML = html;
 root.querySelectorAll('.ds-item').forEach(el => el.addEventListener('click', () => switchDataset(el.dataset.ds)));
 root.querySelectorAll('.field-row').forEach(el => el.addEventListener('click', () => toggleFilterEditor(el.dataset.field)));
}

function renderChips(){
 const filters = Object.entries(APP.filters);
 if (!filters.length) return '<div class="no-filters">No active filters</div>';
 return filters.map(([key,f]) => `<div class="chip">
   <div class="chip-content">
     <div class="chip-field">${escapeHTML(key)}</div>
     <div class="chip-value">${chipDescription(f)}</div>
   </div>
   <span class="chip-x" onclick="event.stopPropagation();removeFilter('${escapeAttr(key)}')">×</span>
 </div>`).join('');
}

function chipDescription(f){
 if (f.op === 'in') return f.values.length > 3 ? f.values.slice(0,3).join(', ') + ` <span style="color:var(--text3)">+${f.values.length-3}</span>` : f.values.join(', ');
 if (f.op === 'between') return `${formatNum(f.min)} – ${formatNum(f.max)}`;
 if (f.op === 'date_between') return `${formatDate(f.min)} – ${formatDate(f.max)}`;
 if (f.op === 'contains') return `contains "${escapeHTML(f.text)}"`;
 if (f.op === 'bool') return f.value ? 'true' : 'false';
 return '';
}

function fieldStat(f){
 if (f.type === 'number') return `${formatNum(f.min)}–${formatNum(f.max)}`;
 if (f.type === 'date'){ const a = formatDate(f.min); const b = formatDate(f.max); return a===b?a:`${a}…`; }
 if (f.type === 'category') return `${f.cardinality}`;
 if (f.type === 'string') return f.cardinality > 999 ? '999+' : `${f.cardinality}`;
 if (f.type === 'boolean') return 'T/F';
 return '';
}

function typeShort(t){ return ({'number':'num','category':'cat','string':'str','date':'date','boolean':'bool','object':'obj','array':'obj'})[t] || 'str'; }
function typeAbbr(t){ return ({'number':'NUM','category':'CAT','string':'STR','date':'DATE','boolean':'BOOL','object':'OBJ','array':'ARR'})[t] || 'STR'; }

function toggleFilterEditor(field){
 APP.expandedFilter = APP.expandedFilter === field ? null : field;
 buildSidebar();
}

function renderFilterEditor(name, f){
 const active = APP.filters[name];
 if (f.type === 'category' || (f.type === 'string' && f.cardinality <= 30)){
   const top = [...f.values.entries()].sort((a,b)=>b[1]-a[1]);
   const sel = active && active.op === 'in' ? new Set(active.values) : new Set();
   return `<div class="filter-edit" id="fe-${escapeAttr(name)}" onclick="event.stopPropagation()">
     <div class="fe-list">
       ${top.map(([val,cnt])=>`<label class="fe-opt">
         <input type="checkbox" data-val="${escapeAttr(val)}" ${sel.has(val)?'checked':''}>
         <span class="fe-opt-label">${escapeHTML(val)}</span>
         <span class="fe-opt-cnt">${cnt}</span>
       </label>`).join('')}
     </div>
     <div class="fe-actions">
       <button class="fe-btn" onclick="cancelFilter('${escapeAttr(name)}')">Cancel</button>
       <button class="fe-btn primary" onclick="applyCategoryFilter('${escapeAttr(name)}')">Apply</button>
     </div>
   </div>`;
 }
 if (f.type === 'number'){
   const min = active && active.op === 'between' ? active.min : f.min;
   const max = active && active.op === 'between' ? active.max : f.max;
   return `<div class="filter-edit" id="fe-${escapeAttr(name)}" onclick="event.stopPropagation()">
     <div class="fe-row" style="font-size:11px;color:var(--text3);font-family:'Space Grotesk'">Range: ${formatNum(f.min)} – ${formatNum(f.max)}</div>
     <div class="range-row">
       <input class="fe-input" type="number" id="fmin-${escapeAttr(name)}" placeholder="min" value="${min}">
       <input class="fe-input" type="number" id="fmax-${escapeAttr(name)}" placeholder="max" value="${max}">
     </div>
     <div class="fe-actions">
       <button class="fe-btn" onclick="cancelFilter('${escapeAttr(name)}')">Cancel</button>
       <button class="fe-btn primary" onclick="applyRangeFilter('${escapeAttr(name)}')">Apply</button>
     </div>
   </div>`;
 }
 if (f.type === 'date'){
   const min = active && active.op === 'date_between' ? new Date(active.min).toISOString().slice(0,10) : new Date(f.min).toISOString().slice(0,10);
   const max = active && active.op === 'date_between' ? new Date(active.max).toISOString().slice(0,10) : new Date(f.max).toISOString().slice(0,10);
   return `<div class="filter-edit" id="fe-${escapeAttr(name)}" onclick="event.stopPropagation()">
     <div class="range-row">
       <input class="fe-input" type="date" id="fmin-${escapeAttr(name)}" value="${min}">
       <input class="fe-input" type="date" id="fmax-${escapeAttr(name)}" value="${max}">
     </div>
     <div class="fe-actions">
       <button class="fe-btn" onclick="cancelFilter('${escapeAttr(name)}')">Cancel</button>
       <button class="fe-btn primary" onclick="applyDateFilter('${escapeAttr(name)}')">Apply</button>
     </div>
   </div>`;
 }
 if (f.type === 'boolean'){
   const cur = active && active.op === 'bool' ? active.value : null;
   return `<div class="filter-edit" id="fe-${escapeAttr(name)}" onclick="event.stopPropagation()">
     <div class="fe-list">
       <label class="fe-opt"><input type="radio" name="b-${escapeAttr(name)}" data-v="true" ${cur===true?'checked':''}><span class="fe-opt-label" style="color:var(--green);font-weight:600">true</span></label>
       <label class="fe-opt"><input type="radio" name="b-${escapeAttr(name)}" data-v="false" ${cur===false?'checked':''}><span class="fe-opt-label" style="color:var(--rose);font-weight:600">false</span></label>
     </div>
     <div class="fe-actions">
       <button class="fe-btn" onclick="cancelFilter('${escapeAttr(name)}')">Cancel</button>
       <button class="fe-btn primary" onclick="applyBoolFilter('${escapeAttr(name)}')">Apply</button>
     </div>
   </div>`;
 }
 // string with high cardinality → contains
 const cur = active && active.op === 'contains' ? active.text : '';
 return `<div class="filter-edit" id="fe-${escapeAttr(name)}" onclick="event.stopPropagation()">
   <div class="fe-row"><input class="fe-input" id="ftxt-${escapeAttr(name)}" placeholder="Text contains..." value="${escapeAttr(cur)}"></div>
   <div class="fe-actions">
     <button class="fe-btn" onclick="cancelFilter('${escapeAttr(name)}')">Cancel</button>
     <button class="fe-btn primary" onclick="applyTextFilter('${escapeAttr(name)}')">Apply</button>
   </div>
 </div>`;
}

function applyCategoryFilter(name){
 const box = document.getElementById('fe-'+name);
 const sel = [...box.querySelectorAll('input[type=checkbox]:checked')].map(i=>i.dataset.val);
 if (sel.length){
   APP.filters[name] = {field:name, op:'in', values:sel};
 } else delete APP.filters[name];
 APP.expandedFilter = null;
 APP.page = 1;
 buildSidebar();
 render();
}
function applyRangeFilter(name){
 const min = parseFloat(document.getElementById('fmin-'+name).value);
 const max = parseFloat(document.getElementById('fmax-'+name).value);
 if (!isNaN(min) && !isNaN(max)){
   APP.filters[name] = {field:name, op:'between', min, max};
 }
 APP.expandedFilter = null;
 APP.page = 1;
 buildSidebar(); render();
}
function applyDateFilter(name){
 const mn = document.getElementById('fmin-'+name).value;
 const mx = document.getElementById('fmax-'+name).value;
 if (mn && mx){
   APP.filters[name] = {field:name, op:'date_between', min:new Date(mn).getTime(), max:new Date(mx+'T23:59:59').getTime()};
 }
 APP.expandedFilter = null;
 APP.page = 1;
 buildSidebar(); render();
}
function applyBoolFilter(name){
 const sel = document.querySelector(`input[name="b-${name}"]:checked`);
 if (sel) APP.filters[name] = {field:name, op:'bool', value: sel.dataset.v === 'true'};
 APP.expandedFilter = null;
 APP.page = 1;
 buildSidebar(); render();
}
function applyTextFilter(name){
 const t = document.getElementById('ftxt-'+name).value.trim();
 if (t) APP.filters[name] = {field:name, op:'contains', text:t};
 else delete APP.filters[name];
 APP.expandedFilter = null;
 APP.page = 1;
 buildSidebar(); render();
}
function cancelFilter(name){
 APP.expandedFilter = null;
 buildSidebar();
}
function removeFilter(name){
 delete APP.filters[name];
 APP.page = 1;
 buildSidebar(); render();
}
function clearFilters(){
 APP.filters = {};
 APP.search = '';
 const s = document.getElementById('search');
 if (s) s.value = '';
 APP.page = 1;
 buildSidebar(); render();
}

/* ============================================================
   TOPBAR
   ============================================================ */
function updateTopbar(){
 if (!APP.currentDS){
   document.getElementById('tbName').textContent = 'No data loaded';
   document.getElementById('tbMeta').textContent = 'Drop a JSON file to begin';
   return;
 }
 document.getElementById('tbName').textContent = APP.currentDS;
 const total = APP.datasets[APP.currentDS].length;
 const filtered = getFiltered().length;
 const fieldCount = Object.keys(APP.schema).length;
 document.getElementById('tbMeta').innerHTML = filtered === total
   ? `<strong>${total.toLocaleString()}</strong> records · ${fieldCount} fields`
   : `<strong>${filtered.toLocaleString()}</strong> of ${total.toLocaleString()} records · ${fieldCount} fields`;
}

/* ============================================================
   VIEWS
   ============================================================ */
function render(){
 updateTopbar();
 Object.values(APP.charts).forEach(c=>{try{c.destroy()}catch(e){}});
 APP.charts = {};
 const el = document.getElementById('content');
 if (!APP.currentDS){ showWelcome(); return; }
 if (APP.view === 'overview') renderOverview(el);
 else if (APP.view === 'explore') renderExplore(el);
 else if (APP.view === 'builder') renderBuilder(el);
}

function fieldCard(name, f, records){
 let body = '';
 if (f.type === 'category' || (f.type === 'string' && f.cardinality <= 12) || f.type === 'boolean'){
   if (f.type === 'boolean') body = `<div class="fld-chart"><canvas id="mini-${cssId(name)}"></canvas></div>`;
   else body = topListHTML(name, records, f.type === 'category' ? 'cat' : 'alt');
 } else if (f.type === 'number'){
   body = `<div class="fld-chart"><canvas id="mini-${cssId(name)}"></canvas></div>`;
 } else if (f.type === 'date'){
   body = `<div class="fld-chart"><canvas id="mini-${cssId(name)}"></canvas></div>`;
 } else if (f.type === 'string'){
   const sample = f.sample[0];
   body = `<div style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono';line-height:1.5">${sample?escapeHTML(String(sample).slice(0,140)):'—'}${sample && String(sample).length>140?'…':''}</div>`;
 } else if (f.type === 'object' || f.type === 'array'){
   const sample = f.sample[0];
   body = `<pre style="font-family:'JetBrains Mono';font-size:10.5px;background:var(--bg3);padding:9px;border-radius:6px;max-height:120px;overflow:auto;color:var(--text3)">${escapeHTML(JSON.stringify(sample,null,2).slice(0,260))}</pre>`;
 }
 return `<div class="fld-card ${APP.filters[name]?'active':''}" onclick="toggleFilterEditor('${escapeAttr(name)}')">
   <div class="fld-card-head">
     <span class="type-pill t-${typeShort(f.type)}">${typeAbbr(f.type)}</span>
     <div style="flex:1;min-width:0">
       <div class="fld-card-name">${escapeHTML(name)}</div>
       <div class="fld-card-meta">${typeAbbr(f.type)} · ${f.filled} filled · ${f.nulls} null</div>
     </div>
   </div>
   ${fieldStatsBlock(f)}
   ${body}
 </div>`;
}

function fieldStatsBlock(f){
 const stats = [];
 if (f.type === 'number'){
   stats.push(['min', formatNum(f.min)]);
   stats.push(['max', formatNum(f.max)]);
   stats.push(['avg', formatNum(f.avg)]);
   stats.push(['sum', formatNum(f.sum)]);
 } else if (f.type === 'category' || f.type === 'string'){
   stats.push(['distinct', f.cardinality.toLocaleString()]);
   stats.push(['filled', f.filled.toLocaleString()]);
   if (f.nulls) stats.push(['null', f.nulls.toLocaleString()]);
 } else if (f.type === 'date'){
   stats.push(['from', formatDate(f.min)]);
   stats.push(['to', formatDate(f.max)]);
   stats.push(['filled', f.filled.toLocaleString()]);
 } else if (f.type === 'boolean'){
   const t = f.values.get('true') || 0;
   const fa = f.values.get('false') || 0;
   stats.push(['true', t.toLocaleString()]);
   stats.push(['false', fa.toLocaleString()]);
 } else {
   stats.push(['filled', f.filled.toLocaleString()]);
   if (f.nulls) stats.push(['null', f.nulls.toLocaleString()]);
 }
 return `<div class="fld-stats">${stats.map(s=>`<div class="fld-stat-item"><div class="fld-stat-l">${s[0]}</div><div class="fld-stat-v">${s[1]}</div></div>`).join('')}</div>`;
}

function topListHTML(name, records, kind){
 const counts = new Map();
 for (const rec of records){
   const v = rec[name];
   if (v === null || v === undefined || v === '') continue;
   const k = String(v);
   counts.set(k, (counts.get(k)||0)+1);
 }
 const top = [...counts.entries()].sort((a,b)=>b[1]-a[1]).slice(0,6);
 const max = top[0]?.[1] || 1;
 if (!top.length) return `<div style="color:var(--text3);font-size:12px;padding:8px 0;font-style:italic">No values</div>`;
 return `<div class="fld-top-list">${top.map(([val,cnt])=>{
   const pct = (cnt/max)*100;
   return `<div class="fld-top-row" onclick="event.stopPropagation();drillFilter('${escapeAttr(name)}', '${escapeAttr(val)}')">
     <div class="fld-top-bar-wrap" title="${escapeAttr(val)}">
       <div class="fld-top-bar ${kind}" style="width:${pct}%"></div>
       <span class="fld-top-name">${escapeHTML(val)}</span>
     </div>
     <span class="fld-top-count">${cnt.toLocaleString()}</span>
   </div>`;
 }).join('')}</div>`;
}

function drillFilter(field, val){
 const cur = APP.filters[field];
 if (cur && cur.op === 'in' && cur.values.length === 1 && cur.values[0] === val){
   delete APP.filters[field];
 } else {
   APP.filters[field] = {field, op:'in', values:[val]};
 }
 APP.page = 1;
 buildSidebar(); render();
}

function initNumberMini(name, records){
 const ctx = document.getElementById('mini-'+cssId(name)); if (!ctx) return;
 const f = APP.schema[name];
 const vals = records.map(r=>r[name]).filter(v=>typeof v === 'number');
 if (!vals.length) return;
 const bins = 10;
 const min = f.min, max = f.max;
 const span = (max - min) || 1;
 const buckets = Array(bins).fill(0);
 for (const v of vals){
   const idx = Math.min(bins-1, Math.floor((v-min)/span*bins));
   buckets[idx]++;
 }
 const labels = buckets.map((_,i)=>formatNum(min + (i+0.5)*span/bins));
 APP.charts['mini-'+name] = new Chart(ctx, {
   type:'bar',
   data:{labels, datasets:[{data:buckets, backgroundColor:'rgba(220,85,42,.45)', borderColor:'#DC552A', borderWidth:1, borderRadius:3}]},
   options:miniOpts()
 });
}

function initDateMini(name, records){
 const ctx = document.getElementById('mini-'+cssId(name)); if (!ctx) return;
 const f = APP.schema[name];
 const dates = records.map(r=>r[name]).filter(v=>v).map(v=>new Date(v).getTime()).filter(t=>!isNaN(t));
 if (!dates.length) return;
 const min = f.min, max = f.max;
 const buckets = 14;
 const span = (max - min) || 1;
 const counts = Array(buckets).fill(0);
 for (const t of dates){
   const idx = Math.min(buckets-1, Math.floor((t-min)/span*buckets));
   counts[idx]++;
 }
 const labels = counts.map((_,i)=>formatDate(min + (i+0.5)*span/buckets));
 APP.charts['mini-'+name] = new Chart(ctx, {
   type:'line',
   data:{labels, datasets:[{data:counts, borderColor:'#22c55e', backgroundColor:'rgba(34,197,94,.18)', borderWidth:2, tension:.4, fill:true, pointRadius:0}]},
   options:miniOpts()
 });
}

function initBoolMini(name, records){
 const ctx = document.getElementById('mini-'+cssId(name)); if (!ctx) return;
 let t = 0, fa = 0;
 for (const rec of records){
   if (rec[name] === true) t++;
   else if (rec[name] === false) fa++;
 }
 APP.charts['mini-'+name] = new Chart(ctx, {
   type:'doughnut',
   data:{labels:['true','false'],datasets:[{data:[t,fa],backgroundColor:['#22c55e','#f87171'],borderWidth:0}]},
   options:{responsive:true,maintainAspectRatio:false,cutout:'65%',animation:{duration:900,easing:'easeOutQuart'},plugins:{legend:{position:'bottom',labels:{color:'#9ba3ae',boxWidth:10,padding:8,font:{size:11}}}}}
 });
}

function miniOpts(){
 return {
   responsive:true, maintainAspectRatio:false,
   animation:{duration:900,easing:'easeOutQuart'},
   plugins:{legend:{display:false},tooltip:{backgroundColor:'#1c212c',padding:8,cornerRadius:6,displayColors:false,titleFont:{size:11},bodyFont:{size:11}}},
   scales:{
     y:{display:false,grid:{display:false}},
     x:{grid:{display:false},ticks:{color:'#5f6772',font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:5}}
   }
 };
}

   EXPLORE / TABLE
   ============================================================ */
function renderExplore(el){
 const records = getFiltered();
 const allCols = Object.keys(APP.schema);
 const cols = APP.visibleCols || allCols;
 // sort
 if (APP.sort.field){
   const f = APP.sort.field, dir = APP.sort.dir;
   records.sort((a,b)=>{
     const va = a[f], vb = b[f];
     if (va === null || va === undefined || va === '') return 1;
     if (vb === null || vb === undefined || vb === '') return -1;
     if (typeof va === 'number' && typeof vb === 'number') return dir==='asc'?va-vb:vb-va;
     return dir==='asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
   });
 }
 const total = records.length;
 const totalPages = Math.max(1, Math.ceil(total / APP.pageSize));

     <div class="col-menu" id="colMenu">
       <div class="col-menu-title">Visible columns</div>
       ${allCols.map(c=>`<label class="col-row"><input type="checkbox" data-col="${escapeAttr(c)}" ${cols.includes(c)?'checked':''}><span class="type-pill t-${typeShort(APP.schema[c].type)}">${typeAbbr(APP.schema[c].type)}</span><span style="flex:1;font-family:'Space Grotesk';font-weight:500">${escapeHTML(c)}</span></label>`).join('')}
     </div>
   </div>
  </div>
  <div class="table-wrap">
   <div class="table-scroll">
   <table>
    <thead><tr>${cols.map(c=>{
      const sorted = APP.sort.field === c;
      return `<th data-sort="${escapeAttr(c)}" class="${sorted?'sorted':''}"><span class="type-pill t-${typeShort(APP.schema[c].type)}" style="margin-right:6px">${typeAbbr(APP.schema[c].type)}</span>${escapeHTML(c)}${sorted?`<span class="arrow">${APP.sort.dir==='asc'?'▲':'▼'}</span>`:''}</th>`;
    }).join('')}</tr></thead>
    <tbody>
     ${slice.length ? slice.map((rec,i) => `<tr data-idx="${start+i}">${cols.map(c=>renderCell(rec[c], APP.schema[c])).join('')}</tr>`).join('') : `<tr><td colspan="${cols.length}" style="text-align:center;color:var(--text3);padding:40px;font-style:italic">No records match the current filters</td></tr>`}
    </tbody>
   </table>
   </div>
   ${total > APP.pageSize ? `<div class="pagination">
     <div class="page-info">Page ${APP.page} of ${totalPages} · ${APP.pageSize} per page</div>
     <div class="page-controls">
       <button class="pg-btn" id="pgFirst" ${APP.page<=1?'disabled':''}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg></button>
       <button class="pg-btn" id="pgPrev" ${APP.page<=1?'disabled':''}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
       <span class="page-cur">${APP.page} / ${totalPages}</span>
       <button class="pg-btn" id="pgNext" ${APP.page>=totalPages?'disabled':''}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
       <button class="pg-btn" id="pgLast" ${APP.page>=totalPages?'disabled':''}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg></button>
     </div>
   </div>`:''}
  </div>
 `;

 // sort
 el.querySelectorAll('thead th').forEach(th => th.addEventListener('click', () => {
   const f = th.dataset.sort;
   if (APP.sort.field === f) APP.sort.dir = APP.sort.dir === 'asc' ? 'desc' : 'asc';
   else { APP.sort.field = f; APP.sort.dir = 'asc'; }
   render();
 }));
 // row click
 el.querySelectorAll('tbody tr[data-idx]').forEach(tr => tr.addEventListener('click', () => {
   const idx = Number(tr.dataset.idx);
   openRecordModal(records[idx]);
 }));
 // pagination
 const setP = p => { APP.page = Math.max(1, Math.min(totalPages, p)); render(); };
 el.querySelector('#pgFirst')?.addEventListener('click', () => setP(1));
 el.querySelector('#pgPrev')?.addEventListener('click', () => setP(APP.page-1));
 el.querySelector('#pgNext')?.addEventListener('click', () => setP(APP.page+1));
 el.querySelector('#pgLast')?.addEventListener('click', () => setP(totalPages));
 // columns menu
 const colBtn = el.querySelector('#colBtn');
 const colMenu = el.querySelector('#colMenu');
 colBtn?.addEventListener('click', e => { e.stopPropagation(); colMenu.classList.toggle('open'); });
 document.addEventListener('click', () => colMenu?.classList.remove('open'), {once:true});
 colMenu?.addEventListener('click', e => e.stopPropagation());
 colMenu?.querySelectorAll('input').forEach(i => i.addEventListener('change', () => {
   const checked = [...colMenu.querySelectorAll('input:checked')].map(x=>x.dataset.col);
   APP.visibleCols = checked.length ? checked : null;
   render();
 }));
}

function renderCell(v, f){
 if (v === null || v === undefined || v === '') return `<td class="cell-null">—</td>`;
 if (f.type === 'number') return `<td class="cell-num">${formatNum(v)}</td>`;
 if (f.type === 'boolean') return `<td class="cell-bool ${v?'yes':'no'}">${v?'true':'false'}</td>`;
 if (f.type === 'date') return `<td class="cell-date">${formatDate(new Date(v).getTime())}</td>`;
 if (f.type === 'object' || f.type === 'array') return `<td class="cell-obj" title="${escapeAttr(JSON.stringify(v))}">${escapeHTML(JSON.stringify(v).slice(0,50))}${JSON.stringify(v).length>50?'…':''}</td>`;
 if (f.type === 'category') return `<td class="cell-cat">${escapeHTML(String(v))}</td>`;
 return `<td title="${escapeAttr(String(v))}">${escapeHTML(String(v))}</td>`;
}

/* ============================================================
   RECORD MODAL
   ============================================================ */
function openRecordModal(rec){
 const fields = Object.keys(APP.schema);
 const rows = fields.map(name => {
   const f = APP.schema[name];
   const v = rec[name];
   let val;
   if (v === null || v === undefined || v === '') val = '<span style="color:var(--text3);font-style:italic">null</span>';
   else if (f.type === 'object' || f.type === 'array') val = `<pre>${escapeHTML(JSON.stringify(v,null,2))}</pre>`;
   else if (f.type === 'date') val = formatDate(new Date(v).getTime()) + ` <span style="color:var(--text3);font-size:11px;margin-left:4px">${escapeHTML(String(v))}</span>`;
   else if (f.type === 'number') val = `<span style="font-family:'JetBrains Mono';font-weight:500">${formatNum(v)}</span>`;
   else if (f.type === 'boolean') val = `<span style="color:${v?'var(--green)':'var(--rose)'};font-weight:600;font-family:'Space Grotesk'">${v?'true':'false'}</span>`;
   else val = escapeHTML(String(v));
   return `<div class="field-detail">
     <div class="fd-label"><span class="type-pill t-${typeShort(f.type)}" style="margin-right:6px">${typeAbbr(f.type)}</span>${escapeHTML(name)}</div>
     <div class="fd-value">${val}</div>
   </div>`;
 }).join('');
 const titleField = fields.find(k => /name|title|number|id$/i.test(k) && rec[k]) || fields[0];
 const title = rec[titleField] != null ? String(rec[titleField]) : '(record)';
 document.getElementById('modal').innerHTML = `
   <div class="modal-head">
     <div>
       <div class="modal-eyebrow">${escapeHTML(APP.currentDS)} · record</div>
       <div class="modal-title">${escapeHTML(title)}</div>
     </div>
     <button class="modal-close" onclick="closeModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
   </div>
   <div class="modal-body">${rows}</div>
 `;
 document.getElementById('modalOverlay').classList.add('open');
 document.body.style.overflow = 'hidden';
}

function closeModal(){
 document.getElementById('modalOverlay').classList.remove('open');
 document.body.style.overflow = '';
}

/* ============================================================
   BUILDER (REPORTS)
   ============================================================ */
function renderBuilder(el){
 const fields = Object.entries(APP.schema);
 const ctypes = [
   {id:'bar',label:'Bar', svg:'<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>'},
   {id:'line',label:'Line', svg:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>'},
   {id:'pie',label:'Pie', svg:'<path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>'},
   {id:'doughnut',label:'Donut', svg:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/>'}
 ];

 // pick defaults
 if (!APP.builder.x){
   const cat = fields.find(([,f])=>f.type==='category'||f.type==='string'||f.type==='boolean');
   if (cat) APP.builder.x = cat[0];
 }
 if (!APP.builder.y){
   const num = fields.find(([,f])=>f.type==='number');
   if (num) APP.builder.y = num[0];
 }

 el.innerHTML = `
  <div class="builder-grid">
   <div class="builder-config">
    <div class="cfg-section">
      <div class="cfg-label">Chart type</div>
      <div class="chart-types">
        ${ctypes.map(t=>`<div class="ctype ${APP.builder.type===t.id?'active':''}" data-t="${t.id}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${t.svg}</svg>
          ${t.label}
        </div>`).join('')}
      </div>
    </div>

    <div class="cfg-section">
      <div class="cfg-label">Group by (X / categories)</div>
      <select class="cfg-select" id="bX">
        ${fields.filter(([,f])=>f.type!=='object'&&f.type!=='array').map(([n,f])=>`<option value="${escapeAttr(n)}" ${APP.builder.x===n?'selected':''}>${escapeHTML(n)} · ${typeAbbr(f.type)}</option>`).join('')}
      </select>
    </div>

    <div class="cfg-section">
      <div class="cfg-label">Aggregation</div>
      <select class="cfg-select" id="bAgg">
        <option value="count" ${APP.builder.agg==='count'?'selected':''}>Count records</option>
        <option value="sum" ${APP.builder.agg==='sum'?'selected':''}>Sum of value</option>
        <option value="avg" ${APP.builder.agg==='avg'?'selected':''}>Average of value</option>
        <option value="min" ${APP.builder.agg==='min'?'selected':''}>Minimum of value</option>
        <option value="max" ${APP.builder.agg==='max'?'selected':''}>Maximum of value</option>
      </select>
    </div>

    <div class="cfg-section" id="bYWrap" style="${APP.builder.agg==='count'?'opacity:.4;pointer-events:none':''}">
      <div class="cfg-label">Value field (Y)</div>
      <select class="cfg-select" id="bY">
        ${fields.filter(([,f])=>f.type==='number').map(([n,f])=>`<option value="${escapeAttr(n)}" ${APP.builder.y===n?'selected':''}>${escapeHTML(n)}</option>`).join('') || '<option>(no numeric fields)</option>'}
      </select>
    </div>

    ${APP.builder.type === 'bar' || APP.builder.type === 'line' ? `<div class="cfg-section">
      <div class="cfg-label">Stack / colour by (optional)</div>
      <select class="cfg-select" id="bGroup">
        <option value="">— none —</option>
        ${fields.filter(([n,f])=>(f.type==='category'||f.type==='boolean'||f.type==='string'&&f.cardinality<=15)&&n!==APP.builder.x).map(([n,f])=>`<option value="${escapeAttr(n)}" ${APP.builder.group===n?'selected':''}>${escapeHTML(n)} · ${typeAbbr(f.type)}</option>`).join('')}
      </select>
    </div>` : ''}
   </div>

   <div class="builder-canvas">
    <div class="canvas-head">
     <div>
      <h3 id="canvasTitle">${chartTitle()}</h3>
      <p id="canvasSub">${chartSubtitle()}</p>
     </div>
    </div>
    <div class="canvas-chart"><canvas id="rpChart"></canvas></div>
   </div>
  </div>
 `;
 el.querySelectorAll('.ctype').forEach(b => b.addEventListener('click', () => {
   APP.builder.type = b.dataset.t;
   renderBuilder(el);
 }));
 el.querySelector('#bX')?.addEventListener('change', e => { APP.builder.x = e.target.value; renderBuilder(el); });
 el.querySelector('#bY')?.addEventListener('change', e => { APP.builder.y = e.target.value; renderBuilder(el); });
 el.querySelector('#bAgg')?.addEventListener('change', e => { APP.builder.agg = e.target.value; renderBuilder(el); });
 el.querySelector('#bGroup')?.addEventListener('change', e => { APP.builder.group = e.target.value || null; renderBuilder(el); });
 setTimeout(() => initBuilderChart(), 60);
}

function chartTitle(){
 const x = APP.builder.x || '?';
 if (APP.builder.agg === 'count') return `Records by ${x}`;
 const y = APP.builder.y || '?';
 const aggMap = {sum:'Sum',avg:'Average',min:'Minimum',max:'Maximum'};
 return `${aggMap[APP.builder.agg]} of ${y} by ${x}`;
}
function chartSubtitle(){
 const records = getFiltered();
 return `${records.length.toLocaleString()} filtered records${APP.builder.group?` · stacked by ${APP.builder.group}`:''}`;
}

function initBuilderChart(){
 const ctx = document.getElementById('rpChart'); if (!ctx) return;
 const records = getFiltered();
 const X = APP.builder.x;
 const Y = APP.builder.y;
 const agg = APP.builder.agg;
 const group = APP.builder.group;

 if (!X){ return; }

 // group by X
 const buckets = new Map();
 const xField = APP.schema[X];
 const xKey = (rec) => {
   const v = rec[X];
   if (v === null || v === undefined || v === '') return '(null)';
   if (xField.type === 'date'){
     const d = new Date(v);
     return d.toISOString().slice(0,7); // year-month bucket
   }
   if (xField.type === 'number' && xField.cardinality > 20){
     const span = (xField.max-xField.min)||1;
     const idx = Math.min(9, Math.floor((v-xField.min)/span*10));
     return formatNum(xField.min + idx*span/10) + ' – ' + formatNum(xField.min + (idx+1)*span/10);
   }
   return String(v);
 };
 for (const rec of records){
   const k = xKey(rec);
   if (!buckets.has(k)) buckets.set(k, []);
   buckets.get(k).push(rec);
 }

 // sort buckets
 let entries = [...buckets.entries()];
 if (xField.type === 'date' || (xField.type === 'number' && xField.cardinality > 20)) entries.sort((a,b)=>a[0].localeCompare(b[0]));
 else entries.sort((a,b)=>b[1].length - a[1].length);
 // limit to 20 if non-time
 if (entries.length > 20 && xField.type !== 'date') entries = entries.slice(0,20);

 const labels = entries.map(e=>e[0]);
 const aggregate = (recs) => {
   if (agg === 'count') return recs.length;
   const vals = recs.map(r=>r[Y]).filter(v=>typeof v==='number');
   if (!vals.length) return 0;
   if (agg === 'sum') return vals.reduce((s,v)=>s+v,0);
   if (agg === 'avg') return vals.reduce((s,v)=>s+v,0)/vals.length;
   if (agg === 'min') return Math.min(...vals);
   if (agg === 'max') return Math.max(...vals);
   return 0;
 };

 let datasets;
 if (group){
   const groupVals = [...new Set(records.map(r=>r[group]).filter(v=>v!=null&&v!==''))].slice(0,10);
   datasets = groupVals.map((gv,i) => ({
     label: String(gv),
     data: entries.map(([,recs]) => aggregate(recs.filter(r=>r[group]===gv))),
     backgroundColor: palette[i%palette.length] + (APP.builder.type==='line'?'33':'cc'),
     borderColor: palette[i%palette.length],
     borderWidth: 1.5,
     borderRadius: APP.builder.type==='bar'?6:0,
     tension: .35,
     fill: APP.builder.type === 'line'
   }));
 } else {
   datasets = [{
     label: agg==='count'?'Count':`${agg} of ${Y}`,
     data: entries.map(([,recs])=>aggregate(recs)),
     backgroundColor: APP.builder.type === 'pie' || APP.builder.type === 'doughnut' ? labels.map((_,i)=>palette[i%palette.length]) : 'rgba(220,85,42,.5)',
     borderColor: '#DC552A',
     borderWidth: APP.builder.type === 'pie' || APP.builder.type === 'doughnut' ? 0 : 1.5,
     borderRadius: 6,
     tension: .35,
     fill: APP.builder.type === 'line'
   }];
 }

 const isCircular = APP.builder.type === 'pie' || APP.builder.type === 'doughnut';
 APP.charts.rp = new Chart(ctx, {
   type: APP.builder.type,
   data:{labels, datasets},
   options:{
     responsive:true, maintainAspectRatio:false,
     animation:{duration:1100, easing:'easeOutQuart'},
     plugins:{
       legend:{display: !!group || isCircular, position: isCircular?'right':'top', labels:{color:'#9ba3ae',boxWidth:10,padding:10,font:{size:11.5}}},
       tooltip:{backgroundColor:'#1c212c',padding:10,cornerRadius:8,callbacks:{label:c => isCircular ? `${c.label}: ${formatNum(c.parsed)}` : `${c.dataset.label}: ${formatNum(c.parsed.y)}`}}
     },
     ...(isCircular?{cutout:APP.builder.type==='doughnut'?'62%':0}:{
       scales:{
         x:{grid:{display:false},ticks:{color:'#9ba3ae',font:{size:11},maxRotation:35,autoSkip:true,maxTicksLimit:14}},
         y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#9ba3ae',font:{size:11},callback:v=>formatNum(v)}}
       }
     })
   }
 });

 // click → drill filter
 ctx.onclick = (evt) => {
   const points = APP.charts.rp.getElementsAtEventForMode(evt, 'nearest', {intersect:true}, true);
   if (points.length){
     const idx = points[0].index;
     const label = labels[idx];
     drillFilter(X, label);
     APP.view = 'overview';
     document.querySelectorAll('.view-tab').forEach(b=>b.classList.toggle('active', b.dataset.v==='overview'));
     render();
   }
 };
}

/* ============================================================
   EXPORT CSV
   ============================================================ */
function exportCSV(){
 if (!APP.currentDS){ toast('error','No data','Load a dataset first'); return; }
 const records = getFiltered();
 if (!records.length){ toast('error','No rows','Nothing to export with current filters'); return; }
 const cols = APP.visibleCols || Object.keys(APP.schema);
 const esc = v => {
   if (v == null) return '';
   const s = typeof v === 'object' ? JSON.stringify(v) : String(v);
   return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
 };
 const csv = [cols.join(','), ...records.map(r => cols.map(c => esc(r[c])).join(','))].join('\n');
 const blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8'});
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a');
 a.href = url; a.download = `${APP.currentDS}-${new Date().toISOString().slice(0,10)}.csv`;
 a.click();
 URL.revokeObjectURL(url);
 toast('success','Exported',`${records.length.toLocaleString()} rows · ${cols.length} columns`);
}

/* ============================================================
   UTILITIES
   ============================================================ */
function formatNum(n){
 if (n === null || n === undefined || isNaN(n)) return '—';
 if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(2).replace(/\.?0+$/,'') + 'B';
 if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2).replace(/\.?0+$/,'') + 'M';
 if (Math.abs(n) >= 1e4) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K';
 if (Number.isInteger(n)) return n.toLocaleString('en-US');
 return n.toFixed(2);
}
function formatDate(t){
 if (!t) return '—';
 const d = new Date(t);
 if (isNaN(d)) return '—';
 return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function escapeHTML(s){
 if (s == null) return '';
 return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function escapeAttr(s){ return escapeHTML(s).replace(/`/g,'&#96;'); }
function cssId(s){ return String(s).replace(/[^a-zA-Z0-9]/g,'_'); }

function toast(type, title, msg){
 const wrap = document.getElementById('toastWrap');
 const t = document.createElement('div');
 t.className = `toast ${type}`;
 t.innerHTML = `<div class="toast-title">${escapeHTML(title)}</div><div class="toast-msg">${escapeHTML(msg)}</div>`;
 wrap.appendChild(t);
 setTimeout(() => { t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3500);
}

/* ============================================================
   DRAG & DROP + FILE
   ============================================================ */
function setupFileInput(){
 const fi = document.getElementById('fileInput');
 fi.addEventListener('change', e => {
   const f = e.target.files[0];
   if (f) loadFile(f);
   fi.value = '';
 });
 document.getElementById('loadBtn').addEventListener('click', () => fi.click());
 document.getElementById('resetBtn').addEventListener('click', () => clearFilters());
 document.getElementById('exportBtn').addEventListener('click', exportCSV);

 const dz = document.getElementById('dropzone');
 let dragCount = 0;
 window.addEventListener('dragenter', e => {
   if (e.dataTransfer && e.dataTransfer.types.includes('Files')){
     dragCount++;
     dz.classList.add('over');
   }
 });
 window.addEventListener('dragover', e => { e.preventDefault(); });
 window.addEventListener('dragleave', e => {
   dragCount--;
   if (dragCount <= 0){ dragCount = 0; dz.classList.remove('over'); }
 });
 window.addEventListener('drop', e => {
   e.preventDefault();
   dragCount = 0;
   dz.classList.remove('over');
   const f = e.dataTransfer.files?.[0];
   if (f) loadFile(f);
 });
}

function loadFile(f){
 if (!f.name.toLowerCase().endsWith('.json')){
   toast('error','Wrong format','Please drop a .json file');
   return;
 }
 const reader = new FileReader();
 reader.onload = e => {
   try {
     const j = JSON.parse(e.target.result);
     ingestJSON(j, f.name.replace(/\.json$/i,''));
     toast('success','Loaded', `${f.name} · ${(f.size/1024).toFixed(1)} KB`);
   } catch(err){
     toast('error','Parse error', err.message);
   }
 };
 reader.readAsText(f);
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
 // chart defaults
 Chart.defaults.font.family = "'Space Grotesk', system-ui, sans-serif";
 Chart.defaults.font.size = 11.5;
 Chart.defaults.color = '#9ba3ae';

 setupFileInput();

 document.getElementById('menuToggle').addEventListener('click', () => {
   document.getElementById('sidebar').classList.toggle('open');
 });
 document.getElementById('modalOverlay').addEventListener('click', e => {
   if (e.target.id === 'modalOverlay') closeModal();
 });
 document.querySelectorAll('.view-tab').forEach(b => b.addEventListener('click', () => {
   APP.view = b.dataset.v;
   document.querySelectorAll('.view-tab').forEach(x => x.classList.toggle('active', x === b));
   render();
 }));
 document.getElementById('search').addEventListener('input', e => {
   APP.search = e.target.value;
   APP.page = 1;
   updateTopbar();
   if (APP.view !== 'builder') render();
 });
 document.addEventListener('keydown', e => {
   if (e.key === 'Escape'){ closeModal(); }
   if ((e.ctrlKey || e.metaKey) && e.key === 'k'){ e.preventDefault(); document.getElementById('search').focus(); }
 });

 buildSidebar();
 loadDefault();
}

document.addEventListener('DOMContentLoaded', init);
</script>
