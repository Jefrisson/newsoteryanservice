<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BreachShield · Data Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Open Sans',system-ui,-apple-system,sans-serif;background:#080a0d;color:#e8eaed;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:rgba(220,85,42,.45)}
:root{
  --red:#950f18;--orange:#DC552A;--orange-2:#fb7a4a;
  --bg:#080a0d;--bg1:#0d1015;--bg2:#111318;--bg3:#161a22;--bg4:#1c212c;
  --border:rgba(255,255,255,.06);--border-2:rgba(255,255,255,.1);--accent:rgba(220,85,42,.28);
  --text:#e8eaed;--text2:#9ba3ae;--text3:#5f6772;--text4:#3d434c;
  --green:#22c55e;--yellow:#f59e0b;--blue:#60a5fa;--purple:#a78bfa;--rose:#f87171;--pink:#f472b6;--cyan:#22d3ee;
}
button{font-family:inherit;border:0;background:transparent;cursor:pointer;color:inherit}
input,select{font-family:inherit;color:inherit}
mark{background:rgba(245,158,11,.35);color:#fde68a;border-radius:2px;padding:0 2px}

/* APP LAYOUT */
.app{display:grid;grid-template-columns:260px 1fr;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;min-width:0;overflow:hidden;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar-logo{padding:18px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-shield{width:34px;height:34px;flex-shrink:0;filter:drop-shadow(0 4px 12px rgba(220,85,42,.3))}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14.5px;color:var(--text);letter-spacing:.01em}
.logo-sub{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-top:4px}
.sidebar-scroll{flex:1;overflow-y:auto;padding:6px 0 14px}
.side-section{padding:12px 16px 6px}
.side-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.side-section-title{font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.side-section-action{font-size:10px;color:var(--orange);font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.06em}
.side-section-action:hover{text-decoration:underline}

.ds-pick{display:flex;flex-direction:column;gap:2px}
.ds-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;transition:all .15s;font-size:12.5px;color:var(--text2);font-family:'Space Grotesk',sans-serif;font-weight:500}
.ds-item:hover{background:rgba(255,255,255,.03);color:var(--text)}
.ds-item.active{background:rgba(220,85,42,.1);color:var(--text);box-shadow:inset 2px 0 0 var(--orange)}
.ds-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ds-count{font-size:10px;color:var(--text3);font-weight:600;background:rgba(255,255,255,.05);padding:1px 6px;border-radius:100px}
.ds-item.active .ds-count{background:rgba(220,85,42,.2);color:var(--orange)}

.field-list{display:flex;flex-direction:column;gap:1px}
.field-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:12px}
.field-row:hover{background:rgba(255,255,255,.03);color:var(--text)}
.field-row.has-filter{background:rgba(220,85,42,.08)}
.field-row.expanded{background:rgba(220,85,42,.06)}
.type-pill{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:1px 5px;border-radius:4px;font-family:'Space Grotesk',sans-serif;flex-shrink:0;min-width:34px;text-align:center}
.t-num{background:rgba(96,165,250,.16);color:#60a5fa}
.t-cat{background:rgba(167,139,250,.16);color:#a78bfa}
.t-str{background:rgba(148,163,184,.13);color:#94a3b8}
.t-date{background:rgba(34,197,94,.16);color:#22c55e}
.t-bool{background:rgba(245,158,11,.16);color:#f59e0b}
.t-obj{background:rgba(220,85,42,.16);color:#fb923c}
.field-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Space Grotesk',sans-serif;font-weight:500}
.field-row.has-filter .field-name{color:var(--orange);font-weight:600}
.field-card-stat{font-size:10.5px;color:var(--text3);font-weight:600;font-family:'Space Grotesk',sans-serif}

.filter-edit{padding:9px 11px;background:rgba(220,85,42,.05);border:1px solid rgba(220,85,42,.18);border-radius:8px;margin:5px 10px}
.fe-row{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.fe-row:last-child{margin-bottom:0}
.fe-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;outline:none}
.fe-input:focus{border-color:var(--orange)}
.fe-list{max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.fe-opt{display:flex;align-items:center;gap:7px;padding:4px 6px;font-size:11.5px;color:var(--text2);cursor:pointer;border-radius:5px;transition:background .12s}
.fe-opt:hover{background:rgba(255,255,255,.03);color:var(--text)}
.fe-opt input{width:13px;height:13px;accent-color:var(--orange);flex-shrink:0}
.fe-opt-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fe-opt-cnt{font-size:10px;color:var(--text3);font-family:'Space Grotesk',sans-serif;font-weight:600}
.fe-actions{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.fe-btn{flex:1;padding:5px 7px;border-radius:6px;font-size:11px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .15s}
.fe-btn:hover{border-color:var(--accent);color:var(--text)}
.fe-btn.primary{background:var(--orange);color:white;border-color:var(--orange)}
.fe-btn.primary:hover{background:#e26538}
.range-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}

.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.foot-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;font-size:12px;color:var(--text2);font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--bg2)}
.foot-btn:hover{border-color:var(--accent);color:var(--text);background:var(--bg3)}
.foot-btn svg{width:14px;height:14px;flex-shrink:0}
.foot-btn.primary{border-color:var(--orange);color:var(--orange);background:rgba(220,85,42,.06)}
.foot-btn.primary:hover{background:rgba(220,85,42,.12)}

/* MAIN */
.main{display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}
.topbar{height:56px;background:rgba(8,10,13,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.menu-toggle{cursor:pointer;color:var(--text2);padding:6px;display:none;border-radius:6px}
.menu-toggle:hover{background:rgba(255,255,255,.05)}
.title-block{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.title-block-name{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.title-block-meta{font-size:11px;color:var(--text3);margin-top:2px;font-family:'Space Grotesk',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.title-block-meta strong{color:var(--orange)}

.search-wrap{flex:1;max-width:380px;position:relative;margin-left:auto}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 34px;color:var(--text);font-size:13px;outline:none;transition:all .2s}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(220,85,42,.1)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;width:13px;height:13px}
.kbd{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;padding:2px 6px;border:1px solid var(--border);border-radius:4px;pointer-events:none}

.btn-primary{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;background:var(--orange);color:white;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12.5px;cursor:pointer;transition:all .15s}
.btn-primary:hover{background:#e26538;box-shadow:0 6px 20px rgba(220,85,42,.4);transform:translateY(-1px)}
.btn-primary svg{width:13px;height:13px}
.btn-ghost{display:inline-flex;align-items:center;gap:7px;padding:8px 12px;background:var(--bg2);color:var(--text2);border-radius:8px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12.5px;cursor:pointer;transition:all .15s;border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--text);background:var(--bg3)}
.btn-ghost svg{width:13px;height:13px}

.live-pill{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:100px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;font-family:'Space Grotesk',sans-serif}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:18px 22px 22px;min-height:0}

/* WELCOME */
.welcome{max-width:760px;margin:30px auto;text-align:center;padding:30px 24px}
.welcome-shield{width:74px;height:74px;margin:0 auto 18px;filter:drop-shadow(0 8px 30px rgba(220,85,42,.4))}
.welcome-eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-bottom:10px;font-family:'Space Grotesk',sans-serif}
.welcome-h{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1.1;margin-bottom:14px}
.welcome-h em{color:var(--orange);font-style:normal}
.welcome-sub{font-size:15px;color:var(--text2);line-height:1.6;max-width:560px;margin:0 auto 26px}
.upload-zone{margin-top:30px;border:2px dashed var(--border-2);border-radius:14px;padding:34px;cursor:pointer;transition:all .2s;background:var(--bg2)}
.upload-zone:hover{border-color:var(--orange);background:rgba(220,85,42,.04)}
.upload-zone svg{width:30px;height:30px;color:var(--orange);margin-bottom:9px}
.upload-zone-title{font-family:'Space Grotesk',sans-serif;font-size:13.5px;color:var(--text);font-weight:600}
.upload-zone-sub{font-size:11.5px;color:var(--text3);margin-top:4px}

/* HERO KPI STRIP */
.hero-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);border:1px solid var(--border);border-radius:11px;padding:14px 16px;position:relative;overflow:hidden;transition:all .25s;animation:kpiIn .45s ease both}
.kpi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--kc,var(--orange))}
.kpi::after{content:'';position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;background:var(--kc,var(--orange));opacity:.06;transition:transform .35s}
.kpi:hover{border-color:var(--border-2);transform:translateY(-2px)}
.kpi:hover::after{transform:scale(1.6)}
.kpi-h{display:flex;align-items:center;gap:8px;margin-bottom:9px;position:relative;z-index:1}
.kpi-icon{width:24px;height:24px;border-radius:6px;background:rgba(220,85,42,.12);color:var(--kc,var(--orange));display:flex;align-items:center;justify-content:center}
.kpi-icon svg{width:13px;height:13px}
.kpi-label{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;font-family:'Space Grotesk',sans-serif}
.kpi-v{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--text);line-height:1.05;letter-spacing:-.02em;position:relative;z-index:1}
.kpi-v.small{font-size:18px}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:5px;position:relative;z-index:1;font-family:'Space Grotesk',sans-serif}
@keyframes kpiIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* INSIGHTS */
.insight-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px;margin-bottom:14px}
.insight-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:16px 18px;animation:kpiIn .5s ease both;display:flex;flex-direction:column;min-height:240px}
.insight-card.featured{background:linear-gradient(135deg,var(--bg2) 0%,rgba(149,15,24,.05) 100%);border-color:rgba(220,85,42,.18)}
.insight-h{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
.insight-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.insight-sub{font-size:10.5px;color:var(--text3);margin-top:2px;font-family:'Space Grotesk',sans-serif;text-transform:uppercase;letter-spacing:.08em}
.insight-canvas{flex:1;position:relative;min-height:160px}
.insight-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;font-style:italic}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;flex-wrap:wrap;min-height:46px}
.fb-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-family:'Space Grotesk',sans-serif;padding:0 4px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:rgba(220,85,42,.1);border:1px solid rgba(220,85,42,.22);border-radius:100px;font-size:11.5px}
.chip-field{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--orange);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em}
.chip-sep{color:var(--text3);font-size:10px}
.chip-value{color:var(--text);font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-x{color:var(--text3);cursor:pointer;width:14px;height:14px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .15s;font-size:14px;line-height:1}
.chip-x:hover{background:rgba(248,113,113,.18);color:#f87171}
.chip-add{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:1px dashed var(--border-2);border-radius:100px;font-size:11.5px;color:var(--text3);font-family:'Space Grotesk',sans-serif;font-weight:600;cursor:pointer;transition:all .15s}
.chip-add:hover{border-color:var(--orange);color:var(--orange)}
.fb-spacer{flex:1}
.fb-clear{font-size:11px;color:var(--text3);cursor:pointer;padding:4px 8px;border-radius:6px;font-family:'Space Grotesk',sans-serif;font-weight:600;transition:all .15s}
.fb-clear:hover{color:var(--rose);background:rgba(248,113,113,.06)}

/* GRID SECTION */
.grid-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;overflow:hidden}
.grid-toolbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg3);flex-wrap:wrap}
.gt-info{font-size:12px;color:var(--text2);font-family:'Space Grotesk',sans-serif}
.gt-info strong{color:var(--text);font-weight:700}
.gt-info em{color:var(--orange);font-style:normal;font-weight:700}
.gt-spacer{flex:1}
.gt-act{position:relative}
.gt-menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--bg2);border:1px solid var(--border-2);border-radius:10px;padding:6px;min-width:240px;max-height:380px;overflow-y:auto;z-index:30;display:none;box-shadow:0 18px 50px rgba(0,0,0,.5)}
.gt-menu.open{display:block;animation:menuIn .15s ease both}
@keyframes menuIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.gt-menu-title{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:6px 10px;font-family:'Space Grotesk',sans-serif}
.col-row{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .12s}
.col-row:hover{background:rgba(255,255,255,.03);color:var(--text)}
.col-row input{width:13px;height:13px;accent-color:var(--orange);flex-shrink:0}

/* TABLE */
.table-scroll{overflow:auto;max-height:calc(100vh - 110px)}
.grid-card .table-scroll{max-height:none}
table{width:100%;border-collapse:collapse}
thead th{position:sticky;top:0;padding:9px 14px;text-align:left;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;font-family:'Space Grotesk',sans-serif;z-index:5}
thead th:hover{color:var(--text2)}
thead th.sorted{color:var(--orange)}
thead th .arrow{margin-left:4px;font-size:9px;display:inline-block}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(220,85,42,.05)}
tbody tr.selected{background:rgba(220,85,42,.12)}
td{padding:9px 14px;font-size:12px;color:var(--text2);vertical-align:top;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.cell-num{font-family:'JetBrains Mono',monospace;color:var(--text);text-align:right;font-weight:500}
td.cell-bool{font-family:'Space Grotesk',sans-serif;font-weight:600}
td.cell-bool.yes{color:var(--green)}
td.cell-bool.no{color:var(--rose)}
td.cell-date{font-family:'JetBrains Mono',monospace;color:var(--text2)}
td.cell-cat{font-family:'Space Grotesk',sans-serif}
td.cell-obj{font-family:'JetBrains Mono',monospace;color:var(--text3);font-size:11px}
td.cell-null{color:var(--text4);font-style:italic;font-size:10.5px}

.pagination{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--bg3);border-top:1px solid var(--border)}
.page-info{font-size:11.5px;color:var(--text3);font-family:'Space Grotesk',sans-serif}
.page-info select{margin:0 4px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:2px 6px;color:var(--text2);font-size:11px;font-family:inherit;cursor:pointer}
.page-controls{display:flex;gap:5px;align-items:center}
.pg-btn{width:28px;height:28px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pg-btn:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-btn svg{width:13px;height:13px}
.page-cur{font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--text);padding:0 8px;font-weight:600}

/* ADD FILTER POPOVER */
.popover{position:fixed;background:var(--bg2);border:1px solid var(--border-2);border-radius:11px;padding:8px;min-width:280px;max-height:420px;overflow-y:auto;z-index:300;box-shadow:0 24px 60px rgba(0,0,0,.6);display:none}
.popover.open{display:block;animation:menuIn .18s ease both}
.pop-title{font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);padding:6px 9px;font-family:'Space Grotesk',sans-serif}
.pop-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--text2);transition:all .12s}
.pop-row:hover{background:rgba(220,85,42,.06);color:var(--text)}
.pop-row .field-name{font-family:'Space Grotesk',sans-serif;font-weight:500}

/* DRAWER */
.drawer{position:fixed;top:0;right:0;bottom:0;width:440px;max-width:100vw;background:var(--bg2);border-left:1px solid var(--border-2);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:200;overflow-y:auto;box-shadow:-20px 0 60px rgba(0,0,0,.5);display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(2px);z-index:150;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-backdrop.open{opacity:1;pointer-events:all}
.drawer-h{padding:18px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:14px;background:var(--bg2);position:sticky;top:0;z-index:5}
.drawer-h-info{flex:1;min-width:0}
.drawer-eye{font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);margin-bottom:5px;font-family:'Space Grotesk',sans-serif}
.drawer-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--text);line-height:1.25;word-break:break-word}
.drawer-x{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.05);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s;flex-shrink:0;border:0}
.drawer-x:hover{background:rgba(248,113,113,.15);color:#f87171;transform:rotate(90deg)}
.drawer-body{flex:1;padding:16px 22px 22px;overflow-y:auto}
.field-row-d{display:grid;grid-template-columns:140px 1fr;gap:10px 14px;padding:9px 0;border-bottom:1px solid var(--border);align-items:start}
.field-row-d:last-child{border-bottom:none}
.fd-label{font-size:10.5px;color:var(--text3);font-weight:700;font-family:'Space Grotesk',sans-serif;letter-spacing:.04em;text-transform:uppercase;padding-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.fd-value{font-size:13px;color:var(--text);word-break:break-word;line-height:1.55;font-family:'Space Grotesk',sans-serif}
.fd-value.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
.fd-value pre{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg3);padding:9px;border-radius:7px;overflow:auto;color:var(--text2);white-space:pre-wrap;max-height:240px}
.drawer-nav{display:flex;justify-content:space-between;gap:8px;padding:12px 22px;border-top:1px solid var(--border);background:var(--bg2)}
.drawer-nav button{flex:1;padding:9px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:12px;font-family:'Space Grotesk',sans-serif;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.drawer-nav button:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
.drawer-nav button:disabled{opacity:.4;cursor:not-allowed}
.drawer-nav button svg{width:13px;height:13px}

/* DROP ZONE */
.dropzone{position:fixed;inset:0;background:rgba(8,10,13,.92);backdrop-filter:blur(10px);z-index:500;display:none;align-items:center;justify-content:center;padding:40px}
.dropzone.over{display:flex}
.dz-inner{border:2px dashed var(--orange);border-radius:18px;padding:52px;text-align:center;background:rgba(220,85,42,.05);max-width:520px}
.dz-icon{width:54px;height:54px;margin:0 auto 14px;color:var(--orange)}
.dz-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px}
.dz-sub{font-size:13px;color:var(--text2)}

/* TOAST */
.toast-wrap{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:8px;z-index:2000;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border-2);border-radius:10px;padding:11px 15px;font-size:12px;color:var(--text);box-shadow:0 14px 40px rgba(0,0,0,.5);max-width:340px;animation:toastIn .3s ease both;pointer-events:all}
.toast.error{border-left:3px solid var(--rose)}
.toast.success{border-left:3px solid var(--green)}
.toast-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11.5px;margin-bottom:3px;letter-spacing:.04em}
.toast-msg{color:var(--text2);font-size:11.5px;line-height:1.4}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* RESPONSIVE */
@media (max-width:1100px){.hero-strip{grid-template-columns:repeat(3,1fr)}.insight-strip{grid-template-columns:1fr}}
@media (max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:fixed;left:0;top:0;bottom:0;width:280px;z-index:300;transform:translateX(-100%);box-shadow:0 0 60px rgba(0,0,0,.5)}.sidebar.open{transform:translateX(0)}.menu-toggle{display:flex}.search-wrap{display:none}.drawer{width:100%}}
@media (max-width:600px){.content{padding:14px}.hero-strip{grid-template-columns:repeat(2,1fr)}.welcome-h{font-size:26px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-wrap">
        <svg class="logo-shield" viewBox="0 0 40 48" fill="none">
          <path d="M20 2L4 9v14c0 9.8 7 18.5 16 21 9-2.5 16-11.2 16-21V9L20 2z" fill="url(#sg)"/>
          <path d="M13 24.5l5 5 9-11" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="sg" x1="4" y1="2" x2="36" y2="46" gradientUnits="userSpaceOnUse"><stop stop-color="#DC552A"/><stop offset="1" stop-color="#950f18"/></linearGradient></defs>
        </svg>
        <div class="logo-text"><div class="logo-name">BreachShield</div><div class="logo-sub">Data · Intelligence</div></div>
      </div>
    </div>
    <div class="sidebar-scroll" id="sidebarScroll"></div>
    <div class="sidebar-footer">
      <button class="foot-btn primary" id="loadBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Load JSON file
      </button>
      <button class="foot-btn" id="resetBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        Reset filters
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="title-block">
        <div class="title-block-name" id="tbName">No data loaded</div>
        <div class="title-block-meta" id="tbMeta">Drop a JSON file to begin</div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="search-input" id="search" placeholder="Search across all fields…" autocomplete="off">
        <span class="kbd">⌘K</span>
      </div>
      <button class="btn-ghost" id="exportBtn" title="Export filtered data as CSV">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
      <div class="live-pill"><span class="live-dot"></span>Live</div>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>

<aside class="drawer" id="drawer"></aside>
<div class="drawer-backdrop" id="drawerBack"></div>
<div class="popover" id="addFilterPop"></div>
<div class="dropzone" id="dropzone">
  <div class="dz-inner">
    <svg class="dz-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <div class="dz-title">Drop JSON file here</div>
    <div class="dz-sub">Auto-detects schema and builds the dashboard</div>
  </div>
</div>
<div class="toast-wrap" id="toastWrap"></div>
<input type="file" id="fileInput" accept=".json,application/json" style="display:none">

<script>
/* ============================================================
   BREACHSHIELD · Data Intelligence — unified BI workbench
   ============================================================ */

const APP = {
 raw:null, datasets:{}, currentDS:null, schema:{},
 filters:{}, search:'',
 sort:{field:null,dir:'asc'}, page:1, pageSize:25,
 visibleCols:null, expandedFilter:null,
 charts:{}, drawerIdx:null, drawerRecords:[]
};
const palette = ['#DC552A','#60a5fa','#22c55e','#a78bfa','#f59e0b','#f472b6','#22d3ee','#fb923c','#84cc16','#950f18'];

/* ---------- SCHEMA ---------- */
function detectType(v){
 if (v === null || v === undefined) return 'null';
 if (typeof v === 'number') return Number.isFinite(v) ? 'number' : 'null';
 if (typeof v === 'boolean') return 'boolean';
 if (typeof v === 'string'){
   if (v === '') return 'null';
   if (/^\d{4}-\d{2}-\d{2}([T\s].*)?$/.test(v) || /^\d{10,13}$/.test(v) === false && /^\d{1,2}\/\d{1,2}\/\d{2,4}/.test(v)){
     const d = new Date(v);
     if (!isNaN(d) && d.getFullYear() > 1900 && d.getFullYear() < 2200) return 'date';
   }
   return 'string';
 }
 if (Array.isArray(v)) return 'array';
 if (typeof v === 'object') return 'object';
 return 'string';
}

function detectSchema(records){
 const fields = {};
 for (const rec of records){
   if (!rec || typeof rec !== 'object') continue;
   for (const key of Object.keys(rec)){
     if (!fields[key]) fields[key] = {types:{},nulls:0,filled:0,values:new Map(),sample:[],min:null,max:null,sum:0};
     const v = rec[key];
     const t = detectType(v);
     if (t === 'null'){ fields[key].nulls++; continue; }
     fields[key].filled++;
     fields[key].types[t] = (fields[key].types[t]||0) + 1;
     if (t === 'number'){
       if (fields[key].min===null||v<fields[key].min) fields[key].min = v;
       if (fields[key].max===null||v>fields[key].max) fields[key].max = v;
       fields[key].sum += v;
     }
     if (t === 'date'){
       const d = new Date(v).getTime();
       if (fields[key].min===null||d<fields[key].min) fields[key].min = d;
       if (fields[key].max===null||d>fields[key].max) fields[key].max = d;
     }
     if (t === 'string' || t === 'boolean' || t === 'number'){
       const k = String(v);
       fields[key].values.set(k, (fields[key].values.get(k)||0)+1);
     }
     if (fields[key].sample.length < 3) fields[key].sample.push(v);
   }
 }
 for (const key of Object.keys(fields)){
   const f = fields[key];
   const sorted = Object.entries(f.types).sort((a,b)=>b[1]-a[1]);
   f.type = sorted[0]?.[0] || 'string';
   f.cardinality = f.values.size;
   if (f.type === 'string' && f.cardinality > 0 && f.cardinality <= Math.max(20, records.length * 0.15) && f.cardinality < records.length){
     f.type = 'category';
   }
   if (f.type === 'number') f.avg = f.filled ? f.sum / f.filled : 0;
 }
 return fields;
}

/* ---------- LOADING ---------- */
async function loadDefault(){ showWelcome(); }

function ingestJSON(j, sourceName){
 APP.raw = j;
 APP.datasets = {};
 if (Array.isArray(j)){
   APP.datasets[sourceName || 'records'] = j.filter(x=>x && typeof x==='object' && !Array.isArray(x));
 } else if (j && typeof j === 'object'){
   for (const key of Object.keys(j)){
     const v = j[key];
     if (Array.isArray(v) && v.length && v.every(x=>x && typeof x==='object' && !Array.isArray(x))){
       APP.datasets[key] = v;
     }
   }
   if (!Object.keys(APP.datasets).length) APP.datasets['record'] = [j];
 } else { toast('error','Bad input','JSON must be an array or object'); return; }
 const names = Object.keys(APP.datasets);
 if (!names.length){ toast('error','No data','No tabular arrays detected'); showWelcome(); return; }
 names.sort((a,b)=>APP.datasets[b].length - APP.datasets[a].length);
 switchDataset(names[0]);
}

function switchDataset(name){
 APP.currentDS = name;
 APP.schema = detectSchema(APP.datasets[name]);
 APP.filters = {}; APP.search = '';
 APP.sort = {field:null,dir:'asc'};
 APP.page = 1; APP.visibleCols = null; APP.expandedFilter = null;
 const s = document.getElementById('search'); if (s) s.value = '';
 closeDrawer();
 buildSidebar(); render();
}

/* ---------- FILTERS ---------- */
function applyFilters(records){
 const filters = Object.values(APP.filters);
 const q = APP.search.trim().toLowerCase();
 return records.filter(rec => {
   if (q){
     const hay = Object.values(rec).map(v => v==null?'':String(v)).join(' ').toLowerCase();
     if (!hay.includes(q)) return false;
   }
   for (const f of filters){ if (!testFilter(rec, f)) return false; }
   return true;
 });
}
function testFilter(rec, f){
 const v = rec[f.field];
 if (v === null || v === undefined || v === '') return false;
 if (f.op === 'in') return f.values.includes(String(v));
 if (f.op === 'between'){ const n = Number(v); return n >= f.min && n <= f.max; }
 if (f.op === 'date_between'){ const t = new Date(v).getTime(); return t >= f.min && t <= f.max; }
 if (f.op === 'contains') return String(v).toLowerCase().includes(String(f.text).toLowerCase());
 if (f.op === 'bool') return Boolean(v) === f.value;
 return true;
}
function getFiltered(){ return APP.currentDS ? applyFilters(APP.datasets[APP.currentDS]) : []; }

/* ---------- SIDEBAR ---------- */
function buildSidebar(){
 const root = document.getElementById('sidebarScroll');
 if (!APP.currentDS){
   root.innerHTML = `<div style="padding:30px 18px;text-align:center;color:var(--text3);font-size:12.5px;line-height:1.55">No dataset loaded.<br>Drop a JSON file or click <strong style="color:var(--orange)">Load JSON file</strong> below.</div>`;
   return;
 }
 const dsNames = Object.keys(APP.datasets);
 let html = '';
 if (dsNames.length > 1){
   html += `<div class="side-section">
     <div class="side-section-head"><div class="side-section-title">Datasets · ${dsNames.length}</div></div>
     <div class="ds-pick">
       ${dsNames.map(n=>`<div class="ds-item ${n===APP.currentDS?'active':''}" data-ds="${escapeAttr(n)}" title="${escapeAttr(n)}">
         <span class="ds-name">${escapeHTML(humanize(n))}</span>
         <span class="ds-count">${APP.datasets[n].length}</span>
       </div>`).join('')}
     </div>
   </div>`;
 }
 const fields = Object.entries(APP.schema);
 html += `<div class="side-section">
   <div class="side-section-head"><div class="side-section-title">Fields · ${fields.length}</div></div>
   <div class="field-list" id="fieldList">
     ${fields.map(([name,f])=>{
       const has = !!APP.filters[name];
       const expanded = APP.expandedFilter === name;
       return `<div class="field-row ${has?'has-filter':''} ${expanded?'expanded':''}" data-field="${escapeAttr(name)}" title="${escapeAttr(name)}">
         <span class="type-pill t-${typeShort(f.type)}">${typeAbbr(f.type)}</span>
         <span class="field-name">${escapeHTML(humanize(name))}</span>
         <span class="field-card-stat">${fieldStat(f)}</span>
       </div>${expanded?renderFilterEditor(name,f):''}`;
     }).join('')}
   </div>
 </div>`;
 root.innerHTML = html;
 root.querySelectorAll('.ds-item').forEach(el => el.addEventListener('click', () => switchDataset(el.dataset.ds)));
 root.querySelectorAll('.field-row').forEach(el => el.addEventListener('click', () => toggleFilterEditor(el.dataset.field)));
}

function fieldStat(f){
 if (f.type === 'number') return `${formatNum(f.min)}–${formatNum(f.max)}`;
 if (f.type === 'date'){ const a = formatDate(f.min); const b = formatDate(f.max); return a===b?a:`${formatDate(f.min,true)}…`; }
 if (f.type === 'category') return `${f.cardinality}`;
 if (f.type === 'string') return f.cardinality > 999 ? '999+' : `${f.cardinality}`;
 if (f.type === 'boolean') return 'T/F';
 return '';
}

function typeShort(t){ return ({'number':'num','category':'cat','string':'str','date':'date','boolean':'bool','object':'obj','array':'obj'})[t] || 'str'; }
function typeAbbr(t){ return ({'number':'NUM','category':'CAT','string':'STR','date':'DATE','boolean':'BOOL','object':'OBJ','array':'ARR'})[t] || 'STR'; }

function toggleFilterEditor(field){ APP.expandedFilter = APP.expandedFilter === field ? null : field; buildSidebar(); }

function renderFilterEditor(name, f){
 const active = APP.filters[name];
 if (f.type === 'category' || (f.type === 'string' && f.cardinality <= 50) || f.type === 'boolean'){
   const top = [...f.values.entries()].sort((a,b)=>b[1]-a[1]);
   const sel = active && active.op === 'in' ? new Set(active.values) : new Set();
   return `<div class="filter-edit" id="fe-${cssId(name)}" onclick="event.stopPropagation()">
     <div class="fe-list">
       ${top.map(([val,cnt])=>`<label class="fe-opt">
         <input type="checkbox" data-val="${escapeAttr(val)}" ${sel.has(val)?'checked':''}>
         <span class="fe-opt-label">${escapeHTML(val)}</span>
         <span class="fe-opt-cnt">${cnt}</span>
       </label>`).join('')}
     </div>
     <div class="fe-actions">
       <button class="fe-btn" onclick="cancelFilter('${escapeAttr(name)}')">Cancel</button>
       <button class="fe-btn primary" onclick="applyCategoryFilter('${escapeAttr(name)}')">Apply</button>
     </div>
   </div>`;
 }
 if (f.type === 'number'){
   const min = active && active.op === 'between' ? active.min : f.min;
   const max = active && active.op === 'between' ? active.max : f.max;
   return `<div class="filter-edit" id="fe-${cssId(name)}" onclick="event.stopPropagation()">
     <div style="font-size:10.5px;color:var(--text3);font-family:'Space Grotesk';margin-bottom:6px">Range: ${formatNum(f.min)} – ${formatNum(f.max)}</div>
     <div class="range-row">
       <input class="fe-input" type="number" id="fmin-${cssId(name)}" placeholder="min" value="${min}">
       <input class="fe-input" type="number" id="fmax-${cssId(name)}" placeholder="max" value="${max}">
     </div>
     <div class="fe-actions">
       <button class="fe-btn" onclick="cancelFilter('${escapeAttr(name)}')">Cancel</button>
       <button class="fe-btn primary" onclick="applyRangeFilter('${escapeAttr(name)}')">Apply</button>
     </div>
   </div>`;
 }
 if (f.type === 'date'){
   const min = active && active.op === 'date_between' ? new Date(active.min).toISOString().slice(0,10) : new Date(f.min).toISOString().slice(0,10);
   const max = active && active.op === 'date_between' ? new Date(active.max).toISOString().slice(0,10) : new Date(f.max).toISOString().slice(0,10);
   return `<div class="filter-edit" id="fe-${cssId(name)}" onclick="event.stopPropagation()">
     <div class="range-row">
       <input class="fe-input" type="date" id="fmin-${cssId(name)}" value="${min}">
       <input class="fe-input" type="date" id="fmax-${cssId(name)}" value="${max}">
     </div>
     <div class="fe-actions">
       <button class="fe-btn" onclick="cancelFilter('${escapeAttr(name)}')">Cancel</button>
       <button class="fe-btn primary" onclick="applyDateFilter('${escapeAttr(name)}')">Apply</button>
     </div>
   </div>`;
 }
 const cur = active && active.op === 'contains' ? active.text : '';
 return `<div class="filter-edit" id="fe-${cssId(name)}" onclick="event.stopPropagation()">
   <div class="fe-row"><input class="fe-input" id="ftxt-${cssId(name)}" placeholder="Text contains..." value="${escapeAttr(cur)}"></div>
   <div class="fe-actions">
     <button class="fe-btn" onclick="cancelFilter('${escapeAttr(name)}')">Cancel</button>
     <button class="fe-btn primary" onclick="applyTextFilter('${escapeAttr(name)}')">Apply</button>
   </div>
 </div>`;
}

function applyCategoryFilter(name){
 const box = document.getElementById('fe-'+cssId(name));
 const sel = [...box.querySelectorAll('input[type=checkbox]:checked')].map(i=>i.dataset.val);
 if (sel.length) APP.filters[name] = {field:name, op:'in', values:sel}; else delete APP.filters[name];
 APP.expandedFilter = null; APP.page = 1; buildSidebar(); render();
}
function applyRangeFilter(name){
 const min = parseFloat(document.getElementById('fmin-'+cssId(name)).value);
 const max = parseFloat(document.getElementById('fmax-'+cssId(name)).value);
 if (!isNaN(min) && !isNaN(max)) APP.filters[name] = {field:name, op:'between', min, max};
 APP.expandedFilter = null; APP.page = 1; buildSidebar(); render();
}
function applyDateFilter(name){
 const mn = document.getElementById('fmin-'+cssId(name)).value;
 const mx = document.getElementById('fmax-'+cssId(name)).value;
 if (mn && mx) APP.filters[name] = {field:name, op:'date_between', min:new Date(mn).getTime(), max:new Date(mx+'T23:59:59').getTime()};
 APP.expandedFilter = null; APP.page = 1; buildSidebar(); render();
}
function applyTextFilter(name){
 const t = document.getElementById('ftxt-'+cssId(name)).value.trim();
 if (t) APP.filters[name] = {field:name, op:'contains', text:t}; else delete APP.filters[name];
 APP.expandedFilter = null; APP.page = 1; buildSidebar(); render();
}
function cancelFilter(){ APP.expandedFilter = null; buildSidebar(); }
function removeFilter(name){ delete APP.filters[name]; APP.page = 1; buildSidebar(); render(); }
function clearFilters(){ APP.filters = {}; APP.search = ''; const s = document.getElementById('search'); if (s) s.value = ''; APP.page = 1; buildSidebar(); render(); }

/* ---------- TOPBAR ---------- */
function updateTopbar(){
 if (!APP.currentDS){ document.getElementById('tbName').textContent = 'No data loaded'; document.getElementById('tbMeta').textContent = 'Drop a JSON file to begin'; return; }
 document.getElementById('tbName').textContent = humanize(APP.currentDS);
 document.getElementById('tbName').title = APP.currentDS;
 const total = APP.datasets[APP.currentDS].length;
 const filtered = getFiltered().length;
 const fc = Object.keys(APP.schema).length;
 document.getElementById('tbMeta').innerHTML = filtered === total
   ? `<strong>${total.toLocaleString()}</strong> records · ${fc} fields`
   : `<strong>${filtered.toLocaleString()}</strong> of ${total.toLocaleString()} records · ${fc} fields`;
}

/* ---------- RENDER ---------- */
function render(){
 updateTopbar();
 Object.values(APP.charts).forEach(c=>{try{c.destroy()}catch(e){}});
 APP.charts = {};
 const el = document.getElementById('content');
 if (!APP.currentDS){ showWelcome(); return; }
 const records = getFiltered();
 APP.drawerRecords = records;
 el.innerHTML = `
  ${heroStripHTML(records)}
  ${insightsHTML(records)}
  ${filterBarHTML()}
  ${gridHTML(records)}
 `;
 setTimeout(()=>initInsights(records), 60);
 wireGrid();
 wireAddFilter();
}

/* ---------- HERO STRIP (KPIs) ---------- */
function heroStripHTML(records){
 const total = APP.datasets[APP.currentDS].length;
 const fields = Object.entries(APP.schema);
 const cats = fields.filter(([,f])=>f.type==='category');
 const nums = fields.filter(([,f])=>f.type==='number');
 const dates = fields.filter(([,f])=>f.type==='date');

 // pick most "interesting" numeric for sum
 const bestNum = nums.length ? nums.sort((a,b)=>Math.abs(b[1].sum)-Math.abs(a[1].sum))[0] : null;
 const numSum = bestNum ? records.reduce((s,r)=>s + (typeof r[bestNum[0]]==='number'?r[bestNum[0]]:0), 0) : null;
 const numAvg = bestNum && records.length ? numSum / records.filter(r=>typeof r[bestNum[0]]==='number').length : null;

 // top category value
 const bestCat = cats.length ? cats.sort((a,b)=>{
   const score = c => { const x = c[1].cardinality; if (x>=3 && x<=15) return 100 - x; if (x<3) return x; return -x; };
   return score(b) - score(a);
 })[0] : null;
 let topCatVal = null, topCatCnt = 0;
 if (bestCat){
   const counts = new Map();
   for (const r of records){ const v = r[bestCat[0]]; if (v!=null && v!=='') counts.set(String(v), (counts.get(String(v))||0)+1); }
   const top = [...counts.entries()].sort((a,b)=>b[1]-a[1])[0];
   if (top){ topCatVal = top[0]; topCatCnt = top[1]; }
 }

 // date range of filtered
 let dateRange = null;
 if (dates.length){
   const f = dates[0][0];
   const ts = records.map(r=>r[f]).filter(Boolean).map(v=>new Date(v).getTime()).filter(t=>!isNaN(t));
   if (ts.length){ dateRange = {min:Math.min(...ts), max:Math.max(...ts), field:dates[0][0]}; }
 }

 const cards = [];
 cards.push({c:'#DC552A',label:'Records',v:records.length.toLocaleString(),sub:filterPercent(records.length, total),icon:I.list});
 cards.push({c:'#60a5fa',label:'Fields',v:fields.length,sub:`${cats.length} cat · ${nums.length} num · ${dates.length} date`,icon:I.layers});
 cards.push({c:'#a78bfa',label:'Filters',v:Object.keys(APP.filters).length,sub:Object.keys(APP.filters).length?'Active right now':'No filters applied',icon:I.filter});
 if (bestNum){
   cards.push({c:'#22c55e',label:`Sum · ${humanize(bestNum[0])}`,v:formatNum(numSum),sub:'Across filtered',icon:I.sigma,smallV:true});
   if (numAvg !== null && !isNaN(numAvg)) cards.push({c:'#fb923c',label:`Avg · ${humanize(bestNum[0])}`,v:formatNum(numAvg),sub:'Per record',icon:I.bar,smallV:true});
 }
 if (bestCat && topCatVal){
   cards.push({c:'#f472b6',label:`Top · ${humanize(bestCat[0])}`,v:topCatVal.length>14?topCatVal.slice(0,14)+'…':topCatVal,sub:`${topCatCnt.toLocaleString()} records`,icon:I.crown,smallV:true});
 }
 if (dateRange){
   cards.push({c:'#22d3ee',label:`Range · ${humanize(dateRange.field)}`,v:formatDate(dateRange.min,true)+' → '+formatDate(dateRange.max,true),sub:`${Math.round((dateRange.max-dateRange.min)/86400000)} days span`,icon:I.calendar,smallV:true});
 }

 return `<section class="hero-strip">${cards.slice(0,6).map(k=>`
   <div class="kpi" style="--kc:${k.c}">
     <div class="kpi-h">
       <div class="kpi-icon">${k.icon}</div>
       <div class="kpi-label">${escapeHTML(k.label)}</div>
     </div>
     <div class="kpi-v ${k.smallV?'small':''}" title="${escapeAttr(k.v)}">${escapeHTML(k.v)}</div>
     ${k.sub?`<div class="kpi-sub">${escapeHTML(k.sub)}</div>`:''}
   </div>
 `).join('')}</section>`;
}

function filterPercent(n, total){
 if (n === total) return `100% · all data`;
 const pct = total ? Math.round(n/total*100) : 0;
 return `${pct}% of ${total.toLocaleString()}`;
}

/* ---------- INSIGHTS (3 auto charts) ---------- */
function insightsHTML(records){
 const picks = pickAutoCharts();
 if (!picks.length) return '';
 return `<section class="insight-strip">${picks.map((p,i)=>`
   <div class="insight-card ${i===0?'featured':''}">
     <div class="insight-h">
       <div>
         <div class="insight-sub">${p.eyebrow}</div>
         <div class="insight-title">${p.title}</div>
       </div>
     </div>
     <div class="insight-canvas"><canvas id="insight${i}"></canvas></div>
   </div>
 `).join('')}</section>`;
}

function pickAutoCharts(){
 const fields = Object.entries(APP.schema);
 const cats = fields.filter(([,f])=>f.type==='category');
 const nums = fields.filter(([,f])=>f.type==='number');
 const dates = fields.filter(([,f])=>f.type==='date');
 const bools = fields.filter(([,f])=>f.type==='boolean');
 const picks = [];
 // best categorical breakdown
 const bestCat = cats.sort((a,b)=>{
   const score = c => { const x = c[1].cardinality; if (x>=3 && x<=12) return 100 - Math.abs(8 - x); return -x; };
   return score(b) - score(a);
 })[0];
 if (bestCat){ picks.push({type:'doughnut', x:bestCat[0], agg:'count', title:`${humanize(bestCat[0])} breakdown`, eyebrow:'Distribution'}); }
 else if (bools.length){ picks.push({type:'doughnut', x:bools[0][0], agg:'count', title:`${humanize(bools[0][0])}`, eyebrow:'Distribution'}); }
 // num agg by category
 if (nums.length){
   const bn = nums.sort((a,b)=>Math.abs(b[1].sum)-Math.abs(a[1].sum))[0];
   if (bestCat) picks.push({type:'bar', x:bestCat[0], y:bn[0], agg:'sum', title:`${humanize(bn[0])} by ${humanize(bestCat[0])}`, eyebrow:'Aggregation'});
   else picks.push({type:'bar', x:bn[0], agg:'count', title:`${humanize(bn[0])} distribution`, eyebrow:'Histogram', isHistogram:true});
 }
 // time series
 if (dates.length){ picks.push({type:'line', x:dates[0][0], agg:'count', title:`Records over time`, eyebrow:'Trend'}); }
 else if (cats.length > 1 && cats[1]){ picks.push({type:'bar', x:cats[1][0], agg:'count', title:`${humanize(cats[1][0])} breakdown`, eyebrow:'Distribution'}); }
 return picks.slice(0,3);
}

function initInsights(records){
 const picks = pickAutoCharts();
 picks.forEach((p, i) => initChart('insight'+i, p, records));
}

function initChart(id, cfg, records){
 const ctx = document.getElementById(id); if (!ctx) return;
 const X = cfg.x, Y = cfg.y, agg = cfg.agg;
 const xField = APP.schema[X];
 if (!xField) return;
 const xKey = (rec) => {
   const v = rec[X];
   if (v === null || v === undefined || v === '') return '(null)';
   if (xField.type === 'date'){ const d = new Date(v); return d.toISOString().slice(0,7); }
   if (xField.type === 'number' && (xField.cardinality > 20 || cfg.isHistogram)){
     const span = (xField.max-xField.min)||1;
     const idx = Math.min(9, Math.floor((v-xField.min)/span*10));
     return formatNum(xField.min + idx*span/10) + '–' + formatNum(xField.min + (idx+1)*span/10);
   }
   return String(v);
 };
 const buckets = new Map();
 for (const rec of records){
   const k = xKey(rec);
   if (!buckets.has(k)) buckets.set(k, []);
   buckets.get(k).push(rec);
 }
 let entries = [...buckets.entries()];
 if (xField.type === 'date' || (xField.type === 'number' && (xField.cardinality > 20 || cfg.isHistogram))) entries.sort((a,b)=>a[0].localeCompare(b[0]));
 else entries.sort((a,b)=>b[1].length - a[1].length);
 if (entries.length > 12 && cfg.type === 'doughnut') entries = entries.slice(0,12);
 if (entries.length > 20 && xField.type !== 'date') entries = entries.slice(0,20);

 const labels = entries.map(e=>e[0]);
 const aggregate = (recs) => {
   if (agg === 'count') return recs.length;
   const vals = recs.map(r=>r[Y]).filter(v=>typeof v==='number');
   if (!vals.length) return 0;
   if (agg === 'sum') return vals.reduce((s,v)=>s+v,0);
   if (agg === 'avg') return vals.reduce((s,v)=>s+v,0)/vals.length;
   if (agg === 'min') return Math.min(...vals);
   if (agg === 'max') return Math.max(...vals);
   return 0;
 };
 const data = entries.map(([,recs])=>aggregate(recs));
 const isCircular = cfg.type === 'pie' || cfg.type === 'doughnut';

 APP.charts[id] = new Chart(ctx, {
   type: cfg.type,
   data:{labels, datasets:[{
     label: agg==='count'?'Count':`${agg} of ${Y}`,
     data,
     backgroundColor: isCircular ? labels.map((_,i)=>palette[i%palette.length]) : 'rgba(220,85,42,.55)',
     borderColor: isCircular ? labels.map(()=>'rgba(8,10,13,.6)') : '#DC552A',
     borderWidth: isCircular ? 2 : 1.5,
     borderRadius: cfg.type==='bar'?6:0,
     tension:.35, fill: cfg.type==='line', pointRadius: cfg.type==='line'?0:undefined, pointHoverRadius: 4
   }]},
   options:{
     responsive:true, maintainAspectRatio:false,
     animation:{duration:900, easing:'easeOutQuart'},
     plugins:{
       legend:{display: isCircular, position:'right', labels:{color:'#9ba3ae', boxWidth:9, padding:9, font:{size:10.5, family:"'Space Grotesk'"}}},
       tooltip:{backgroundColor:'#1c212c',padding:9,cornerRadius:7,titleFont:{size:11,family:"'Space Grotesk'"},bodyFont:{size:11,family:"'Space Grotesk'"},callbacks:{label:c => isCircular ? `${c.label}: ${formatNum(c.parsed)}` : `${formatNum(c.parsed.y)}`}}
     },
     ...(isCircular?{cutout:cfg.type==='doughnut'?'66%':0}:{
       scales:{
         x:{grid:{display:false},ticks:{color:'#9ba3ae',font:{size:10},maxRotation:35,autoSkip:true,maxTicksLimit:12}},
         y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#9ba3ae',font:{size:10},callback:v=>formatNum(v)},beginAtZero:true}
       }
     })
   }
 });

 ctx.onclick = (evt) => {
   const points = APP.charts[id].getElementsAtEventForMode(evt, 'nearest', {intersect:true}, true);
   if (points.length){
     const idx = points[0].index;
     const label = labels[idx];
     drillFilter(X, label);
   }
 };
}

function drillFilter(field, val){
 const cur = APP.filters[field];
 if (cur && cur.op === 'in' && cur.values.length === 1 && cur.values[0] === val) delete APP.filters[field];
 else APP.filters[field] = {field, op:'in', values:[val]};
 APP.page = 1; buildSidebar(); render();
}

   ${filters.map(([k,f])=>`<span class="chip" title="${escapeAttr(k)}">
     <span class="chip-field">${escapeHTML(humanize(k))}</span>

   <button class="chip-add" id="addFilterBtn">
     <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
     Add filter
   </button>
   ${APP.search ? `<span class="chip" style="background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.22)">
     <span class="chip-field" style="color:var(--yellow)">Search</span>
     <span class="chip-sep">·</span>

   <span class="fb-spacer"></span>
   ${(filters.length || APP.search) ? `<span class="fb-clear" onclick="clearFilters()">Clear all</span>` : ''}
 </section>`;

function chipDescription(f){
 if (f.op === 'in') return f.values.length > 3 ? f.values.slice(0,3).map(escapeHTML).join(', ') + ` <span style="color:var(--text3)">+${f.values.length-3}</span>` : f.values.map(escapeHTML).join(', ');
 if (f.op === 'between') return `${formatNum(f.min)} – ${formatNum(f.max)}`;
 if (f.op === 'date_between') return `${formatDate(f.min)} – ${formatDate(f.max)}`;
 if (f.op === 'contains') return `contains "${escapeHTML(f.text)}"`;
 if (f.op === 'bool') return f.value ? 'true' : 'false';
 return '';
}

function wireAddFilter(){
 const btn = document.getElementById('addFilterBtn');
 const pop = document.getElementById('addFilterPop');
 if (!btn || !pop) return;
 btn.addEventListener('click', e => {
   e.stopPropagation();
   const fields = Object.entries(APP.schema);
   pop.innerHTML = `<div class="pop-title">Pick a field to filter</div>
     ${fields.map(([n,f])=>`<div class="pop-row" data-field="${escapeAttr(n)}">
       <span class="type-pill t-${typeShort(f.type)}">${typeAbbr(f.type)}</span>
       <span class="field-name">${escapeHTML(humanize(n))}</span>
       <span class="field-card-stat">${fieldStat(f)}</span>
     </div>`).join('')}`;
   const r = btn.getBoundingClientRect();
   pop.style.left = r.left + 'px';
   pop.style.top = (r.bottom + 6) + 'px';
   pop.classList.add('open');
   pop.querySelectorAll('.pop-row').forEach(row => row.addEventListener('click', () => {
     pop.classList.remove('open');
     APP.expandedFilter = row.dataset.field;
     buildSidebar();
     // ensure sidebar field is scrolled into view
     setTimeout(() => {
       const fr = document.querySelector(`.field-row[data-field="${row.dataset.field.replace(/"/g,'\\"')}"]`);
       fr?.scrollIntoView({block:'center', behavior:'smooth'});
     }, 50);
   }));
 });
 document.addEventListener('click', (e) => { if (!e.target.closest('.popover') && !e.target.closest('#addFilterBtn')) pop.classList.remove('open'); });
}

/* ---------- GRID (always-visible table) ---------- */
function gridHTML(records){
 const allCols = Object.keys(APP.schema);
 const cols = APP.visibleCols || allCols;
 if (APP.sort.field){
   const f = APP.sort.field, dir = APP.sort.dir;
   records.sort((a,b)=>{
     const va = a[f], vb = b[f];
     if (va === null || va === undefined || va === '') return 1;
     if (vb === null || vb === undefined || vb === '') return -1;
     if (typeof va === 'number' && typeof vb === 'number') return dir==='asc'?va-vb:vb-va;
     return dir==='asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
   });
 }
 const total = records.length;
 const totalPages = Math.max(1, Math.ceil(total / APP.pageSize));
 if (APP.page > totalPages) APP.page = totalPages;
 const start = (APP.page - 1) * APP.pageSize;
 const slice = records.slice(start, start + APP.pageSize);
 APP.drawerRecords = records;

 return `<section class="grid-card">
  <div class="grid-toolbar">
   <span class="gt-info">Showing <strong>${slice.length}</strong> · <em>${total.toLocaleString()}</em> filtered · <strong>${APP.datasets[APP.currentDS].length.toLocaleString()}</strong> total</span>
   <span class="gt-spacer"></span>
   <div class="gt-act">
     <button class="btn-ghost" id="colBtn">
       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
       Columns (${cols.length}/${allCols.length})
     </button>
     <div class="gt-menu" id="colMenu">
       <div class="gt-menu-title">Visible columns</div>
       ${allCols.map(c=>`<label class="col-row" title="${escapeAttr(c)}"><input type="checkbox" data-col="${escapeAttr(c)}" ${cols.includes(c)?'checked':''}><span class="type-pill t-${typeShort(APP.schema[c].type)}">${typeAbbr(APP.schema[c].type)}</span><span style="flex:1;font-family:'Space Grotesk';font-weight:500">${escapeHTML(humanize(c))}</span></label>`).join('')}
     </div>
   </div>
  </div>
  <div class="table-scroll">
   <table>
    <thead><tr>${cols.map(c=>{
      const sorted = APP.sort.field === c;
      return `<th data-sort="${escapeAttr(c)}" class="${sorted?'sorted':''}" title="${escapeAttr(c)}"><span class="type-pill t-${typeShort(APP.schema[c].type)}" style="margin-right:5px">${typeAbbr(APP.schema[c].type)}</span>${escapeHTML(humanize(c))}${sorted?`<span class="arrow">${APP.sort.dir==='asc'?'▲':'▼'}</span>`:''}</th>`;
    }).join('')}</tr></thead>
    <tbody>
     ${slice.length ? slice.map((rec) => {
       const idx = records.indexOf(rec);
       const isSel = APP.drawerIdx === idx;
       return `<tr data-idx="${idx}" class="${isSel?'selected':''}">${cols.map(c=>renderCell(rec[c], APP.schema[c], APP.search)).join('')}</tr>`;
     }).join('') : `<tr><td colspan="${cols.length}" style="text-align:center;color:var(--text3);padding:30px;font-style:italic">No records match the current filters</td></tr>`}
    </tbody>
   </table>
  </div>
  ${total > 0 ? `<div class="pagination">
     <div class="page-info">Page ${APP.page} of ${totalPages} ·
       <select id="pgSize">
         ${[10,25,50,100,250].map(n=>`<option value="${n}" ${APP.pageSize===n?'selected':''}>${n}</option>`).join('')}
       </select>
       per page
     </div>
     <div class="page-controls">
       <button class="pg-btn" id="pgFirst" ${APP.page<=1?'disabled':''}>${I.dleft}</button>
       <button class="pg-btn" id="pgPrev" ${APP.page<=1?'disabled':''}>${I.left}</button>
       <span class="page-cur">${APP.page} / ${totalPages}</span>
       <button class="pg-btn" id="pgNext" ${APP.page>=totalPages?'disabled':''}>${I.right}</button>
       <button class="pg-btn" id="pgLast" ${APP.page>=totalPages?'disabled':''}>${I.dright}</button>
     </div>
   </div>`:''}
 </section>`;
}

function wireGrid(){
 const el = document.getElementById('content');
 if (!el) return;
 el.querySelectorAll('thead th').forEach(th => th.addEventListener('click', () => {
   const f = th.dataset.sort;
   if (APP.sort.field === f) APP.sort.dir = APP.sort.dir === 'asc' ? 'desc' : 'asc';
   else { APP.sort.field = f; APP.sort.dir = 'asc'; }
   render();
 }));
 el.querySelectorAll('tbody tr[data-idx]').forEach(tr => tr.addEventListener('click', () => {
   const idx = Number(tr.dataset.idx);
   openDrawer(idx);
 }));
 const records = APP.drawerRecords || [];
 const totalPages = Math.max(1, Math.ceil(records.length / APP.pageSize));
 const setP = p => { APP.page = Math.max(1, Math.min(totalPages, p)); render(); };
 el.querySelector('#pgFirst')?.addEventListener('click', () => setP(1));
 el.querySelector('#pgPrev')?.addEventListener('click', () => setP(APP.page-1));
 el.querySelector('#pgNext')?.addEventListener('click', () => setP(APP.page+1));
 el.querySelector('#pgLast')?.addEventListener('click', () => setP(totalPages));
 el.querySelector('#pgSize')?.addEventListener('change', e => { APP.pageSize = Number(e.target.value); APP.page = 1; render(); });
 const colBtn = el.querySelector('#colBtn');
 const colMenu = el.querySelector('#colMenu');
 colBtn?.addEventListener('click', e => { e.stopPropagation(); colMenu.classList.toggle('open'); });
 document.addEventListener('click', () => colMenu?.classList.remove('open'), {once:true});
 colMenu?.addEventListener('click', e => e.stopPropagation());
 colMenu?.querySelectorAll('input').forEach(i => i.addEventListener('change', () => {
   const checked = [...colMenu.querySelectorAll('input:checked')].map(x=>x.dataset.col);
   APP.visibleCols = checked.length ? checked : null;
   render();
 }));
}

function renderCell(v, f, q){
 if (v === null || v === undefined || v === '') return `<td class="cell-null">—</td>`;
 if (f.type === 'number') return `<td class="cell-num">${formatNum(v)}</td>`;
 if (f.type === 'boolean') return `<td class="cell-bool ${v?'yes':'no'}">${v?'true':'false'}</td>`;
 if (f.type === 'date') return `<td class="cell-date">${formatDate(new Date(v).getTime())}</td>`;
 if (f.type === 'object' || f.type === 'array'){ const s = JSON.stringify(v); return `<td class="cell-obj" title="${escapeAttr(s)}">${highlightHTML(s.slice(0,50)+(s.length>50?'…':''), q)}</td>`; }
 if (f.type === 'category') return `<td class="cell-cat">${highlightHTML(String(v), q)}</td>`;
 return `<td title="${escapeAttr(String(v))}">${highlightHTML(String(v), q)}</td>`;
}

function highlightHTML(s, q){
 const txt = escapeHTML(String(s));
 if (!q) return txt;
 const qe = q.trim();
 if (!qe) return txt;
 const re = new RegExp('(' + qe.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'ig');
 return txt.replace(re, '<mark>$1</mark>');
}

/* ---------- DRAWER ---------- */
function openDrawer(idx){
 const records = APP.drawerRecords;
 if (!records || idx < 0 || idx >= records.length) return;
 APP.drawerIdx = idx;
 const rec = records[idx];
 const fields = Object.keys(APP.schema);
 const titleField = fields.find(k => /name|title|number|label|email/i.test(k) && rec[k]) || fields[0];
 const title = rec[titleField] != null ? String(rec[titleField]) : '(record)';
 const rows = fields.map(name => {
   const f = APP.schema[name];
   const v = rec[name];
   let val, cls = '';
   if (v === null || v === undefined || v === '') val = `<span style="color:var(--text4);font-style:italic">null</span>`;
   else if (f.type === 'object' || f.type === 'array') val = `<pre>${escapeHTML(JSON.stringify(v,null,2))}</pre>`;
   else if (f.type === 'date') val = formatDate(new Date(v).getTime()) + ` <span style="color:var(--text3);font-size:11px;margin-left:4px;font-family:'JetBrains Mono'">${escapeHTML(String(v))}</span>`;
   else if (f.type === 'number'){ val = formatNum(v); cls = 'mono'; }
   else if (f.type === 'boolean') val = `<span style="color:${v?'var(--green)':'var(--rose)'};font-weight:600">${v?'true':'false'}</span>`;
   else val = highlightHTML(String(v), APP.search);
   return `<div class="field-row-d" title="${escapeAttr(name)}">
     <div class="fd-label"><span class="type-pill t-${typeShort(f.type)}">${typeAbbr(f.type)}</span><span style="word-break:break-word">${escapeHTML(humanize(name))}</span></div>
     <div class="fd-value ${cls}">${val}</div>
   </div>`;
 }).join('');
 const drawer = document.getElementById('drawer');
 drawer.innerHTML = `
   <div class="drawer-h">
     <div class="drawer-h-info">
       <div class="drawer-eye">${escapeHTML(humanize(APP.currentDS))} · record ${idx+1} of ${records.length}</div>
       <div class="drawer-title">${escapeHTML(title)}</div>
     </div>
     <button class="drawer-x" onclick="closeDrawer()" title="Close">${I.close}</button>
   </div>
   <div class="drawer-body">${rows}</div>
   <div class="drawer-nav">
     <button onclick="navDrawer(-1)" ${idx<=0?'disabled':''}>${I.left} Previous</button>
     <button onclick="navDrawer(1)" ${idx>=records.length-1?'disabled':''}>Next ${I.right}</button>
   </div>
 `;
 drawer.classList.add('open');
 document.getElementById('drawerBack').classList.add('open');
 // mark selected in table
 document.querySelectorAll('tbody tr').forEach(tr => tr.classList.toggle('selected', Number(tr.dataset.idx) === idx));
}

function navDrawer(delta){
 const next = APP.drawerIdx + delta;
 if (next >= 0 && next < (APP.drawerRecords?.length||0)) openDrawer(next);
}

function closeDrawer(){
 APP.drawerIdx = null;
 document.getElementById('drawer')?.classList.remove('open');
 document.getElementById('drawerBack')?.classList.remove('open');
 document.querySelectorAll('tbody tr.selected').forEach(tr => tr.classList.remove('selected'));
}

/* ---------- EXPORT CSV ---------- */
function exportCSV(){
 if (!APP.currentDS){ toast('error','No data','Load a dataset first'); return; }
 const records = getFiltered();
 if (!records.length){ toast('error','No rows','Nothing to export with current filters'); return; }
 const cols = APP.visibleCols || Object.keys(APP.schema);
 const esc = v => { if (v == null) return ''; const s = typeof v === 'object' ? JSON.stringify(v) : String(v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s; };
 const csv = [cols.map(c=>humanize(c)).join(','), ...records.map(r => cols.map(c => esc(r[c])).join(','))].join('\n');
 const blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8'});
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a');
 a.href = url; a.download = `${APP.currentDS}-${new Date().toISOString().slice(0,10)}.csv`;
 a.click();
 URL.revokeObjectURL(url);
 toast('success','Exported',`${records.length.toLocaleString()} rows · ${cols.length} columns`);
}

/* ---------- UTILITIES ---------- */
const ACRONYMS = new Set(['id','ids','url','urls','uri','api','apis','sql','crm','erp','poc','pocs','vat','iban','swift','bic','ip','dns','http','https','json','xml','csv','pdf','sku','utc','gmt','am','pm','iso','b2b','b2c','seo','sla','kpi','kpis','roi','arr','mrr','ltv','cac','aml','kyc','pii','pci','ssn','ein','tin','isbn','imei','mac','os','db','ui','ux','cdn','cms','fcm','sms','mms','tcp','udp','smtp','imap','pop3','ftp','ssh','tls','ssl','jwt','sso','mfa','2fa','otp','qr','rgb','rgba','hex']);
function humanize(s){
 if (s == null || s === '') return '';
 const str = String(s);
 const parts = str
   .replace(/[._\-]+/g,' ')
   .replace(/([a-z\d])([A-Z])/g,'$1 $2')
   .replace(/([A-Z]+)([A-Z][a-z])/g,'$1 $2')
   .replace(/(\d+)([A-Za-z])/g,'$1 $2')
   .replace(/([A-Za-z])(\d+)/g,'$1 $2')
   .toLowerCase()
   .split(/\s+/)
   .filter(Boolean);
 return parts.map(w => ACRONYMS.has(w) ? w.toUpperCase() : w[0].toUpperCase() + w.slice(1)).join(' ');
}

function formatNum(n){
 if (n === null || n === undefined || isNaN(n)) return '—';
 if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(2).replace(/\.?0+$/,'') + 'B';
 if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2).replace(/\.?0+$/,'') + 'M';
 if (Math.abs(n) >= 1e4) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K';
 if (Number.isInteger(n)) return n.toLocaleString('en-US');
 return n.toFixed(2);
}
function formatDate(t, short){
 if (!t) return '—';
 const d = new Date(t);
 if (isNaN(d)) return '—';
 if (short) return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
 return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function escapeHTML(s){ if (s == null) return ''; return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function escapeAttr(s){ return escapeHTML(s).replace(/`/g,'&#96;'); }
function cssId(s){ return String(s).replace(/[^a-zA-Z0-9]/g,'_'); }

function toast(type, title, msg){
 const wrap = document.getElementById('toastWrap');
 const t = document.createElement('div');
 t.className = `toast ${type}`;
 t.innerHTML = `<div class="toast-title">${escapeHTML(title)}</div><div class="toast-msg">${escapeHTML(msg)}</div>`;
 wrap.appendChild(t);
 setTimeout(() => { t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3500);
}

/* ---------- FILE ---------- */
function setupFileInput(){
 const fi = document.getElementById('fileInput');
 fi.addEventListener('change', e => { const f = e.target.files[0]; if (f) loadFile(f); fi.value = ''; });
 document.getElementById('loadBtn').addEventListener('click', () => fi.click());
 document.getElementById('resetBtn').addEventListener('click', () => clearFilters());
 document.getElementById('exportBtn').addEventListener('click', exportCSV);
 const dz = document.getElementById('dropzone');
 let dragCount = 0;
 window.addEventListener('dragenter', e => { if (e.dataTransfer && e.dataTransfer.types.includes('Files')){ dragCount++; dz.classList.add('over'); } });
 window.addEventListener('dragover', e => { e.preventDefault(); });
 window.addEventListener('dragleave', e => { dragCount--; if (dragCount <= 0){ dragCount = 0; dz.classList.remove('over'); } });
 window.addEventListener('drop', e => { e.preventDefault(); dragCount = 0; dz.classList.remove('over'); const f = e.dataTransfer.files?.[0]; if (f) loadFile(f); });
}
function loadFile(f){
 if (!f.name.toLowerCase().endsWith('.json')){ toast('error','Wrong format','Please drop a .json file'); return; }
 const reader = new FileReader();
 reader.onload = e => {
   try { const j = JSON.parse(e.target.result); ingestJSON(j, f.name.replace(/\.json$/i,'')); toast('success','Loaded', `${f.name} · ${(f.size/1024).toFixed(1)} KB`); }
   catch(err){ toast('error','Parse error', err.message); }
 };
 reader.readAsText(f);
}

/* ---------- INIT ---------- */
function init(){
 Chart.defaults.font.family = "'Space Grotesk', system-ui, sans-serif";
 Chart.defaults.font.size = 11;
 Chart.defaults.color = '#9ba3ae';
 setupFileInput();
 document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
 document.getElementById('drawerBack').addEventListener('click', closeDrawer);
 document.getElementById('search').addEventListener('input', e => {
   APP.search = e.target.value; APP.page = 1; updateTopbar(); render();
 });
 document.addEventListener('keydown', e => {
   if (e.key === 'Escape'){ closeDrawer(); document.getElementById('addFilterPop')?.classList.remove('open'); }
   if ((e.ctrlKey || e.metaKey) && e.key === 'k'){ e.preventDefault(); document.getElementById('search').focus(); }
   if (document.getElementById('drawer').classList.contains('open')){
     if (e.key === 'ArrowLeft' && !e.target.matches('input,textarea')) navDrawer(-1);
     if (e.key === 'ArrowRight' && !e.target.matches('input,textarea')) navDrawer(1);
   }
 });
 buildSidebar();
 loadDefault();
}
document.addEventListener('DOMContentLoaded', init);
