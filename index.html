<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BreachShield · Data Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Open Sans',system-ui,-apple-system,sans-serif;background:#070809;color:#e8eaed;overflow:hidden;-webkit-font-smoothing:antialiased;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 70% 0%,rgba(220,85,42,.07),transparent 60%),radial-gradient(ellipse 60% 50% at 0% 100%,rgba(149,15,24,.06),transparent 60%);pointer-events:none;z-index:0;animation:bgShift 14s ease-in-out infinite alternate}
@keyframes bgShift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-2%,-3%) scale(1.05)}}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:rgba(220,85,42,.55)}
:root{
  --red:#950f18;--orange:#DC552A;--orange-2:#fb7a4a;--orange-3:#ffa56e;
  --bg:#070809;--bg1:#0c0f14;--bg2:#10131a;--bg3:#161a22;--bg4:#1c212c;
  --border:rgba(255,255,255,.06);--border-2:rgba(255,255,255,.1);--accent:rgba(220,85,42,.32);
  --text:#e8eaed;--text2:#9ba3ae;--text3:#5f6772;--text4:#3d434c;
  --green:#22c55e;--yellow:#f59e0b;--blue:#60a5fa;--purple:#a78bfa;--rose:#f87171;--pink:#f472b6;--cyan:#22d3ee;
}
button{font-family:inherit;border:0;background:transparent;cursor:pointer;color:inherit}
input,select{font-family:inherit;color:inherit}
mark{background:rgba(245,158,11,.4);color:#fde68a;border-radius:3px;padding:0 3px;font-weight:600}

/* APP LAYOUT */
.app{display:grid;grid-template-columns:264px 1fr;height:100vh;overflow:hidden;position:relative;z-index:1}

/* SIDEBAR */
.sidebar{background:rgba(12,15,20,.8);backdrop-filter:blur(14px);border-right:1px solid var(--border);display:flex;flex-direction:column;min-width:0;overflow:hidden;transition:transform .3s cubic-bezier(.4,0,.2,1);position:relative}
.sidebar-logo{padding:18px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-shield{width:36px;height:36px;flex-shrink:0;filter:drop-shadow(0 6px 14px rgba(220,85,42,.4));transition:transform .35s}
.logo-wrap:hover .logo-shield{transform:rotate(-6deg) scale(1.06)}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14.5px;color:var(--text);letter-spacing:.01em}
.logo-sub{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-top:4px}

.sidebar-scroll{flex:1;overflow-y:auto;padding:6px 0 14px}
.side-section{padding:12px 14px 6px}
.side-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.side-section-title{font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}

.ds-pick{display:flex;flex-direction:column;gap:2px}
.ds-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;transition:all .15s;font-size:12.5px;color:var(--text2);font-family:'Space Grotesk',sans-serif;font-weight:500}
.ds-item:hover{background:rgba(255,255,255,.03);color:var(--text)}
.ds-item.active{background:linear-gradient(90deg,rgba(220,85,42,.18),rgba(220,85,42,.04));color:var(--text);box-shadow:inset 2px 0 0 var(--orange),0 0 0 1px rgba(220,85,42,.15)}
.ds-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ds-count{font-size:10px;color:var(--text3);font-weight:700;background:rgba(255,255,255,.05);padding:1px 7px;border-radius:100px;font-family:'Space Grotesk',sans-serif}
.ds-item.active .ds-count{background:rgba(220,85,42,.22);color:var(--orange)}

.field-list{display:flex;flex-direction:column;gap:1px}
.field-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:12px}
.field-row:hover{background:rgba(255,255,255,.03);color:var(--text)}
.field-row.has-filter{background:rgba(220,85,42,.1);color:var(--text)}
.field-row.expanded{background:rgba(220,85,42,.06)}
.type-pill{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:1px 5px;border-radius:4px;font-family:'Space Grotesk',sans-serif;flex-shrink:0;min-width:34px;text-align:center}
.t-num{background:rgba(96,165,250,.16);color:#60a5fa}
.t-cat{background:rgba(167,139,250,.16);color:#a78bfa}
.t-str{background:rgba(148,163,184,.13);color:#94a3b8}
.t-date{background:rgba(34,197,94,.16);color:#22c55e}
.t-bool{background:rgba(245,158,11,.16);color:#f59e0b}
.t-obj{background:rgba(220,85,42,.16);color:#fb923c}
.t-id{background:rgba(34,211,238,.16);color:#22d3ee}
.t-link{background:rgba(244,114,182,.16);color:#f472b6}
.field-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Space Grotesk',sans-serif;font-weight:500}
.field-row.has-filter .field-name{color:var(--orange);font-weight:600}
.field-card-stat{font-size:10.5px;color:var(--text3);font-weight:600;font-family:'Space Grotesk',sans-serif}

.filter-edit{padding:9px 11px;background:rgba(220,85,42,.06);border:1px solid rgba(220,85,42,.2);border-radius:8px;margin:5px 10px}
.fe-row{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.fe-row:last-child{margin-bottom:0}
.fe-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;outline:none}
.fe-input:focus{border-color:var(--orange)}
.fe-list{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.fe-opt{display:flex;align-items:center;gap:7px;padding:4px 6px;font-size:11.5px;color:var(--text2);cursor:pointer;border-radius:5px;transition:background .12s}
.fe-opt:hover{background:rgba(255,255,255,.03);color:var(--text)}
.fe-opt input{width:13px;height:13px;accent-color:var(--orange);flex-shrink:0}
.fe-opt-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fe-opt-cnt{font-size:10px;color:var(--text3);font-family:'Space Grotesk',sans-serif;font-weight:600}
.fe-actions{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.fe-btn{flex:1;padding:5px 7px;border-radius:6px;font-size:11px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .15s}
.fe-btn:hover{border-color:var(--accent);color:var(--text)}
.fe-btn.primary{background:var(--orange);color:white;border-color:var(--orange)}
.fe-btn.primary:hover{background:#e26538;box-shadow:0 4px 14px rgba(220,85,42,.35)}
.range-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}

.sidebar-footer{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.foot-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;font-size:12px;color:var(--text2);font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--bg2)}
.foot-btn:hover{border-color:var(--accent);color:var(--text);background:var(--bg3)}
.foot-btn svg{width:14px;height:14px;flex-shrink:0}
.foot-btn.primary{border-color:var(--orange);color:var(--orange);background:linear-gradient(135deg,rgba(220,85,42,.12),rgba(220,85,42,.04))}
.foot-btn.primary:hover{background:linear-gradient(135deg,rgba(220,85,42,.22),rgba(220,85,42,.08));box-shadow:0 4px 16px rgba(220,85,42,.25)}

/* MAIN */
.main{display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}
.topbar{height:58px;background:rgba(7,8,9,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0;z-index:10}
.menu-toggle{cursor:pointer;color:var(--text2);padding:6px;display:none;border-radius:6px}
.menu-toggle:hover{background:rgba(255,255,255,.05)}
.title-block{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.title-block-name{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.title-block-meta{font-size:11px;color:var(--text3);margin-top:2px;font-family:'Space Grotesk',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.title-block-meta strong{color:var(--orange)}

.search-wrap{flex:1;max-width:380px;position:relative;margin-left:auto}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:9px 12px 9px 36px;color:var(--text);font-size:13px;outline:none;transition:all .2s}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(220,85,42,.12)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;width:14px;height:14px}
.kbd{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;padding:2px 6px;border:1px solid var(--border);border-radius:4px;pointer-events:none}

.btn-primary{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;background:var(--orange);color:white;border-radius:9px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12.5px;cursor:pointer;transition:all .15s}
.btn-primary:hover{background:#e26538;box-shadow:0 6px 22px rgba(220,85,42,.5);transform:translateY(-1px)}
.btn-primary svg{width:13px;height:13px}
.btn-ghost{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;background:var(--bg2);color:var(--text2);border-radius:9px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12.5px;cursor:pointer;transition:all .15s;border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--text);background:var(--bg3)}
.btn-ghost svg{width:13px;height:13px}

.live-pill{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:100px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.22);font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;font-family:'Space Grotesk',sans-serif}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.6s ease-in-out infinite;box-shadow:0 0 8px var(--green)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:18px 22px 22px;min-height:0;position:relative;z-index:1}

/* WELCOME */
.welcome{max-width:760px;margin:30px auto;text-align:center;padding:30px 24px}
.welcome-shield{width:78px;height:78px;margin:0 auto 18px;filter:drop-shadow(0 8px 36px rgba(220,85,42,.5));animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.welcome-eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-bottom:10px;font-family:'Space Grotesk',sans-serif}
.welcome-h{font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1.1;margin-bottom:14px}
.welcome-h em{background:linear-gradient(90deg,var(--orange-3),var(--orange));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-style:normal}
.welcome-sub{font-size:15px;color:var(--text2);line-height:1.6;max-width:560px;margin:0 auto 26px}
.upload-zone{margin-top:30px;border:2px dashed var(--border-2);border-radius:14px;padding:34px;cursor:pointer;transition:all .25s;background:linear-gradient(135deg,rgba(255,255,255,.02),rgba(255,255,255,.005))}
.upload-zone:hover{border-color:var(--orange);background:linear-gradient(135deg,rgba(220,85,42,.06),rgba(220,85,42,.01));transform:translateY(-2px);box-shadow:0 14px 40px rgba(0,0,0,.3)}
.upload-zone svg{width:32px;height:32px;color:var(--orange);margin-bottom:9px}
.upload-zone-title{font-family:'Space Grotesk',sans-serif;font-size:13.5px;color:var(--text);font-weight:600}
.upload-zone-sub{font-size:11.5px;color:var(--text3);margin-top:4px}

/* HERO KPI STRIP */
.hero-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:11px;margin-bottom:14px}
.kpi{background:linear-gradient(135deg,rgba(16,19,26,.95) 0%,rgba(22,26,34,.85) 100%);border:1px solid var(--border);border-radius:13px;padding:14px 16px;position:relative;overflow:hidden;transition:all .3s;animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both}
.kpi:nth-child(1){animation-delay:.02s}.kpi:nth-child(2){animation-delay:.06s}.kpi:nth-child(3){animation-delay:.1s}.kpi:nth-child(4){animation-delay:.14s}.kpi:nth-child(5){animation-delay:.18s}.kpi:nth-child(6){animation-delay:.22s}
.kpi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--kc,var(--orange));box-shadow:0 0 12px var(--kc,var(--orange))}
.kpi::after{content:'';position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;background:var(--kc,var(--orange));opacity:.07;transition:transform .35s,opacity .35s;filter:blur(12px)}
.kpi:hover{border-color:var(--border-2);transform:translateY(-3px);box-shadow:0 14px 40px rgba(0,0,0,.4),0 0 0 1px rgba(220,85,42,.1)}
.kpi:hover::after{transform:scale(1.6);opacity:.13}
.kpi-spark{position:absolute;left:0;right:0;bottom:0;height:42px;opacity:.65;pointer-events:none}
.kpi-h{display:flex;align-items:center;gap:8px;margin-bottom:9px;position:relative;z-index:2}
.kpi-icon{width:26px;height:26px;border-radius:7px;background:rgba(220,85,42,.14);color:var(--kc,var(--orange));display:flex;align-items:center;justify-content:center}
.kpi-icon svg{width:13px;height:13px}
.kpi-label{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;font-family:'Space Grotesk',sans-serif}
.kpi-v{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--text);line-height:1.05;letter-spacing:-.025em;position:relative;z-index:2;text-shadow:0 0 30px rgba(220,85,42,.15)}
.kpi-v.small{font-size:18px}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:6px;position:relative;z-index:2;font-family:'Space Grotesk',sans-serif}
@keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

/* INSIGHTS */
.insight-strip{display:grid;grid-template-columns:repeat(12,1fr);gap:12px;margin-bottom:14px}
.insight-card{background:linear-gradient(135deg,rgba(16,19,26,.92) 0%,rgba(22,26,34,.82) 100%);border:1px solid var(--border);border-radius:13px;padding:18px 20px;animation:cardIn .55s cubic-bezier(.34,1.56,.64,1) both;display:flex;flex-direction:column;min-height:240px;position:relative;overflow:hidden;transition:all .25s}
.insight-card:hover{border-color:var(--border-2);box-shadow:0 16px 50px rgba(0,0,0,.4)}
.insight-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 0% 0%,rgba(220,85,42,.08),transparent 50%);opacity:0;transition:opacity .3s;pointer-events:none}
.insight-card:hover::before{opacity:1}
.insight-card.featured{background:linear-gradient(135deg,rgba(149,15,24,.12) 0%,rgba(22,26,34,.85) 60%);border-color:rgba(220,85,42,.22)}
.insight-card.span-6{grid-column:span 6}
.insight-card.span-4{grid-column:span 4}
.insight-card.span-12{grid-column:span 12}
.insight-card.span-8{grid-column:span 8}
.insight-card.featured-hero{grid-column:span 6;min-height:340px}
.insight-card.featured-hero.alone{grid-column:span 12}
.insight-h{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px;position:relative;z-index:1}
.insight-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.insight-sub{font-size:10px;color:var(--text3);margin-top:2px;font-family:'Space Grotesk',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.insight-canvas{flex:1;position:relative;min-height:160px;z-index:1}
.insight-canvas.with-center{min-height:220px}
.donut-center{position:absolute;left:0;right:50%;top:0;bottom:0;display:flex;align-items:center;justify-content:flex-end;padding-right:8%;pointer-events:none;z-index:2;flex-direction:column;gap:2px;justify-content:center}
.donut-center-v{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;color:var(--text);line-height:1;letter-spacing:-.02em}
.donut-center-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;font-weight:700;font-family:'Space Grotesk',sans-serif}

/* HEATMAP */
.heatmap-wrap{display:flex;flex:1;flex-direction:column;gap:8px;min-height:160px}
.heatmap-grid{display:grid;gap:3px;flex:1;align-self:stretch;min-height:140px}
.heatmap-cell{border-radius:4px;cursor:pointer;transition:all .15s;position:relative;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.6);font-weight:600}
.heatmap-cell:hover{outline:2px solid var(--orange);z-index:2;transform:scale(1.04)}
.heatmap-cell.empty{background:rgba(255,255,255,.02);color:transparent}
.heatmap-axis{display:flex;gap:3px;font-size:9.5px;color:var(--text3);font-family:'Space Grotesk',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.heatmap-axis-x{margin-left:120px}
.heatmap-axis-x>div{flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.heatmap-row{display:grid;gap:3px;align-items:center}
.heatmap-row-label{padding-right:6px;font-size:10.5px;color:var(--text2);font-family:'Space Grotesk',sans-serif;font-weight:500;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* TOP-LIST CHART (animated horizontal bars) */
.bars-list{display:flex;flex-direction:column;gap:6px;flex:1;justify-content:center}
.bar-item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:0;font-size:12px;cursor:pointer}
.bar-track{position:relative;background:rgba(255,255,255,.04);border-radius:5px;height:26px;display:flex;align-items:center;padding:0 9px;overflow:hidden;transition:background .15s}
.bar-track:hover{background:rgba(255,255,255,.07)}
.bar-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--orange) 0%,#950f18 100%);border-radius:5px;width:0;animation:barGrow .8s cubic-bezier(.25,.46,.45,.94) forwards}
.bar-fill.alt{background:linear-gradient(90deg,#60a5fa 0%,#3b82f6 100%)}
.bar-fill.cat{background:linear-gradient(90deg,#a78bfa 0%,#8b5cf6 100%)}
.bar-fill.green{background:linear-gradient(90deg,#22c55e 0%,#16a34a 100%)}
.bar-fill.pink{background:linear-gradient(90deg,#f472b6 0%,#ec4899 100%)}
@keyframes barGrow{from{width:0}to{width:var(--w)}}
.bar-name{position:relative;z-index:1;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px;font-family:'Space Grotesk',sans-serif}
.bar-cnt{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11.5px;color:var(--text2);min-width:42px;text-align:right}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;padding:9px 12px;background:linear-gradient(135deg,rgba(16,19,26,.95) 0%,rgba(22,26,34,.85) 100%);border:1px solid var(--border);border-radius:11px;margin-bottom:10px;flex-wrap:wrap;min-height:48px}
.fb-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-family:'Space Grotesk',sans-serif;padding:0 4px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;background:rgba(220,85,42,.12);border:1px solid rgba(220,85,42,.25);border-radius:100px;font-size:11.5px}
.chip-field{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--orange);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em}
.chip-sep{color:var(--text3);font-size:10px}
.chip-value{color:var(--text);font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-x{color:var(--text3);cursor:pointer;width:14px;height:14px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .15s;font-size:14px;line-height:1}
.chip-x:hover{background:rgba(248,113,113,.18);color:#f87171}
.chip-add{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border:1px dashed var(--border-2);border-radius:100px;font-size:11.5px;color:var(--text3);font-family:'Space Grotesk',sans-serif;font-weight:600;cursor:pointer;transition:all .15s}
.chip-add:hover{border-color:var(--orange);color:var(--orange);background:rgba(220,85,42,.05)}
.fb-spacer{flex:1}
.fb-clear{font-size:11px;color:var(--text3);cursor:pointer;padding:4px 8px;border-radius:6px;font-family:'Space Grotesk',sans-serif;font-weight:600;transition:all .15s}
.fb-clear:hover{color:var(--rose);background:rgba(248,113,113,.06)}

/* GRID */
.grid-card{background:linear-gradient(135deg,rgba(16,19,26,.95) 0%,rgba(22,26,34,.85) 100%);border:1px solid var(--border);border-radius:11px;overflow:hidden;animation:cardIn .55s cubic-bezier(.34,1.56,.64,1) both}
.grid-toolbar{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);background:rgba(22,26,34,.6);flex-wrap:wrap}
.gt-info{font-size:12px;color:var(--text2);font-family:'Space Grotesk',sans-serif}
.gt-info strong{color:var(--text);font-weight:700}
.gt-info em{color:var(--orange);font-style:normal;font-weight:700}
.gt-spacer{flex:1}
.gt-act{position:relative}
.gt-menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--bg2);border:1px solid var(--border-2);border-radius:10px;padding:6px;min-width:240px;max-height:380px;overflow-y:auto;z-index:30;display:none;box-shadow:0 18px 50px rgba(0,0,0,.6)}
.gt-menu.open{display:block;animation:menuIn .15s ease both}
@keyframes menuIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.gt-menu-title{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:6px 10px;font-family:'Space Grotesk',sans-serif}
.col-row{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .12s}
.col-row:hover{background:rgba(255,255,255,.03);color:var(--text)}
.col-row input{width:13px;height:13px;accent-color:var(--orange);flex-shrink:0}

.bulk-bar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:rgba(220,85,42,.1);border-bottom:1px solid rgba(220,85,42,.2);font-size:12.5px;color:var(--text);font-family:'Space Grotesk',sans-serif}
.bulk-bar-title{font-weight:700;color:var(--orange)}
.bulk-spacer{flex:1}
.bulk-btn{padding:5px 10px;border:1px solid var(--border-2);background:var(--bg3);border-radius:6px;font-size:11.5px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit}
.bulk-btn:hover{border-color:var(--accent);color:var(--text)}

/* TABLE */
.table-scroll{overflow:auto;max-height:60vh}
table{width:100%;border-collapse:separate;border-spacing:0}
thead th{position:sticky;top:0;padding:10px 14px;text-align:left;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);background:linear-gradient(180deg,rgba(22,26,34,1) 0%,rgba(22,26,34,.95) 100%);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;font-family:'Space Grotesk',sans-serif;z-index:5}
thead th:hover{color:var(--text2)}
thead th.sorted{color:var(--orange)}
thead th .arrow{margin-left:4px;font-size:9px;display:inline-block}
thead th.sel-col{width:36px;text-align:center;cursor:default;padding:10px 0}
.row-checkbox{width:14px;height:14px;accent-color:var(--orange);cursor:pointer}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s;cursor:pointer}
tbody tr:hover{background:rgba(220,85,42,.06)}
tbody tr.selected{background:rgba(220,85,42,.1)}
tbody tr.checked{background:rgba(220,85,42,.08)}
td{padding:9px 14px;font-size:12.5px;color:var(--text2);vertical-align:middle;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-bottom:1px solid var(--border)}
td.sel-col{padding:0;text-align:center}
td.cell-num{font-family:'JetBrains Mono',monospace;color:var(--text);text-align:right;font-weight:500}
td.cell-bool span{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700;font-family:'Space Grotesk',sans-serif}
td.cell-bool .yes{background:rgba(34,197,94,.12);color:var(--green)}
td.cell-bool .no{background:rgba(248,113,113,.12);color:var(--rose)}
td.cell-date{font-family:'JetBrains Mono',monospace;color:var(--text2)}
td.cell-cat span{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:600;font-family:'Space Grotesk',sans-serif;background:rgba(167,139,250,.12);color:#c4b5fd}
td.cell-id{font-family:'JetBrains Mono',monospace;color:var(--text3);font-size:11px}
td.cell-link a{color:var(--blue);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:11.5px}
td.cell-link a:hover{text-decoration:underline}
td.cell-email a{color:var(--orange);text-decoration:none}
td.cell-email a:hover{text-decoration:underline}
td.cell-obj{color:var(--text3);font-size:11.5px;font-family:'JetBrains Mono',monospace}
td.cell-obj-summary{font-size:11.5px;color:var(--text3);font-style:italic}
td.cell-null{color:var(--text4);font-style:italic;font-size:10.5px}

.pagination{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:rgba(22,26,34,.6);border-top:1px solid var(--border)}
.page-info{font-size:11.5px;color:var(--text3);font-family:'Space Grotesk',sans-serif}
.page-info select{margin:0 4px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:2px 6px;color:var(--text2);font-size:11px;font-family:inherit;cursor:pointer}
.page-controls{display:flex;gap:5px;align-items:center}
.pg-btn{width:28px;height:28px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pg-btn:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-btn svg{width:13px;height:13px}
.page-cur{font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--text);padding:0 8px;font-weight:600}

/* POPOVER */
.popover{position:fixed;background:var(--bg2);border:1px solid var(--border-2);border-radius:11px;padding:8px;min-width:280px;max-height:420px;overflow-y:auto;z-index:300;box-shadow:0 24px 60px rgba(0,0,0,.7);display:none}
.popover.open{display:block;animation:menuIn .18s ease both}
.pop-title{font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);padding:6px 9px;font-family:'Space Grotesk',sans-serif}
.pop-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--text2);transition:all .12s}
.pop-row:hover{background:rgba(220,85,42,.06);color:var(--text)}
.pop-row .field-name{font-family:'Space Grotesk',sans-serif;font-weight:500}

/* DRAWER */
.drawer{position:fixed;top:0;right:0;bottom:0;width:480px;max-width:100vw;background:linear-gradient(135deg,rgba(16,19,26,.98) 0%,rgba(12,15,20,.99) 100%);backdrop-filter:blur(14px);border-left:1px solid var(--border-2);transform:translateX(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);z-index:200;overflow-y:auto;box-shadow:-30px 0 80px rgba(0,0,0,.6);display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);z-index:150;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-backdrop.open{opacity:1;pointer-events:all}
.drawer-h{padding:20px 24px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:14px;background:linear-gradient(135deg,rgba(149,15,24,.12) 0%,transparent 100%);position:sticky;top:0;z-index:5;backdrop-filter:blur(20px)}
.drawer-h-info{flex:1;min-width:0}
.drawer-eye{font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);margin-bottom:5px;font-family:'Space Grotesk',sans-serif}
.drawer-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--text);line-height:1.25;word-break:break-word}
.drawer-x{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.05);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s;flex-shrink:0;border:0}
.drawer-x:hover{background:rgba(248,113,113,.15);color:#f87171;transform:rotate(90deg)}
.drawer-body{flex:1;padding:18px 24px 22px;overflow-y:auto}
.drawer-section-title{font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin:14px 0 8px;font-family:'Space Grotesk',sans-serif;display:flex;align-items:center;gap:8px}
.drawer-section-title:first-child{margin-top:0}
.drawer-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.drawer-section-title.t-num{color:#60a5fa}
.drawer-section-title.t-cat{color:#a78bfa}
.drawer-section-title.t-date{color:#22c55e}
.drawer-section-title.t-bool{color:#f59e0b}
.drawer-section-title.t-id{color:#22d3ee}
.drawer-section-title.t-link{color:#f472b6}
.drawer-section-title.t-obj{color:#fb923c}
.drawer-section-title.t-str{color:#94a3b8}

.field-row-d{display:grid;grid-template-columns:140px 1fr;gap:10px 16px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.03);align-items:start}
.field-row-d:last-child{border-bottom:none}
.fd-label{font-size:10.5px;color:var(--text3);font-weight:600;font-family:'Space Grotesk',sans-serif;letter-spacing:.04em;padding-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.fd-value{font-size:13px;color:var(--text);word-break:break-word;line-height:1.55;font-family:'Space Grotesk',sans-serif}
.fd-value.mono{font-family:'JetBrains Mono',monospace;font-size:12.5px}
.fd-value pre{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--bg3);padding:10px;border-radius:7px;overflow:auto;color:var(--text2);white-space:pre-wrap;max-height:280px;border:1px solid var(--border)}
.fd-value a{color:var(--orange);text-decoration:none;border-bottom:1px solid rgba(220,85,42,.3)}
.fd-value a:hover{border-bottom-color:var(--orange)}
.fd-bool-yes{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:100px;background:rgba(34,197,94,.12);color:var(--green);font-weight:700;font-size:11.5px}
.fd-bool-no{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:100px;background:rgba(248,113,113,.12);color:var(--rose);font-weight:700;font-size:11.5px}
.fd-cat{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:100px;background:rgba(167,139,250,.14);color:#c4b5fd;font-weight:600;font-size:12px;font-family:'Space Grotesk',sans-serif}

.drawer-nav{display:flex;justify-content:space-between;gap:8px;padding:12px 24px;border-top:1px solid var(--border);background:rgba(22,26,34,.4)}
.drawer-nav button{flex:1;padding:9px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:12px;font-family:'Space Grotesk',sans-serif;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.drawer-nav button:hover:not(:disabled){border-color:var(--accent);color:var(--text);background:var(--bg4)}
.drawer-nav button:disabled{opacity:.4;cursor:not-allowed}
.drawer-nav button svg{width:13px;height:13px}

/* DROP ZONE */
.dropzone{position:fixed;inset:0;background:rgba(7,8,9,.94);backdrop-filter:blur(10px);z-index:500;display:none;align-items:center;justify-content:center;padding:40px}
.dropzone.over{display:flex}
.dz-inner{border:2px dashed var(--orange);border-radius:18px;padding:54px;text-align:center;background:rgba(220,85,42,.06);max-width:520px;animation:dzPulse 2s ease-in-out infinite}
@keyframes dzPulse{0%,100%{border-color:var(--orange)}50%{border-color:var(--orange-3)}}
.dz-icon{width:54px;height:54px;margin:0 auto 14px;color:var(--orange)}
.dz-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px}
.dz-sub{font-size:13px;color:var(--text2)}

/* TOAST */
.toast-wrap{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:8px;z-index:2000;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border-2);border-radius:10px;padding:11px 15px;font-size:12px;color:var(--text);box-shadow:0 14px 40px rgba(0,0,0,.6);max-width:340px;animation:toastIn .3s ease both;pointer-events:all}
.toast.error{border-left:3px solid var(--rose)}
.toast.success{border-left:3px solid var(--green)}
.toast-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11.5px;margin-bottom:3px;letter-spacing:.04em}
.toast-msg{color:var(--text2);font-size:11.5px;line-height:1.4}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* CHART CUSTOM TOOLTIP */
.chart-tt{position:absolute;background:rgba(16,19,26,.96);backdrop-filter:blur(12px);border:1px solid var(--border-2);border-radius:8px;padding:9px 12px;font-family:'Space Grotesk',sans-serif;pointer-events:none;z-index:50;box-shadow:0 14px 40px rgba(0,0,0,.5);transition:opacity .12s,transform .12s;font-size:12px;min-width:120px}
.chart-tt-ttl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.chart-tt-v{font-size:14px;font-weight:700;color:var(--text);font-family:'Space Grotesk',sans-serif}
.chart-tt-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.chart-tt-row+.chart-tt-row{margin-top:3px}
.chart-tt-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* RESPONSIVE */
@media (max-width:1100px){.hero-strip{grid-template-columns:repeat(3,1fr)}.insight-strip{grid-template-columns:1fr}.insight-card.span-6,.insight-card.span-4,.insight-card.span-8,.insight-card.featured-hero{grid-column:1/-1}}
@media (max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:fixed;left:0;top:0;bottom:0;width:280px;z-index:300;transform:translateX(-100%);box-shadow:0 0 60px rgba(0,0,0,.5)}.sidebar.open{transform:translateX(0)}.menu-toggle{display:flex}.search-wrap{display:none}.drawer{width:100%}}
@media (max-width:600px){.content{padding:14px}.hero-strip{grid-template-columns:repeat(2,1fr)}.welcome-h{font-size:26px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-wrap">
        <svg class="logo-shield" viewBox="0 0 40 48" fill="none">
          <path d="M20 2L4 9v14c0 9.8 7 18.5 16 21 9-2.5 16-11.2 16-21V9L20 2z" fill="url(#sg)"/>
          <path d="M13 24.5l5 5 9-11" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="sg" x1="4" y1="2" x2="36" y2="46" gradientUnits="userSpaceOnUse"><stop stop-color="#DC552A"/><stop offset="1" stop-color="#950f18"/></linearGradient></defs>
        </svg>
        <div class="logo-text"><div class="logo-name">BreachShield</div><div class="logo-sub">Data · Intelligence</div></div>
      </div>
    </div>
    <div class="sidebar-scroll" id="sidebarScroll"></div>
    <div class="sidebar-footer">
      <button class="foot-btn primary" id="loadBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Load JSON file
      </button>
      <button class="foot-btn" id="resetBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        Reset filters
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="title-block">
        <div class="title-block-name" id="tbName">No data loaded</div>
        <div class="title-block-meta" id="tbMeta">Drop a JSON file to begin</div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="search-input" id="search" placeholder="Search across all fields…" autocomplete="off">
        <span class="kbd">⌘K</span>
      </div>
      <button class="btn-ghost" id="exportBtn" title="Export filtered data as CSV">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
      <div class="live-pill"><span class="live-dot"></span>Live</div>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>

<aside class="drawer" id="drawer"></aside>
<div class="drawer-backdrop" id="drawerBack"></div>
<div class="popover" id="addFilterPop"></div>
<div class="chart-tt" id="chartTT" style="opacity:0"></div>
<div class="dropzone" id="dropzone">
  <div class="dz-inner">
    <svg class="dz-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <div class="dz-title">Drop JSON file here</div>
    <div class="dz-sub">Auto-detects schema and builds the dashboard</div>
  </div>
</div>
<div class="toast-wrap" id="toastWrap"></div>
<input type="file" id="fileInput" accept=".json,application/json" style="display:none">

<script>
/* ============================================================
   BREACHSHIELD · Data Intelligence — premium BI workbench
   ============================================================ */

const APP = {
 raw:null, datasets:{}, currentDS:null, schema:{},
 filters:{}, search:'',
 sort:{field:null,dir:'asc'}, page:1, pageSize:25,
 visibleCols:null, expandedFilter:null,
 charts:{}, drawerIdx:null, drawerRecords:[],
 selected:new Set()
};
const palette = ['#DC552A','#60a5fa','#22c55e','#a78bfa','#f59e0b','#f472b6','#22d3ee','#fb923c','#84cc16','#950f18'];

/* ============================================================
   VALUE TYPE INSPECTION (smarter than just JSON types)
   ============================================================ */
const RX = {
 email:/^[^\s@]+@[^\s@]+\.[^\s@]+$/,
 url:/^https?:\/\/\S+$/i,
 id:/^[a-f0-9\-_]{8,}$/i,            /* hex/uuid-ish or long random */
 isoDate:/^\d{4}-\d{2}-\d{2}([T\s].*)?$/,
 phone:/^\+?[\d\s\-\(\)]{7,}$/
};

function detectType(v){
 if (v === null || v === undefined) return 'null';
 if (typeof v === 'number') return Number.isFinite(v) ? 'number' : 'null';
 if (typeof v === 'boolean') return 'boolean';
 if (typeof v === 'string'){
   if (v === '') return 'null';
   if (RX.isoDate.test(v)){ const d = new Date(v); if (!isNaN(d) && d.getFullYear()>1900 && d.getFullYear()<2200) return 'date'; }
   return 'string';
 }
 if (Array.isArray(v)) return 'array';
 if (typeof v === 'object') return 'object';
 return 'string';
}

/* Smarter sub-type: id-like strings, urls, emails */
function valueSubtype(v, baseType){
 if (typeof v !== 'string' || baseType !== 'string' && baseType !== 'category') return null;
 const s = v.trim();
 if (RX.email.test(s)) return 'email';
 if (RX.url.test(s)) return 'url';
 if (RX.id.test(s) && s.length >= 12) return 'id';
 return null;
}

function detectSchema(records){
 const fields = {};
 for (const rec of records){
   if (!rec || typeof rec !== 'object') continue;
   for (const key of Object.keys(rec)){
     if (!fields[key]) fields[key] = {types:{},nulls:0,filled:0,values:new Map(),sample:[],min:null,max:null,sum:0,subTypes:new Map()};
     const v = rec[key];
     const t = detectType(v);
     if (t === 'null'){ fields[key].nulls++; continue; }
     fields[key].filled++;
     fields[key].types[t] = (fields[key].types[t]||0) + 1;
     if (t === 'number'){
       if (fields[key].min===null||v<fields[key].min) fields[key].min = v;
       if (fields[key].max===null||v>fields[key].max) fields[key].max = v;
       fields[key].sum += v;
     }
     if (t === 'date'){
       const d = new Date(v).getTime();
       if (fields[key].min===null||d<fields[key].min) fields[key].min = d;
       if (fields[key].max===null||d>fields[key].max) fields[key].max = d;
     }
     if (t === 'string' || t === 'boolean' || t === 'number'){
       const k = String(v);
       fields[key].values.set(k, (fields[key].values.get(k)||0)+1);
       const st = valueSubtype(v, t);
       if (st) fields[key].subTypes.set(st, (fields[key].subTypes.get(st)||0)+1);
     }
     if (fields[key].sample.length < 3) fields[key].sample.push(v);
   }
 }
 for (const key of Object.keys(fields)){
   const f = fields[key];
   const sorted = Object.entries(f.types).sort((a,b)=>b[1]-a[1]);
   f.type = sorted[0]?.[0] || 'string';
   f.cardinality = f.values.size;
   if (f.type === 'string' && f.cardinality > 0 && f.cardinality <= Math.max(20, records.length * 0.15) && f.cardinality < records.length){
     f.type = 'category';
   }
   /* promote string with majority subtype */
   if ((f.type === 'string' || f.type === 'category') && f.subTypes.size){
     const top = [...f.subTypes.entries()].sort((a,b)=>b[1]-a[1])[0];
     if (top[1] >= f.filled * 0.6){
       if (top[0] === 'id' && f.type === 'string') f.type = 'id';
       if (top[0] === 'email') f.subType = 'email';
       if (top[0] === 'url') f.subType = 'url';
     }
   }
   if (f.type === 'number') f.avg = f.filled ? f.sum / f.filled : 0;
 }
 return fields;
}

function ingestJSON(j, sourceName){
 APP.raw = j; APP.datasets = {};
 if (Array.isArray(j)){
   APP.datasets[sourceName || 'records'] = j.filter(x=>x && typeof x==='object' && !Array.isArray(x));
 } else if (j && typeof j === 'object'){
   for (const key of Object.keys(j)){
     const v = j[key];
     if (Array.isArray(v) && v.length && v.every(x=>x && typeof x==='object' && !Array.isArray(x))){
       APP.datasets[key] = v;
     }
   }
   if (!Object.keys(APP.datasets).length) APP.datasets['record'] = [j];
 } else { toast('error','Bad input','JSON must be an array or object'); return; }
 const names = Object.keys(APP.datasets);
 if (!names.length){ toast('error','No data','No tabular arrays detected'); showWelcome(); return; }
 names.sort((a,b)=>APP.datasets[b].length - APP.datasets[a].length);
 switchDataset(names[0]);
}

function switchDataset(name){
 APP.currentDS = name;
 APP.schema = detectSchema(APP.datasets[name]);
 APP.filters = {}; APP.search = '';
 APP.sort = {field:null,dir:'asc'};
 APP.page = 1; APP.visibleCols = null; APP.expandedFilter = null;
 APP.selected = new Set();
 const s = document.getElementById('search'); if (s) s.value = '';
 closeDrawer();
 buildSidebar(); render();
}

/* ============================================================
   FILTERS
   ============================================================ */
function applyFilters(records){
 const filters = Object.values(APP.filters);
 const q = APP.search.trim().toLowerCase();
 return records.filter(rec => {
   if (q){
     const hay = Object.values(rec).map(v => v==null?'':typeof v==='object'?JSON.stringify(v):String(v)).join(' ').toLowerCase();
     if (!hay.includes(q)) return false;
   }
   for (const f of filters){ if (!testFilter(rec, f)) return false; }
   return true;
 });
}
function testFilter(rec, f){
 const v = rec[f.field];
 if (v === null || v === undefined || v === '') return false;
 if (f.op === 'in') return f.values.includes(String(v));
 if (f.op === 'between'){ const n = Number(v); return n >= f.min && n <= f.max; }
 if (f.op === 'date_between'){ const t = new Date(v).getTime(); return t >= f.min && t <= f.max; }
 if (f.op === 'contains') return String(v).toLowerCase().includes(String(f.text).toLowerCase());
 return true;
}
function getFiltered(){ return APP.currentDS ? applyFilters(APP.datasets[APP.currentDS]) : []; }

function fieldStat(f){
 if (f.type === 'number') return `${formatNum(f.min)}–${formatNum(f.max)}`;
 if (f.type === 'date'){ const a = formatDate(f.min,true); const b = formatDate(f.max,true); return a===b?a:`${a}…`; }

 if (f.type === 'string' || f.type === 'id') return f.cardinality > 999 ? '999+' : `${f.cardinality}`;
 if (f.type === 'boolean') return 'T/F';
 return '';
}

function typeShort(t){ return ({'number':'num','category':'cat','string':'str','date':'date','boolean':'bool','object':'obj','array':'obj','id':'id'})[t] || 'str'; }
function typeAbbr(t){ return ({'number':'NUM','category':'CAT','string':'STR','date':'DATE','boolean':'BOOL','object':'OBJ','array':'ARR','id':'ID'})[t] || 'STR'; }

 const nums = fields.filter(([,f])=>f.type==='number');
 const dates = fields.filter(([,f])=>f.type==='date');
 const bestNum = nums.length ? nums.sort((a,b)=>Math.abs(b[1].sum)-Math.abs(a[1].sum))[0] : null;
 const numSum = bestNum ? records.reduce((s,r)=>s + (typeof r[bestNum[0]]==='number'?r[bestNum[0]]:0), 0) : null;
 const numAvg = bestNum && records.length ? numSum / records.filter(r=>typeof r[bestNum[0]]==='number').length : null;
 const bestCat = cats.length ? cats.sort((a,b)=>{ const score = c => { const x = c[1].cardinality; if (x>=3 && x<=15) return 100 - Math.abs(7-x); if (x<3) return x; return -x; }; return score(b)-score(a); })[0] : null;
 let topCatVal=null, topCatCnt=0;
 if (bestCat){

   for (const r of records){ const v = r[bestCat[0]]; if (v!=null && v!=='') counts.set(String(v), (counts.get(String(v))||0)+1); }
   const top = [...counts.entries()].sort((a,b)=>b[1]-a[1])[0];
   if (top){ topCatVal = top[0]; topCatCnt = top[1]; }
 }
 let dateRange = null;
 if (dates.length){
   const fname = dates[0][0];
   const ts = records.map(r=>r[fname]).filter(Boolean).map(v=>new Date(v).getTime()).filter(t=>!isNaN(t));
   if (ts.length){ dateRange = {min:Math.min(...ts), max:Math.max(...ts), field:fname}; }
 }
 const cards = [];
 cards.push({c:'#DC552A',label:'Records',v:records.length,vText:records.length.toLocaleString(),sub:filterPercent(records.length,total),icon:I.list,sparkField:bestNum?bestNum[0]:null});
 cards.push({c:'#60a5fa',label:'Fields',v:fields.length,vText:String(fields.length),sub:`${cats.length} cat · ${nums.length} num · ${dates.length} date`,icon:I.layers});
 cards.push({c:'#a78bfa',label:'Filters',v:Object.keys(APP.filters).length,vText:String(Object.keys(APP.filters).length),sub:Object.keys(APP.filters).length?'Active right now':'No filters applied',icon:I.filter});
 if (bestNum){
   cards.push({c:'#22c55e',label:`Σ ${humanize(bestNum[0])}`,v:numSum,vText:formatNum(numSum),sub:'Across filtered',icon:I.sigma,smallV:true,sparkField:bestNum[0]});
   if (numAvg !== null && !isNaN(numAvg)) cards.push({c:'#fb923c',label:`Avg ${humanize(bestNum[0])}`,v:numAvg,vText:formatNum(numAvg),sub:'Per record',icon:I.bar,smallV:true});
 }
 if (bestCat && topCatVal){
   cards.push({c:'#f472b6',label:`Top ${humanize(bestCat[0])}`,v:0,vText:topCatVal.length>14?topCatVal.slice(0,14)+'…':topCatVal,sub:`${topCatCnt.toLocaleString()} records`,icon:I.crown,smallV:true,noCount:true});
 }
 if (dateRange){
   cards.push({c:'#22d3ee',label:`Range ${humanize(dateRange.field)}`,v:0,vText:formatDate(dateRange.min,true)+' → '+formatDate(dateRange.max,true),sub:`${Math.round((dateRange.max-dateRange.min)/86400000)} days`,icon:I.calendar,smallV:true,noCount:true});
 }
 return `<section class="hero-strip">${cards.slice(0,6).map((k,i)=>`
   <div class="kpi" style="--kc:${k.c}" data-spark="${k.sparkField||''}" data-kc="${k.c}">
     <canvas class="kpi-spark" data-idx="${i}"></canvas>

     </div>
     <div class="kpi-v ${k.smallV?'small':''}" ${k.noCount?'':`data-counter="${k.v}"`} title="${escapeAttr(k.vText)}">${escapeHTML(k.vText)}</div>
     ${k.sub?`<div class="kpi-sub">${escapeHTML(k.sub)}</div>`:''}
   </div>
 `).join('')}</section>`;
}
function filterPercent(n, total){
 if (n === total) return `100% · all data`;
 const pct = total ? Math.round(n/total*100) : 0;
 return `${pct}% of ${total.toLocaleString()}`;
}

/* sparkline drawn into KPI card background */
function renderSparklines(records){
 document.querySelectorAll('.kpi').forEach(card => {
   const field = card.dataset.spark;
   if (!field) return;
   const canvas = card.querySelector('.kpi-spark'); if (!canvas) return;
   const f = APP.schema[field]; if (!f || f.type !== 'number') return;
   const vals = records.map(r=>r[field]).filter(v=>typeof v==='number');
   if (vals.length < 2) return;
   const w = card.clientWidth, h = canvas.clientHeight || 42;
   canvas.width = w; canvas.height = h;
   const ctx = canvas.getContext('2d');
   /* histogram-like silhouette */
   const bins = Math.min(40, Math.max(8, Math.floor(w/8)));
   const min = Math.min(...vals), max = Math.max(...vals), span = (max-min)||1;
   const buckets = Array(bins).fill(0);
   for (const v of vals){ const i = Math.min(bins-1, Math.floor((v-min)/span*bins)); buckets[i]++; }
   const maxB = Math.max(...buckets);
   const color = card.dataset.kc || '#DC552A';
   const grad = ctx.createLinearGradient(0,0,0,h);
   grad.addColorStop(0, color + 'aa');
   grad.addColorStop(1, color + '00');
   ctx.beginPath();
   ctx.moveTo(0, h);
   buckets.forEach((b,i) => {
     const x = (i/(bins-1)) * w;
     const y = h - (b/maxB) * (h - 4) - 2;
     if (i===0) ctx.lineTo(x, y);
     else { const px = ((i-1)/(bins-1))*w; const py = h - (buckets[i-1]/maxB)*(h-4) - 2; ctx.bezierCurveTo((px+x)/2, py, (px+x)/2, y, x, y); }
   });
   ctx.lineTo(w, h);
   ctx.closePath();
   ctx.fillStyle = grad;
   ctx.fill();
   ctx.strokeStyle = color + 'cc';
   ctx.lineWidth = 1.5;
   ctx.stroke();
 });
}

function animateCounters(){
 document.querySelectorAll('[data-counter]').forEach(el => {
   const target = Number(el.dataset.counter); if (isNaN(target)) return;
   const text = el.textContent;
   const dur = 900, t0 = performance.now();
   const step = (now) => {
     const t = Math.min(1, (now-t0)/dur);
     const eased = 1 - Math.pow(1-t,3);
     const v = target * eased;
     el.textContent = formatCounter(v, text, target);
     if (t < 1) requestAnimationFrame(step);
     else el.textContent = text;
   };
   requestAnimationFrame(step);
 });
}
function formatCounter(v, finalText, target){
 if (target >= 1e6) return formatNum(Math.round(v));
 if (target >= 1e3) return formatNum(Math.round(v));
 if (target >= 100) return Math.round(v).toLocaleString();
 if (Number.isInteger(target)) return Math.round(v).toString();
 return v.toFixed(1);
}

function insightsHTML(records){

 if (!picks.length) return '';
 return `<section class="insight-strip">${picks.map((p,i)=>`
   <div class="insight-card ${p.featured?'featured':''} ${p.span||'span-6'}">

       : `<div class="insight-canvas ${p.kind==='donut-center'?'with-center':''}" id="canvWrap${i}"><canvas id="insight${i}"></canvas>${p.kind==='donut-center'?`<div class="donut-center"><div class="donut-center-v" id="dcv${i}">—</div><div class="donut-center-l">${p.eyebrow}</div></div>`:''}</div>`}
   </div>
 `).join('')}</section>`;

function pickAutoCharts(records){
 const fields = Object.entries(APP.schema);
 const cats = fields.filter(([,f])=>f.type==='category').sort((a,b)=>{ const score=c=>{const x=c[1].cardinality;if(x>=3&&x<=15)return 100-Math.abs(8-x);return -x;}; return score(b)-score(a); });
 const nums = fields.filter(([,f])=>f.type==='number').sort((a,b)=>Math.abs(b[1].sum)-Math.abs(a[1].sum));
 const dates = fields.filter(([,f])=>f.type==='date');
 const bools = fields.filter(([,f])=>f.type==='boolean');
 const picks = [];
 /* featured donut with center counter */
 if (cats.length){
   picks.push({kind:'donut-center', type:'doughnut', x:cats[0][0], agg:'count', title:`${humanize(cats[0][0])} breakdown`, eyebrow:'Distribution', featured:true, span:'span-6'});
 } else if (bools.length){
   picks.push({kind:'donut-center', type:'doughnut', x:bools[0][0], agg:'count', title:`${humanize(bools[0][0])}`, eyebrow:'Distribution', featured:true, span:'span-6'});
 }
 /* top bars (animated) */
 if (cats.length){
   const f = cats[0][0];
   picks.push({kind:'top-bars', x:f, title:`Top ${humanize(f)}`, eyebrow:'Top values', span:'span-6'});
 }
 /* time series */
 if (dates.length){
   picks.push({kind:'chart', type:'line', x:dates[0][0], agg:'count', title:`Records over time`, eyebrow:'Trend', span:'span-8'});
 }
 /* numeric distribution */
 if (nums.length){
   picks.push({kind:'chart', type:'bar', x:nums[0][0], agg:'count', isHistogram:true, title:`${humanize(nums[0][0])} distribution`, eyebrow:'Histogram', span: dates.length?'span-4':'span-6'});
 }
 /* sum by category */
 if (nums.length && cats.length){
   const cf = cats[0][0];
   picks.push({kind:'chart', type:'bar', x:cf, y:nums[0][0], agg:'sum', title:`Σ ${humanize(nums[0][0])} by ${humanize(cf)}`, eyebrow:'Aggregation', span:'span-6'});
 }
 /* heatmap: 2 categoricals */
 if (cats.length >= 2){
   picks.push({kind:'heatmap', xField:cats[0][0], yField:cats[1][0], title:`${humanize(cats[0][0])} × ${humanize(cats[1][0])}`, eyebrow:'Heatmap', span:'span-6'});
 } else if (cats.length === 1 && bools.length){
   picks.push({kind:'heatmap', xField:bools[0][0], yField:cats[0][0], title:`${humanize(bools[0][0])} × ${humanize(cats[0][0])}`, eyebrow:'Heatmap', span:'span-6'});
 }
 /* second category bar */
 if (cats.length > 1){
   picks.push({kind:'chart', type:'bar', x:cats[1][0], agg:'count', title:`${humanize(cats[1][0])} breakdown`, eyebrow:'Distribution', span:'span-6'});
 }
 /* if alone make featured wider */
 if (picks.length === 1 && picks[0].kind === 'donut-center') picks[0].span = 'span-12';
 return picks.slice(0,7);
}

function initInsights(records){
 const picks = pickAutoCharts(records);
 picks.forEach((p,i)=>{
   if (p.kind === 'top-bars') initTopBars(i, p, records);
   else if (p.kind === 'heatmap') initHeatmap(i, p, records);
   else initChart('insight'+i, p, records, i);
 });
}

function initTopBars(idx, cfg, records){
 const root = document.getElementById('topbars'+idx); if (!root) return;
 const counts = new Map();
 for (const r of records){ const v = r[cfg.x]; if (v!=null && v!=='') counts.set(String(v),(counts.get(String(v))||0)+1); }
 const top = [...counts.entries()].sort((a,b)=>b[1]-a[1]).slice(0,8);
 if (!top.length){ root.innerHTML = `<div style="color:var(--text3);font-size:12px;font-style:italic;padding:12px">No data</div>`; return; }
 const max = top[0][1];
 root.innerHTML = top.map(([val,cnt],i)=>{
   const pct = (cnt/max)*100;
   const cls = ['','alt','cat','green','pink'][i%5];
   return `<div class="bar-item" onclick="drillFilter('${escapeAttr(cfg.x)}','${escapeAttr(val)}')">
     <div class="bar-track" title="${escapeAttr(val)}">
       <div class="bar-fill ${cls}" style="--w:${pct}%"></div>
       <span class="bar-name">${escapeHTML(val)}</span>
     </div>
     <span class="bar-cnt">${cnt.toLocaleString()}</span>
   </div>`;
 }).join('');
}

function initHeatmap(idx, cfg, records){
 const root = document.getElementById('heat'+idx); if (!root) return;
 const xVals = [...new Set(records.map(r=>r[cfg.xField]).filter(v=>v!=null&&v!==''))].slice(0,8);
 const yVals = [...new Set(records.map(r=>r[cfg.yField]).filter(v=>v!=null&&v!==''))].slice(0,8);
 const counts = new Map();
 for (const r of records){
   const x = r[cfg.xField], y = r[cfg.yField];
   if (x==null||x===''||y==null||y==='') continue;
   const k = String(x)+'|'+String(y);
   counts.set(k,(counts.get(k)||0)+1);
 }
 let max = 0;
 for (const v of counts.values()) if (v>max) max = v;
 if (!max){ root.innerHTML = `<div style="color:var(--text3);font-size:12px;font-style:italic;padding:12px">Empty grid</div>`; return; }
 const colW = `repeat(${xVals.length},minmax(0,1fr))`;
 root.innerHTML = `<div class="heatmap-axis heatmap-axis-x" style="grid-template-columns:${colW};display:grid">
     ${xVals.map(v=>`<div title="${escapeAttr(String(v))}">${escapeHTML(humanize(String(v)))}</div>`).join('')}
   </div>
   ${yVals.map(yv => `<div class="heatmap-row" style="grid-template-columns:120px ${colW}">
     <div class="heatmap-row-label" title="${escapeAttr(String(yv))}">${escapeHTML(humanize(String(yv)))}</div>
     ${xVals.map(xv => {
       const cnt = counts.get(String(xv)+'|'+String(yv)) || 0;
       const intensity = cnt/max;
       const bg = `rgba(220,85,42,${0.04 + intensity*0.8})`;
       return `<div class="heatmap-cell ${cnt===0?'empty':''}" style="background:${bg}" onclick="drillFilter('${escapeAttr(cfg.xField)}','${escapeAttr(xv)}')" title="${escapeAttr(humanize(String(yv))+' / '+humanize(String(xv)))}: ${cnt}">${cnt||''}</div>`;
     }).join('')}
   </div>`).join('')}`;
}

function initChart(id, cfg, records, idx){
 const ctx = document.getElementById(id); if (!ctx) return;
 const X = cfg.x, Y = cfg.y, agg = cfg.agg;
 const xField = APP.schema[X]; if (!xField) return;
 const xKey = (rec) => {
   const v = rec[X];
   if (v === null || v === undefined || v === '') return '(null)';
   if (xField.type === 'date'){ const d = new Date(v); return d.toISOString().slice(0,7); }
   if (xField.type === 'number' && (xField.cardinality > 20 || cfg.isHistogram)){
     const span = (xField.max-xField.min)||1;
     const i = Math.min(9, Math.floor((v-xField.min)/span*10));
     return formatNum(xField.min + i*span/10) + '–' + formatNum(xField.min + (i+1)*span/10);
   }
   return String(v);
 };
 const buckets = new Map();
 for (const rec of records){ const k = xKey(rec); if (!buckets.has(k)) buckets.set(k, []); buckets.get(k).push(rec); }
 let entries = [...buckets.entries()];
 if (xField.type === 'date' || (xField.type === 'number' && (xField.cardinality > 20 || cfg.isHistogram))) entries.sort((a,b)=>a[0].localeCompare(b[0]));
 else entries.sort((a,b)=>b[1].length - a[1].length);
 if (entries.length > 12 && cfg.type === 'doughnut') entries = entries.slice(0,12);
 if (entries.length > 24 && xField.type !== 'date') entries = entries.slice(0,24);

 const labels = entries.map(e=>e[0]);
 const aggregate = (recs) => {
   if (agg === 'count') return recs.length;
   const vals = recs.map(r=>r[Y]).filter(v=>typeof v==='number');
   if (!vals.length) return 0;
   if (agg === 'sum') return vals.reduce((s,v)=>s+v,0);
   if (agg === 'avg') return vals.reduce((s,v)=>s+v,0)/vals.length;
   if (agg === 'min') return Math.min(...vals);
   if (agg === 'max') return Math.max(...vals);
   return 0;
 };
 const data = entries.map(([,recs])=>aggregate(recs));
 const isCircular = cfg.type === 'pie' || cfg.type === 'doughnut';
 const total = data.reduce((s,v)=>s+v,0);

 /* gradients */
 const cnv = ctx.getContext('2d');
 let bgFn = null;
 if (cfg.type === 'bar'){
   bgFn = (c) => {
     const {chartArea, ctx: cx} = c.chart;
     if (!chartArea) return 'rgba(220,85,42,.45)';
     const g = cx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
     g.addColorStop(0,'rgba(220,85,42,.15)');
     g.addColorStop(1,'rgba(220,85,42,.85)');
     return g;
   };
 } else if (cfg.type === 'line'){
   bgFn = (c) => {
     const {chartArea, ctx: cx} = c.chart;
     if (!chartArea) return 'rgba(220,85,42,.2)';
     const g = cx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
     g.addColorStop(0,'rgba(220,85,42,.4)');
     g.addColorStop(1,'rgba(220,85,42,.02)');
     return g;
   };
 }

 const datasetCfg = {
   label: agg==='count'?'Count':`${agg} of ${Y}`,
   data,
   backgroundColor: isCircular ? labels.map((_,i)=>palette[i%palette.length]) : (bgFn || 'rgba(220,85,42,.6)'),
   borderColor: isCircular ? labels.map(()=>'rgba(7,8,9,.7)') : '#DC552A',
   borderWidth: isCircular ? 2 : (cfg.type==='line'?2.5:1),
   borderRadius: cfg.type==='bar'?6:0,
   tension:.4, fill: cfg.type==='line', pointRadius: cfg.type==='line'?0:undefined, pointHoverRadius: cfg.type==='line'?5:undefined,
   pointBackgroundColor:'#DC552A', pointBorderColor:'#fff', pointBorderWidth:2
 };

 APP.charts[id] = new Chart(ctx, {
   type: cfg.type,
   data:{labels, datasets:[datasetCfg]},
   options:{
     responsive:true, maintainAspectRatio:false,
     animation:{duration:1000, easing:'easeOutQuart'},
     plugins:{
       legend:{display: isCircular, position:'right', labels:{color:'#9ba3ae', boxWidth:9, padding:9, font:{size:10.5, family:"'Space Grotesk'"}}},
       tooltip:{enabled:false, external:customTooltip}
     },
     ...(isCircular?{cutout:cfg.type==='doughnut'?'72%':0}:{
       scales:{
         x:{grid:{display:false},ticks:{color:'#9ba3ae',font:{size:10},maxRotation:35,autoSkip:true,maxTicksLimit:12}},
         y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#9ba3ae',font:{size:10},callback:v=>formatNum(v)},beginAtZero:true}
       }
     })
   }
 });

 if (cfg.kind === 'donut-center'){
   const dc = document.getElementById('dcv'+idx);
   if (dc) dc.textContent = formatNum(total);
 }

 ctx.onclick = (evt) => {
   const points = APP.charts[id].getElementsAtEventForMode(evt, 'nearest', {intersect:true}, true);
   if (points.length){
     const i = points[0].index;
     const label = labels[i];
     drillFilter(X, label);
   }
 };
}

/* CUSTOM TOOLTIP */
function customTooltip(ctx){
 const tt = document.getElementById('chartTT');
 const m = ctx.tooltip;
 if (!m || m.opacity === 0){ tt.style.opacity = 0; return; }
 const dp = m.dataPoints?.[0];
 if (!dp){ tt.style.opacity = 0; return; }
 const color = (dp.dataset.borderColor && (typeof dp.dataset.borderColor === 'string' ? dp.dataset.borderColor : '#DC552A')) || '#DC552A';
 const label = dp.label;
 const value = formatNum(typeof dp.parsed === 'object' ? (dp.parsed.y !== undefined ? dp.parsed.y : dp.parsed) : dp.parsed);
 tt.innerHTML = `<div class="chart-tt-ttl">${escapeHTML(label)}</div>
   <div class="chart-tt-row"><span class="chart-tt-dot" style="background:${color}"></span><span class="chart-tt-v">${value}</span></div>`;
 const rect = ctx.chart.canvas.getBoundingClientRect();
 const x = rect.left + m.caretX + 12;
 const y = rect.top + m.caretY - 8;
 tt.style.left = x + 'px';
 tt.style.top = y + 'px';
 tt.style.opacity = 1;
 tt.style.transform = 'translate(0,-50%)';
}

function drillFilter(field, val){
 const cur = APP.filters[field];
 if (cur && cur.op === 'in' && cur.values.length === 1 && cur.values[0] === val) delete APP.filters[field];
 else APP.filters[field] = {field, op:'in', values:[val]};
 APP.page = 1; buildSidebar(); render();
}

   if (cb.checked) APP.selected.add(i); else APP.selected.delete(i);
   render();
 }));
 const selAll = el.querySelector('#selAll');
 if (selAll) selAll.addEventListener('change', () => {
   const records = APP.drawerRecords;
   const start = (APP.page-1) * APP.pageSize;
   const slice = records.slice(start, start + APP.pageSize);
   slice.forEach(r => { const i = records.indexOf(r); if (selAll.checked) APP.selected.add(i); else APP.selected.delete(i); });
   render();
 });
 const records = APP.drawerRecords || [];
 const totalPages = Math.max(1, Math.ceil(records.length / APP.pageSize));
 const setP = p => { APP.page = Math.max(1, Math.min(totalPages, p)); render(); };
 el.querySelector('#pgFirst')?.addEventListener('click', () => setP(1));
 el.querySelector('#pgPrev')?.addEventListener('click', () => setP(APP.page-1));
 el.querySelector('#pgNext')?.addEventListener('click', () => setP(APP.page+1));
 el.querySelector('#pgLast')?.addEventListener('click', () => setP(totalPages));
 el.querySelector('#pgSize')?.addEventListener('change', e => { APP.pageSize = Number(e.target.value); APP.page = 1; render(); });
 const colBtn = el.querySelector('#colBtn');
 const colMenu = el.querySelector('#colMenu');
 colBtn?.addEventListener('click', e => { e.stopPropagation(); colMenu.classList.toggle('open'); });
 document.addEventListener('click', () => colMenu?.classList.remove('open'), {once:true});
 colMenu?.addEventListener('click', e => e.stopPropagation());
 colMenu?.querySelectorAll('input').forEach(i => i.addEventListener('change', () => {
   const checked = [...colMenu.querySelectorAll('input:checked')].map(x=>x.dataset.col);
   APP.visibleCols = checked.length ? checked : null;
   render();
 }));
}

/* ============================================================
   CELL RENDERING — smarter, clearer
   ============================================================ */
function renderCell(v, f, fieldName, q){
 if (v === null || v === undefined || v === '') return `<td class="cell-null">—</td>`;
 if (f.type === 'number') return `<td class="cell-num">${formatNum(v)}</td>`;
 if (f.type === 'boolean'){ return `<td class="cell-bool"><span class="${v?'yes':'no'}">${v?'✓ true':'✗ false'}</span></td>`; }
 if (f.type === 'date') return `<td class="cell-date">${formatDate(new Date(v).getTime())}</td>`;
 if (f.type === 'object'){
   const summary = objectSummary(v);
   return `<td class="cell-obj-summary" title="${escapeAttr(JSON.stringify(v))}">${escapeHTML(summary)}</td>`;
 }
 if (f.type === 'array'){
   const summary = arraySummary(v);
   return `<td class="cell-obj-summary" title="${escapeAttr(JSON.stringify(v))}">${escapeHTML(summary)}</td>`;
 }
 if (f.type === 'id'){
   const s = String(v);
   const display = s.length > 14 ? s.slice(0,8) + '…' + s.slice(-4) : s;
   return `<td class="cell-id" title="${escapeAttr(s)}">${highlightHTML(display, q)}</td>`;
 }
 if (f.type === 'category'){
   return `<td class="cell-cat"><span>${highlightHTML(String(v), q)}</span></td>`;
 }
 const s = String(v);
 /* per-value smart rendering for strings */
 if (RX.email.test(s)) return `<td class="cell-email"><a href="mailto:${escapeAttr(s)}" onclick="event.stopPropagation()">${highlightHTML(s, q)}</a></td>`;
 if (RX.url.test(s)){ const short = s.length > 36 ? s.replace(/^https?:\/\//,'').slice(0,32) + '…' : s.replace(/^https?:\/\//,''); return `<td class="cell-link"><a href="${escapeAttr(s)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="${escapeAttr(s)}">${highlightHTML(short, q)}</a></td>`; }
 if (RX.id.test(s) && s.length >= 12){ const display = s.length > 14 ? s.slice(0,8) + '…' + s.slice(-4) : s; return `<td class="cell-id" title="${escapeAttr(s)}">${highlightHTML(display, q)}</td>`; }
 const display = s.length > 80 ? s.slice(0,78) + '…' : s;
 return `<td title="${escapeAttr(s)}">${highlightHTML(display, q)}</td>`;
}

function objectSummary(o){
 const keys = Object.keys(o);
 if (!keys.length) return '{ }';
 if (keys.length <= 2){
   return keys.map(k => `${k}: ${shortValue(o[k])}`).join(', ');
 }
 return `{ ${keys.length} keys · ${keys.slice(0,2).join(', ')}… }`;
}
function arraySummary(a){
 if (!a.length) return '[ ]';
 const first = a[0];
 if (typeof first === 'object' && first !== null) return `[ ${a.length} items × ${Object.keys(first).length} keys ]`;
 if (a.length <= 3) return `[ ${a.map(shortValue).join(', ')} ]`;
 return `[ ${a.length} × ${typeof first} ]`;
}
function shortValue(v){
 if (v == null) return '∅';
 if (typeof v === 'object') return Array.isArray(v) ? `[${v.length}]` : `{${Object.keys(v).length}}`;
 const s = String(v);
 return s.length > 20 ? s.slice(0,18) + '…' : s;
}

function highlightHTML(s, q){
 const txt = escapeHTML(String(s));
 if (!q) return txt;
 const qe = q.trim();
 if (!qe) return txt;
 const re = new RegExp('(' + qe.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'ig');
 return txt.replace(re, '<mark>$1</mark>');
}

/* ============================================================
   DRAWER — premium record card
   ============================================================ */
function openDrawer(idx){
 const records = APP.drawerRecords;
 if (!records || idx < 0 || idx >= records.length) return;
 APP.drawerIdx = idx;
 const rec = records[idx];
 const fields = Object.keys(APP.schema);
 const titleField = fields.find(k => /name|title|number|label/i.test(k) && rec[k]) || fields.find(k=>APP.schema[k].type==='string' && rec[k]) || fields[0];
 const title = rec[titleField] != null ? String(rec[titleField]) : '(record)';

 /* group fields by type */
 const groups = {primary:[], number:[], category:[], boolean:[], date:[], id:[], link:[], object:[]};
 for (const name of fields){
   const f = APP.schema[name];
   const v = rec[name];
   const isLink = typeof v === 'string' && (RX.email.test(v) || RX.url.test(v));
   if (name === titleField){ groups.primary.push({name,f,v}); continue; }
   if (isLink){ groups.link.push({name,f,v}); continue; }
   if (f.type === 'number') groups.number.push({name,f,v});
   else if (f.type === 'boolean') groups.boolean.push({name,f,v});
   else if (f.type === 'date') groups.date.push({name,f,v});
   else if (f.type === 'id') groups.id.push({name,f,v});
   else if (f.type === 'object' || f.type === 'array') groups.object.push({name,f,v});
   else if (f.type === 'category') groups.category.push({name,f,v});
   else groups.primary.push({name,f,v});
 }

 const renderField = ({name,f,v}) => {
   let val, cls = '';
   if (v === null || v === undefined || v === '') val = `<span style="color:var(--text4);font-style:italic">null</span>`;
   else if (f.type === 'object' || f.type === 'array') val = `<pre>${escapeHTML(JSON.stringify(v,null,2))}</pre>`;
   else if (f.type === 'date') val = formatDate(new Date(v).getTime()) + ` <span style="color:var(--text3);font-size:11px;margin-left:6px;font-family:'JetBrains Mono'">${escapeHTML(String(v))}</span>`;
   else if (f.type === 'number'){ val = formatNum(v); cls = 'mono'; }
   else if (f.type === 'boolean') val = v ? `<span class="fd-bool-yes">✓ true</span>` : `<span class="fd-bool-no">✗ false</span>`;
   else if (f.type === 'category') val = `<span class="fd-cat">${highlightHTML(String(v), APP.search)}</span>`;
   else if (typeof v === 'string' && RX.email.test(v)) val = `<a href="mailto:${escapeAttr(v)}">${escapeHTML(v)}</a>`;
   else if (typeof v === 'string' && RX.url.test(v)) val = `<a href="${escapeAttr(v)}" target="_blank" rel="noopener">${escapeHTML(v)}</a>`;
   else if (f.type === 'id'){ val = highlightHTML(String(v), APP.search); cls = 'mono'; }
   else val = highlightHTML(String(v), APP.search);
   return `<div class="field-row-d" title="${escapeAttr(name)}">
     <div class="fd-label"><span class="type-pill t-${typeShort(f.type)}">${typeAbbr(f.type)}</span><span style="word-break:break-word">${escapeHTML(humanize(name))}</span></div>
     <div class="fd-value ${cls}">${val}</div>
   </div>`;
 };
 const sectionMarkup = (label, key, items) => items.length ? `<div class="drawer-section-title t-${key}">${label}</div>${items.map(renderField).join('')}` : '';

 const drawer = document.getElementById('drawer');
 drawer.innerHTML = `
   <div class="drawer-h">
     <div class="drawer-h-info">
       <div class="drawer-eye">${escapeHTML(humanize(APP.currentDS))} · record ${idx+1} of ${records.length}</div>
       <div class="drawer-title">${escapeHTML(title)}</div>
     </div>
     <button class="drawer-x" onclick="closeDrawer()" title="Close">${I.close}</button>
   </div>
   <div class="drawer-body">
     ${groups.primary.map(renderField).join('')}
     ${sectionMarkup('Categories','cat', groups.category)}
     ${sectionMarkup('Numbers','num', groups.number)}
     ${sectionMarkup('Booleans','bool', groups.boolean)}
     ${sectionMarkup('Dates','date', groups.date)}
     ${sectionMarkup('Links','link', groups.link)}
     ${sectionMarkup('Identifiers','id', groups.id)}
     ${sectionMarkup('Nested data','obj', groups.object)}
   </div>
   <div class="drawer-nav">
     <button onclick="navDrawer(-1)" ${idx<=0?'disabled':''}>${I.left} Previous</button>
     <button onclick="navDrawer(1)" ${idx>=records.length-1?'disabled':''}>Next ${I.right}</button>
   </div>
 `;
 drawer.classList.add('open');
 document.getElementById('drawerBack').classList.add('open');
 document.querySelectorAll('tbody tr').forEach(tr => tr.classList.toggle('selected', Number(tr.dataset.idx) === idx));
}

function navDrawer(d){ const next = APP.drawerIdx + d; if (next >= 0 && next < (APP.drawerRecords?.length||0)) openDrawer(next); }
function closeDrawer(){ APP.drawerIdx = null; document.getElementById('drawer')?.classList.remove('open'); document.getElementById('drawerBack')?.classList.remove('open'); document.querySelectorAll('tbody tr.selected').forEach(tr => tr.classList.remove('selected')); }

/* ============================================================
   EXPORT
   ============================================================ */
function csvFromRecords(records){
 const cols = APP.visibleCols || Object.keys(APP.schema);
 const esc = v => { if (v == null) return ''; const s = typeof v === 'object' ? JSON.stringify(v) : String(v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s; };
 return [cols.map(c=>humanize(c)).join(','), ...records.map(r => cols.map(c => esc(r[c])).join(','))].join('\n');
}
function downloadCSV(csv, name){
 const blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8'});
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a');
 a.href = url; a.download = `${name}-${new Date().toISOString().slice(0,10)}.csv`;
 a.click();
 URL.revokeObjectURL(url);
}
function exportCSV(){
 if (!APP.currentDS){ toast('error','No data','Load a dataset first'); return; }
 const records = getFiltered();
 if (!records.length){ toast('error','No rows','Nothing to export with current filters'); return; }
 downloadCSV(csvFromRecords(records), APP.currentDS);
 toast('success','Exported',`${records.length.toLocaleString()} rows · ${(APP.visibleCols||Object.keys(APP.schema)).length} columns`);
}
function exportSelected(){
 if (!APP.selected.size){ toast('error','Nothing selected','Tick rows first'); return; }
 const all = APP.datasets[APP.currentDS];
 const records = [...APP.selected].sort((a,b)=>a-b).map(i=>APP.drawerRecords[i]).filter(Boolean);
 if (!records.length){ toast('error','Empty','Selected rows are out of view'); return; }
 downloadCSV(csvFromRecords(records), APP.currentDS+'-selected');
 toast('success','Exported',`${records.length.toLocaleString()} selected rows`);
}
