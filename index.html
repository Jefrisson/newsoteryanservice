<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soteryan · Service Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Open Sans',system-ui,-apple-system,sans-serif;background:#080a0d;color:#e2e8f0;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:rgba(220,85,42,.4)}
:root{
  --red:#950f18;--orange:#DC552A;--orange-soft:rgba(220,85,42,.12);
  --bg:#080a0d;--bg1:#0d1015;--bg2:#111318;--bg3:#161a22;--bg4:#1c212c;
  --border:rgba(255,255,255,.06);--border-strong:rgba(255,255,255,.1);
  --border-accent:rgba(220,85,42,.25);
  --text:#e8eaed;--text2:#9ba3ae;--text3:#5f6772;
  --green:#22c55e;--yellow:#f59e0b;--blue:#60a5fa;--purple:#a78bfa;--rose:#f87171;
}

/* APP LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:240px;height:100vh;position:fixed;left:0;top:0;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.logo-wrap{display:flex;align-items:center;gap:11px;text-decoration:none}
.logo-shield{width:38px;height:38px;flex-shrink:0;filter:drop-shadow(0 4px 12px rgba(220,85,42,.3));transition:transform .3s}
.logo-wrap:hover .logo-shield{transform:scale(1.08) rotate(-3deg)}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:var(--text);letter-spacing:.02em}
.logo-sub{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-top:4px}

.sidebar-nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-section-label{padding:14px 20px 6px;font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 20px;cursor:pointer;border-left:2px solid transparent;transition:all .18s;color:var(--text3);font-size:13.5px;font-weight:500;font-family:'Space Grotesk',sans-serif;user-select:none;position:relative}
.nav-item:hover{background:rgba(255,255,255,.025);color:var(--text2);border-left-color:rgba(255,255,255,.1)}
.nav-item.active{border-left-color:var(--orange);background:rgba(220,85,42,.08);color:var(--text)}
.nav-item.active::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:3px;border-radius:50%;background:var(--orange);box-shadow:0 0 8px var(--orange)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;background:rgba(220,85,42,.18);color:var(--orange);font-size:10px;font-weight:700;padding:1px 7px;border-radius:100px;font-family:'Space Grotesk',sans-serif}

.sidebar-footer{padding:14px 18px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:10px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--orange));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;font-family:'Space Grotesk',sans-serif;flex-shrink:0;box-shadow:0 4px 12px rgba(220,85,42,.3)}
.user-info{overflow:hidden;line-height:1.3}
.user-name{font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Space Grotesk',sans-serif}
.user-role{font-size:10.5px;color:var(--text3)}

/* MAIN */
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0}

/* TOPBAR */
.topbar{height:60px;background:rgba(8,10,13,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:18px;position:sticky;top:0;z-index:50}
.menu-toggle{background:transparent;border:0;cursor:pointer;color:var(--text2);padding:6px;display:none;border-radius:6px}
.menu-toggle:hover{background:rgba(255,255,255,.05)}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--text);white-space:nowrap}
.topbar-title-sub{font-size:11px;font-weight:500;color:var(--text3);margin-top:1px}
.search-wrap{flex:1;max-width:420px;position:relative;margin-left:8px}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 36px;color:var(--text);font-size:13px;font-family:'Open Sans',sans-serif;outline:none;transition:all .2s}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(220,85,42,.1)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;width:14px;height:14px}
.search-results{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--bg2);border:1px solid var(--border-strong);border-radius:10px;max-height:380px;overflow-y:auto;z-index:200;display:none;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.search-results.visible{display:block;animation:fadeSlideDown .2s ease both}
.search-empty{padding:18px;text-align:center;color:var(--text3);font-size:13px}
.search-section{padding:4px 0}
.search-section-title{padding:8px 14px 4px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.search-result-item{display:flex;align-items:center;gap:11px;padding:9px 14px;cursor:pointer;transition:background .12s}
.search-result-item:hover{background:rgba(220,85,42,.08)}
.search-result-content{flex:1;min-width:0}
.search-result-name{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-sub{font-size:11px;color:var(--text3);margin-top:1px}
.search-result-icon{width:28px;height:28px;border-radius:6px;background:rgba(220,85,42,.12);color:var(--orange);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.search-result-icon svg{width:13px;height:13px}

.topbar-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.topbar-date{font-size:11.5px;color:var(--text3);font-family:'Space Grotesk',sans-serif;white-space:nowrap;text-align:right;line-height:1.3}
.topbar-date strong{color:var(--text2);display:block;font-weight:600}

.live-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:100px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);font-size:10.5px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;font-family:'Space Grotesk',sans-serif}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}

/* CONTENT */
.content{flex:1;padding:26px;overflow-y:auto;transition:opacity .3s}

/* VIEW HEADER */
.view-header{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.view-header-left{flex:1;min-width:200px}
.view-h{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.view-count{font-size:12px;color:var(--text3);margin-top:3px;font-weight:500}
.view-count strong{color:var(--orange);font-weight:700}

.filter-tabs{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);padding:4px;border-radius:9px;flex-wrap:wrap}
.filter-tab{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text3);font-family:'Space Grotesk',sans-serif;white-space:nowrap;user-select:none;border:0;background:transparent}
.filter-tab:hover{color:var(--text2)}
.filter-tab.active{background:var(--orange);color:white;box-shadow:0 4px 12px rgba(220,85,42,.3)}

.view-search{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 32px;color:var(--text);font-size:13px;font-family:'Open Sans',sans-serif;outline:none;transition:all .2s;width:230px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235f6772' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>");background-repeat:no-repeat;background-position:11px center}
.view-search::placeholder{color:var(--text3)}
.view-search:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(220,85,42,.1)}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all .22s;cursor:pointer;animation:fadeSlideUp .35s ease both;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 0%,rgba(220,85,42,.02) 100%);opacity:0;transition:opacity .25s;pointer-events:none}
.card:hover::before{opacity:1}
.card:hover{border-color:var(--border-accent);transform:translateY(-3px);box-shadow:0 14px 40px rgba(0,0,0,.4),0 0 0 1px rgba(220,85,42,.15)}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.card-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.card-avatar{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,rgba(149,15,24,.35),rgba(220,85,42,.2));border:1px solid rgba(220,85,42,.25);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#ffb398;font-family:'Space Grotesk',sans-serif;flex-shrink:0}
.card-head-text{flex:1;min-width:0}
.card-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--text);line-height:1.3}
.card-sub{font-size:12px;color:var(--text3);margin-top:3px}
.card-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.card-meta-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text3)}
.card-meta-item svg{width:12px;height:12px;flex-shrink:0}
.card-meta-item strong{color:var(--text2);font-weight:600}
.card-divider{height:1px;background:var(--border);margin:14px 0}
.card-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.card-stat{padding:8px 10px;background:rgba(255,255,255,.02);border-radius:7px}
.card-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.card-stat-value{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-top:2px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:24px}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;cursor:default;transition:all .22s;animation:fadeSlideUp .4s ease both}
.kpi-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--kc,var(--orange))}
.kpi-card::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:var(--kc,var(--orange));opacity:.05;transition:transform .35s}
.kpi-card:hover{border-color:var(--border-strong);transform:translateY(-2px)}
.kpi-card:hover::after{transform:scale(1.4)}
.kpi-icon{width:36px;height:36px;border-radius:9px;background:rgba(220,85,42,.12);display:flex;align-items:center;justify-content:center;margin-bottom:14px;color:var(--kc,var(--orange));position:relative;z-index:1}
.kpi-icon svg{width:18px;height:18px}
.kpi-value{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--text);line-height:1;letter-spacing:-.02em;position:relative;z-index:1}
.kpi-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:7px;font-weight:600;position:relative;z-index:1}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:4px;position:relative;z-index:1}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:22px;animation:fadeSlideUp .4s ease both}
.chart-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.chart-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--text)}
.chart-sub{font-size:11px;color:var(--text3);margin-top:2px}
.chart-container{position:relative}

/* TABLE */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;animation:fadeSlideUp .35s ease both}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:680px}
thead th{padding:13px 18px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(220,85,42,.04)}
td{padding:13px 18px;font-size:13px;color:var(--text2);vertical-align:middle}
td.bold{font-weight:600;color:var(--text);font-family:'Space Grotesk',sans-serif}
td.mono{font-family:'Space Grotesk',sans-serif;font-weight:600;color:var(--text)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:100px;font-size:10.5px;font-weight:700;letter-spacing:.04em;white-space:nowrap;font-family:'Space Grotesk',sans-serif;text-transform:uppercase}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.b-green{background:rgba(34,197,94,.12);color:#4ade80}
.b-red{background:rgba(248,113,113,.12);color:#f87171}
.b-yellow{background:rgba(245,158,11,.12);color:#fbbf24}
.b-blue{background:rgba(96,165,250,.12);color:#60a5fa}
.b-gray{background:rgba(148,163,184,.1);color:#94a3b8}
.b-orange{background:rgba(220,85,42,.15);color:#fb923c}
.b-purple{background:rgba(167,139,250,.12);color:#a78bfa}

/* PROGRESS */
.progress-bar{height:5px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--orange),var(--red));width:0;transition:width 1.2s cubic-bezier(.25,.46,.45,.94)}
.progress-fill.green{background:linear-gradient(90deg,#22c55e,#16a34a)}
.progress-fill.blue{background:linear-gradient(90deg,#60a5fa,#3b82f6)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border-strong);border-radius:16px;max-width:720px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(24px) scale(.96);transition:transform .3s cubic-bezier(.34,1.56,.64,1);position:relative;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-head{padding:24px 26px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:10}
.modal-head-left{flex:1}
.modal-eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);margin-bottom:6px;font-family:'Space Grotesk',sans-serif}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--text);line-height:1.2}
.modal-subtitle{font-size:13px;color:var(--text3);margin-top:6px}
.modal-close{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.05);border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s;flex-shrink:0}
.modal-close:hover{background:rgba(248,113,113,.15);color:#f87171;transform:rotate(90deg)}
.modal-body{padding:22px 26px 26px}
.modal-section{margin-bottom:22px}
.modal-section:last-child{margin-bottom:0}
.modal-section-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:12px;font-family:'Space Grotesk',sans-serif;display:flex;align-items:center;gap:8px}
.modal-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-field-label{font-size:10.5px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.modal-field-value{font-size:14px;color:var(--text);font-weight:500;margin-top:3px;word-break:break-word}
.modal-field-value a{color:var(--orange);text-decoration:none}
.modal-field-value a:hover{text-decoration:underline}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:0}
.timeline-item{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--border);animation:fadeSlideUp .35s ease both}
.timeline-item:last-child{border-bottom:none}
.timeline-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.timeline-icon svg{width:14px;height:14px}
.ti-poc{background:rgba(220,85,42,.12);color:var(--orange)}
.ti-auth{background:rgba(96,165,250,.12);color:var(--blue)}
.ti-project{background:rgba(34,197,94,.12);color:var(--green)}
.ti-client{background:rgba(167,139,250,.12);color:var(--purple)}
.ti-task{background:rgba(245,158,11,.12);color:var(--yellow)}
.ti-invoice{background:rgba(248,113,113,.12);color:var(--rose)}
.ti-document{background:rgba(148,163,184,.12);color:var(--text2)}
.ti-conference{background:rgba(244,114,182,.12);color:#f472b6}
.timeline-text{flex:1;font-size:13px;color:var(--text2);line-height:1.55}
.timeline-text strong{color:var(--text);font-weight:600}
.timeline-time{font-size:11px;color:var(--text3);flex-shrink:0;margin-top:2px;font-family:'Space Grotesk',sans-serif;white-space:nowrap}

/* CALENDAR */
.calendar-grid{display:grid;grid-template-columns:1fr 320px;gap:20px}
.cal-main{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;animation:fadeSlideUp .4s ease both}
.cal-side{display:flex;flex-direction:column;gap:14px}
.cal-side-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;animation:fadeSlideUp .4s ease both}
.cal-side-title{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:14px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-month{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--text)}
.cal-nav{display:flex;gap:4px}
.cal-nav-btn{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text2);cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{border-color:var(--border-accent);color:var(--text);background:var(--bg4)}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:5px}
.cal-day-label{text-align:center;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:6px 0;font-family:'Space Grotesk',sans-serif}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{min-height:84px;background:rgba(255,255,255,.015);border:1px solid var(--border);border-radius:7px;padding:6px;transition:border-color .15s;display:flex;flex-direction:column;gap:2px}
.cal-cell:hover{border-color:var(--border-accent)}
.cal-cell.other-month{opacity:.35}
.cal-cell.today{border-color:rgba(220,85,42,.5);background:rgba(220,85,42,.06)}
.cal-cell.has-event{border-color:rgba(96,165,250,.2)}
.cal-day-num{font-size:11.5px;font-weight:700;color:var(--text2);font-family:'Space Grotesk',sans-serif}
.cal-cell.today .cal-day-num{color:var(--orange)}
.cal-event{font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:600;line-height:1.4}
.ev-meeting{background:rgba(96,165,250,.18);color:#93c5fd}
.ev-deadline{background:rgba(248,113,113,.18);color:#fca5a5}
.ev-call{background:rgba(34,197,94,.18);color:#86efac}
.ev-internal{background:rgba(167,139,250,.18);color:#c4b5fd}

.upcoming-event{padding:11px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .15s}
.upcoming-event:hover{border-color:var(--border-accent);background:rgba(220,85,42,.04)}
.upcoming-event:last-child{margin-bottom:0}
.upcoming-event-date{font-family:'Space Grotesk',sans-serif;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--orange);margin-bottom:4px}
.upcoming-event-title{font-size:13px;color:var(--text);font-weight:600;font-family:'Space Grotesk',sans-serif}
.upcoming-event-meta{font-size:11px;color:var(--text3);margin-top:3px}

/* KANBAN */
.kanban-toggle{display:flex;gap:4px}
.kanban-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:14px}
.kanban-column{min-width:270px;flex-shrink:0}
.kanban-col-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px}
.kanban-col-name{font-family:'Space Grotesk',sans-serif;font-size:12.5px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.06em}
.kanban-col-count{background:rgba(220,85,42,.15);border-radius:100px;font-size:10px;font-weight:700;padding:1px 8px;color:var(--orange);font-family:'Space Grotesk',sans-serif;margin-left:auto}
.kanban-col-amt{font-size:11px;color:var(--text3);margin-top:0;font-weight:600}
.kanban-col-body{display:flex;flex-direction:column;gap:9px;min-height:100px}
.kanban-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;animation:fadeSlideUp .35s ease both}
.kanban-card:hover{border-color:var(--border-accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.kanban-card-title{font-family:'Space Grotesk',sans-serif;font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.3}
.kanban-card-client{font-size:11.5px;color:var(--text3);margin-bottom:10px}
.kanban-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.kanban-amt{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--text)}
.kanban-prob{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);font-weight:600}

/* REPORTS */
.reports-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.report-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;animation:fadeSlideUp .4s ease both;position:relative;overflow:hidden}
.report-card.full{grid-column:1/-1}
.report-card.featured{background:linear-gradient(135deg,var(--bg2) 0%,rgba(149,15,24,.08) 100%);border-color:rgba(220,85,42,.18)}
.report-head{margin-bottom:20px}
.report-eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);margin-bottom:5px;font-family:'Space Grotesk',sans-serif}
.report-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:5px;letter-spacing:-.01em}
.report-subtitle{font-size:12.5px;color:var(--text3)}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 20px;text-align:center;color:var(--text3);background:var(--bg2);border:1px dashed var(--border);border-radius:12px}
.empty-state svg{width:48px;height:48px;margin-bottom:14px;opacity:.4}
.empty-state-title{font-family:'Space Grotesk',sans-serif;font-size:15px;color:var(--text2);font-weight:600;margin-bottom:4px}
.empty-state-sub{font-size:13px}

/* TASKS */
.task-list{display:flex;flex-direction:column;gap:8px}
.task-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all .18s;animation:fadeSlideUp .35s ease both}
.task-item:hover{border-color:var(--border-strong)}
.task-item.done{opacity:.55}
.task-item.overdue{border-color:rgba(248,113,113,.2)}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.task-item.done .task-check{border-color:var(--green);background:rgba(34,197,94,.15);color:var(--green)}
.task-check svg{width:11px;height:11px;display:none}
.task-item.done .task-check svg{display:block}
.task-title{flex:1;font-size:14px;color:var(--text);font-weight:500;font-family:'Space Grotesk',sans-serif}
.task-item.done .task-title{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.task-due{font-size:11px;color:var(--text3);font-weight:600;font-family:'Space Grotesk',sans-serif}
.task-due.overdue{color:#f87171}
.task-project{font-size:11px;color:var(--orange);font-weight:600;font-family:'Space Grotesk',sans-serif;background:rgba(220,85,42,.1);padding:2px 7px;border-radius:5px}

/* POC PIPELINE */
.poc-pipeline{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.poc-col-head{display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:9px;margin-bottom:10px;border:1px solid var(--border)}
.poc-col-head.pending{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.18)}
.poc-col-head.approved{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.18)}
.poc-col-head.rejected{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.18)}
.poc-col-head.completed{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.18)}
.poc-col-name{font-family:'Space Grotesk',sans-serif;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.pending .poc-col-name{color:var(--yellow)}
.approved .poc-col-name{color:var(--green)}
.rejected .poc-col-name{color:var(--rose)}
.completed .poc-col-name{color:var(--blue)}
.poc-col-count{margin-left:auto;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--text2);background:rgba(255,255,255,.06);padding:1px 8px;border-radius:100px}
.poc-list{display:flex;flex-direction:column;gap:9px}
.poc-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;animation:fadeSlideUp .35s ease both}
.poc-card:hover{border-color:var(--border-accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.poc-card-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;word-break:break-word}
.poc-card-meta{font-size:11px;color:var(--text3);line-height:1.5}
.poc-card-meta strong{color:var(--text2);font-weight:600}

/* CONFERENCES */
.conf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.conf-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .22s;animation:fadeSlideUp .4s ease both}
.conf-card:hover{border-color:var(--border-accent);transform:translateY(-3px);box-shadow:0 14px 40px rgba(0,0,0,.35)}
.conf-card-header{padding:22px;background:linear-gradient(135deg,rgba(149,15,24,.25),rgba(220,85,42,.1) 60%,transparent);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.conf-card-header::after{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(220,85,42,.2),transparent 70%)}
.conf-card-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;position:relative;z-index:1}
.conf-card-loc{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;position:relative;z-index:1}
.conf-card-loc svg{width:13px;height:13px;color:var(--orange)}
.conf-card-body{padding:18px 22px}
.conf-stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.conf-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;font-family:'Space Grotesk',sans-serif}
.conf-stat-value{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-top:3px}
.conf-stat-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* DOCUMENTS */
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.doc-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .22s;animation:fadeSlideUp .35s ease both}
.doc-card:hover{border-color:var(--border-accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.doc-card-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.doc-icon{width:42px;height:42px;border-radius:10px;background:rgba(220,85,42,.12);color:var(--orange);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-icon svg{width:18px;height:18px}
.doc-icon.proposal{background:rgba(96,165,250,.12);color:var(--blue)}
.doc-icon.contract{background:rgba(34,197,94,.12);color:var(--green)}
.doc-icon.brief{background:rgba(245,158,11,.12);color:var(--yellow)}
.doc-icon.act{background:rgba(167,139,250,.12);color:var(--purple)}
.doc-card-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.doc-card-ref{font-size:11px;color:var(--text3);margin-top:3px;font-family:'Space Grotesk',sans-serif;font-weight:600}
.doc-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}

/* PARTICIPANT */
.participant-card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:9px;padding:14px;margin-bottom:10px}
.expense-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px}
.expense-row:last-child{border-bottom:none}
.expense-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:4px;font-family:'Space Grotesk',sans-serif}
.expense-cat.flight{background:rgba(96,165,250,.15);color:var(--blue)}
.expense-cat.hotel{background:rgba(167,139,250,.15);color:var(--purple)}
.expense-cat.taxi{background:rgba(245,158,11,.15);color:var(--yellow)}
.expense-cat.food{background:rgba(34,197,94,.15);color:var(--green)}
.expense-cat.other{background:rgba(148,163,184,.12);color:var(--text2)}
.expense-amt{margin-left:auto;font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--text)}

/* LINK STYLE */
.link-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:6px}
.link-row:hover{background:rgba(220,85,42,.06);border-color:var(--border-accent)}
.link-row:last-child{margin-bottom:0}
.link-row-icon{width:28px;height:28px;border-radius:7px;background:rgba(220,85,42,.12);color:var(--orange);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.link-row-icon svg{width:13px;height:13px}
.link-row-content{flex:1;min-width:0}
.link-row-title{font-size:13px;color:var(--text);font-weight:500;font-family:'Space Grotesk',sans-serif}
.link-row-sub{font-size:11px;color:var(--text3);margin-top:1px}

/* RESPONSIVE */
@media (max-width:1100px){.charts-row{grid-template-columns:1fr}.calendar-grid{grid-template-columns:1fr}.poc-pipeline{grid-template-columns:1fr 1fr}.reports-grid{grid-template-columns:1fr}}

.fade-enter-active{opacity:1;transform:translateY(0);transition:all .3s cubic-bezier(.4,0,.2,1)}

.scroll-in{opacity:0;transform:translateY(20px);transition:all .5s cubic-bezier(.25,.46,.45,.94)}
.scroll-in.visible{opacity:1;transform:translateY(0)}

const F = {
 money: n => '$' + Number(n||0).toLocaleString('en-US'),
 moneyShort: n => {
   n = Number(n||0);
   if (n >= 1e6) return '$' + (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
   if (n >= 1e3) return '$' + (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K';
   return '$' + n;
 },
 date: d => {
   if (!d) return '—';
   const dt = new Date(d + (typeof d === 'string' && d.length === 10 ? 'T00:00:00' : ''));
   if (isNaN(dt)) return '—';
   return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
 },
 dateShort: d => {
   if (!d) return '—';
   const dt = new Date(d + 'T00:00:00');
   return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
 },
 ts: ts => new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}),
 rel: ts => {
   const d = Date.now() - ts;
   if (d < 60000) return 'just now';
   if (d < 3600000) return Math.floor(d/60000) + 'm ago';
   if (d < 86400000) return Math.floor(d/3600000) + 'h ago';
   if (d < 30*86400000) return Math.floor(d/86400000) + 'd ago';
   return Math.floor(d/(30*86400000)) + 'mo ago';
 },
 initials: name => (name||'?').split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase(),
 stageName: id => {
   const s = L.stage(id);
   if (!s) return id;
   return s.customName || stageNames[s.nameKey] || s.nameKey;
 },
 daysUntil: dateStr => {
   if (!dateStr) return null;
   const d = new Date(dateStr + 'T00:00:00');
   const today = new Date(); today.setHours(0,0,0,0);
   return Math.ceil((d - today) / 86400000);
 }
};

function buildSidebar(){

 const pendingPocs = DB.pocs.filter(p=>p.status==='pending_approval').length;
 const openTasks = DB.tasks.filter(t=>!t.done).length;

     <div class="nav-item" data-view="${item.id}" onclick="navigate('${item.id}')">

function navigate(view){
 state.view = view;
 document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view===view));
 const t = VIEW_TITLES[view] || {title:view,sub:''};
 document.getElementById('topbarTitle').textContent = t.title;
 document.getElementById('topbarSub').textContent = t.sub;
 Object.values(state.charts).forEach(c => { try{c.destroy();}catch(e){} });
 state.charts = {};
 document.getElementById('sidebar').classList.remove('open');
 const el = document.getElementById('content');
 el.style.opacity = '0';
 setTimeout(() => {
   const renders = {
     dashboard:renderDashboard, clients:renderClients, contacts:renderContacts,
     projects:renderProjects, tasks:renderTasks, invoices:renderInvoices,
     documents:renderDocuments, calendar:renderCalendar, pocs:renderPOCs,
     conferences:renderConferences, reports:renderReports, activity:renderActivity
   };
   el.innerHTML = '';
   if (renders[view]) renders[view](el);
   el.style.opacity = '1';
   el.scrollTop = 0;
 }, 120);
}

function badge(text, type){ return `<span class="badge b-${type}"><span class="badge-dot"></span>${text}</span>`; }

function statusBadge(s){
 const m = {
   in_progress:['In Progress','blue'], won:['Won','green'], lost:['Lost','red'],
   paid:['Paid','green'], sent:['Sent','blue'], draft:['Draft','gray'], overdue:['Overdue','red'],
   signed:['Signed','green'], review:['In Review','yellow'],
   pending_approval:['Pending','yellow'], approved:['Approved','green'], rejected:['Rejected','red'], completed:['Completed','blue'],
   planned:['Planned','blue'], attended:['Attended','green'], cancelled:['Cancelled','red']
 };
 const [t,c] = m[s] || [s,'gray'];
 return badge(t, c);
}

function categoryBadge(cat){
 const m = { proposal:'blue', contract:'green', brief:'yellow', act:'purple' };
 return badge(cat, m[cat]||'gray');
}

function pocStatusBadge(s){ return statusBadge(s); }

function eventTypeBadge(t){
 const m = { meeting:'blue', deadline:'red', call:'green', internal:'purple' };
 return badge(t, m[t]||'gray');
}

function kpiCard(label, value, sub, color, rgb, icon){
 return `<div class="kpi-card" style="--kc:${color}">
   <div class="kpi-icon">${icon}</div>
   <div class="kpi-value" data-counter="${typeof value==='number'?value:''}" data-prefix="${(typeof value==='string' && value.startsWith('$')) ? '$' : ''}">${typeof value==='number' ? value : value}</div>
   <div class="kpi-label">${label}</div>
   ${sub?`<div class="kpi-sub">${sub}</div>`:''}
 </div>`;
}

function renderTasks(el){
 state.filters.tasks = state.filters.tasks || 'all';
 const f = state.filters.tasks;
 const today = new Date(); today.setHours(0,0,0,0);
 el.innerHTML = `
  <div class="view-header">
   <div class="view-header-left">
    <h2 class="view-h">Tasks</h2>
    <div class="view-count"><strong>${DB.tasks.filter(t=>!t.done).length}</strong> open · <strong>${DB.tasks.filter(t=>t.done).length}</strong> done</div>
   </div>
   <div class="filter-tabs" id="tkTabs">
    <button class="filter-tab ${f==='all'?'active':''}" data-f="all">All</button>
    <button class="filter-tab ${f==='pending'?'active':''}" data-f="pending">Pending</button>
    <button class="filter-tab ${f==='overdue'?'active':''}" data-f="overdue">Overdue</button>
    <button class="filter-tab ${f==='done'?'active':''}" data-f="done">Done</button>
   </div>
  </div>
  <div id="tkList"></div>
 `;
 const render = () => {
   let list = DB.tasks.slice().sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||''));
   const cur = state.filters.tasks;
   if (cur === 'pending') list = list.filter(t=>!t.done);
   if (cur === 'done') list = list.filter(t=>t.done);
   if (cur === 'overdue') list = list.filter(t=>{ const d = F.daysUntil(t.dueDate); return !t.done && d!==null && d<0; });
   const lt = document.getElementById('tkList');
   if (!list.length){ lt.innerHTML = emptyState('No tasks here'); return; }
   lt.innerHTML = `<div class="task-list">${list.map(t=>{
     const days = F.daysUntil(t.dueDate);
     const overdue = !t.done && days !== null && days < 0;
     const project = t.projectId ? L.project(t.projectId) : null;
     return `<div class="task-item ${t.done?'done':''} ${overdue?'overdue':''}">
       <div class="task-check">${I.check}</div>
       <div class="task-title">${escapeHTML(t.title)}</div>
       <div class="task-meta">
        ${project ? `<span class="task-project">${escapeHTML(project.title)}</span>` : ''}
        <span class="task-due ${overdue?'overdue':''}">${overdue?`${Math.abs(days)}d overdue`:F.date(t.dueDate)}</span>
       </div>
      </div>`;
   }).join('')}</div>`;
 };
 render();
 el.querySelectorAll('#tkTabs .filter-tab').forEach(b => b.addEventListener('click',()=>{
   state.filters.tasks = b.dataset.f;
   el.querySelectorAll('#tkTabs .filter-tab').forEach(x=>x.classList.toggle('active', x===b));
   render();
 }));
}

function renderCalMonth(){
 const m = state.calMonth;
 const main = document.getElementById('calMain');
 if (!main) return;
 const monthName = m.toLocaleDateString('en-US',{month:'long',year:'numeric'});
 const first = new Date(m.getFullYear(), m.getMonth(), 1);
 const last = new Date(m.getFullYear(), m.getMonth()+1, 0);
 const startWeekday = (first.getDay() + 6) % 7;  // Mon-first
 const totalCells = Math.ceil((startWeekday + last.getDate()) / 7) * 7;
 const today = new Date(); today.setHours(0,0,0,0);

 let cells = '';
 for (let i = 0; i < totalCells; i++){
   const day = i - startWeekday + 1;
   const date = new Date(m.getFullYear(), m.getMonth(), day);
   const inMonth = day >= 1 && day <= last.getDate();
   const isToday = date.getTime() === today.getTime();
   const dateStr = date.toISOString().slice(0,10);
   const events = DB.calendarEvents.filter(e=>e.date===dateStr);
   const cls = ['cal-cell'];
   if (!inMonth) cls.push('other-month');
   if (isToday) cls.push('today');
   if (events.length) cls.push('has-event');
   cells += `<div class="${cls.join(' ')}">
     <div class="cal-day-num">${date.getDate()}</div>
     ${events.map(e=>`<div class="cal-event ev-${e.type}" onclick="openEventModal('${e.id}')" title="${escapeHTML(e.title)}">${escapeHTML(e.title)}</div>`).join('')}
   </div>`;
 }

 main.innerHTML = `
  <div class="cal-header">
   <div class="cal-month">${monthName}</div>
   <div class="cal-nav">
    <button class="cal-nav-btn" onclick="calNav(-1)">${I.chevL}</button>
    <button class="cal-nav-btn" onclick="calNav(0)">Today</button>
    <button class="cal-nav-btn" onclick="calNav(1)">${I.chevR}</button>
   </div>
  </div>
  <div class="cal-days-header">
   ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="cal-day-label">${d}</div>`).join('')}
  </div>
  <div class="cal-grid">${cells}</div>
 `;
}

function calNav(dir){
 if (dir === 0) state.calMonth = new Date(2026, 3, 1);
 else state.calMonth = new Date(state.calMonth.getFullYear(), state.calMonth.getMonth()+dir, 1);
 renderCalMonth();
}

/* ============================================================
   COUNTER ANIMATION
   ============================================================ */
function animateCounters(){
 document.querySelectorAll('[data-counter]').forEach(el => {
   const raw = el.dataset.counter;
   if (!raw) return;
   const target = Number(raw);
   if (isNaN(target)) return;
   const duration = 1100;
   const start = performance.now();
   const text = el.textContent;
   const prefix = text.match(/^[^\d]*/)?.[0] || '';
   const suffix = text.match(/[^\d.]*$/)?.[0] || '';
   const tick = (now) => {
     const t = Math.min(1, (now - start) / duration);
     const eased = 1 - Math.pow(1 - t, 3);
     const v = Math.round(target * eased);
     if (target >= 1000) el.textContent = prefix + (v >= 1e6 ? (v/1e6).toFixed(1).replace(/\.0$/,'') + 'M' : v >= 1e3 ? (v/1e3).toFixed(1).replace(/\.0$/,'') + 'K' : v) + suffix;
     else el.textContent = prefix + v + suffix;
     if (t < 1) requestAnimationFrame(tick);
     else el.textContent = text;
   };
   requestAnimationFrame(tick);
 });
}

/* ============================================================
   GLOBAL SEARCH
   ============================================================ */
function initSearch(){
 const input = document.getElementById('globalSearch');
 const results = document.getElementById('searchResults');
 input.addEventListener('input', e => {
   const q = e.target.value.trim().toLowerCase();
   if (!q){ results.classList.remove('visible'); return; }
   const matches = {clients:[], contacts:[], projects:[], invoices:[], documents:[], pocs:[], conferences:[]};
   const test = (s) => (s||'').toLowerCase().includes(q);
   DB.clients.forEach(c => { if (test(c.name)||test(c.industry)||test(c.email)||test(c.address)) matches.clients.push(c); });
   DB.contacts.forEach(c => { if (test(c.name)||test(c.role)||test(c.email)) matches.contacts.push(c); });
   DB.projects.forEach(p => { if (test(p.title)||test(p.notes)) matches.projects.push(p); });
   DB.invoices.forEach(i => { if (test(i.number)||test(i.notes)) matches.invoices.push(i); });
   DB.documents.forEach(d => { if (test(d.title)||test(d.reference)||test(d.notes)) matches.documents.push(d); });
   DB.pocs.forEach(p => { if (test(p.title)||test(p.notes)) matches.pocs.push(p); });
   DB.conferences.forEach(c => { if (test(c.title)||test(c.city)||test(c.country)||test(c.organizer)) matches.conferences.push(c); });
   const total = Object.values(matches).reduce((s,arr)=>s+arr.length,0);
   if (!total){ results.innerHTML = '<div class="search-empty">No matches for «'+escapeHTML(q)+'»</div>'; results.classList.add('visible'); return; }
   const sec = (label, arr, icon, onclick) => arr.length ? `
     <div class="search-section">
       <div class="search-section-title">${label} · ${arr.length}</div>
       ${arr.slice(0,5).map(item=>`
         <div class="search-result-item" onclick="${onclick(item)}">
          <div class="search-result-icon">${icon}</div>
          <div class="search-result-content">
           <div class="search-result-name">${escapeHTML(item.name||item.title||item.number||'(item)')}</div>
           <div class="search-result-sub">${searchSub(label, item)}</div>
          </div>
         </div>
       `).join('')}
     </div>
   ` : '';
   results.innerHTML =
     sec('Clients', matches.clients, I.clients, item=>`document.getElementById('searchResults').classList.remove('visible');document.getElementById('globalSearch').value='';openClientModal('${item.id}')`) +
     sec('Contacts', matches.contacts, I.contacts, item=>`document.getElementById('searchResults').classList.remove('visible');document.getElementById('globalSearch').value='';openContactModal('${item.id}')`) +
     sec('Deals', matches.projects, I.projects, item=>`document.getElementById('searchResults').classList.remove('visible');document.getElementById('globalSearch').value='';openProjectModal('${item.id}')`) +
     sec('Invoices', matches.invoices, I.invoices, item=>`document.getElementById('searchResults').classList.remove('visible');document.getElementById('globalSearch').value='';openInvoiceModal('${item.id}')`) +
     sec('Documents', matches.documents, I.documents, item=>`document.getElementById('searchResults').classList.remove('visible');document.getElementById('globalSearch').value='';openDocModal('${item.id}')`) +
     sec('POCs', matches.pocs, I.pocs, item=>`document.getElementById('searchResults').classList.remove('visible');document.getElementById('globalSearch').value='';openPocModal('${item.id}')`) +
     sec('Conferences', matches.conferences, I.conferences, item=>`document.getElementById('searchResults').classList.remove('visible');document.getElementById('globalSearch').value='';openConfModal('${item.id}')`);
   results.classList.add('visible');
 });
 input.addEventListener('focus', () => { if (input.value.trim()) results.classList.add('visible'); });
 document.addEventListener('click', e => {
   if (!e.target.closest('.search-wrap')) results.classList.remove('visible');
 });
}

function searchSub(type, item){
 if (type === 'Clients') return escapeHTML(item.industry||'');
 if (type === 'Contacts'){ const c = L.client(item.clientId); return escapeHTML(item.role||'') + (c?' · '+escapeHTML(c.name):''); }
 if (type === 'Deals'){ const c = L.client(item.clientId); return F.money(item.amount) + (c?' · '+escapeHTML(c.name):''); }
 if (type === 'Invoices'){ const c = L.client(item.clientId); return F.money(item.amount) + (c?' · '+escapeHTML(c.name):''); }
 if (type === 'Documents') return escapeHTML(item.reference||item.category||'');
 if (type === 'POCs'){ const d = L.project(item.dealId); return d?escapeHTML(d.title):'(deal not set)'; }
 if (type === 'Conferences') return escapeHTML(item.city||'') + ', ' + escapeHTML(item.country||'');
 return '';
}

/* ============================================================
   UTILITIES
   ============================================================ */
function emptyState(msg){
 return `<div class="empty-state">${I.inbox}<div class="empty-state-title">Nothing here</div><div class="empty-state-sub">${escapeHTML(msg)}</div></div>`;
}

function escapeHTML(s){
 if (s == null) return '';
 return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
 buildSidebar();
 chartDefaults();
 const today = new Date();
 const dt = today.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
 document.getElementById('topbarDate').innerHTML = `<strong>${today.toLocaleDateString('en-US',{weekday:'long'})}</strong>${dt}`;

 document.getElementById('menuToggle').addEventListener('click', () => {
   document.getElementById('sidebar').classList.toggle('open');
 });
 document.getElementById('modalOverlay').addEventListener('click', e => {
   if (e.target.id === 'modalOverlay') closeModal();
 });
 document.addEventListener('keydown', e => {
   if (e.key === 'Escape'){ closeModal(); document.getElementById('searchResults').classList.remove('visible'); }
   if ((e.ctrlKey||e.metaKey) && e.key === 'k'){ e.preventDefault(); document.getElementById('globalSearch').focus(); }
 });
 initSearch();
 navigate('dashboard');
}

document.addEventListener('DOMContentLoaded', init);
</script>
